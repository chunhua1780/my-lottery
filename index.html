<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>龙年大吉-全真玩法版</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: "Arial Black", sans-serif; }
        
        .card-container { position: relative; width: 360px; height: 740px; background: url('64005.jpg') no-repeat; background-size: cover; border-radius: 15px; }

        /* 全局数字层：背景完全透明，露出底图圆圈 */
        .data-layer { position: absolute; top: 342px; left: 23px; width: 314px; height: 350px; z-index: 1; pointer-events: none; }

        /* 玩法区（中奖号码）：2行，对齐原图上部圆圈 */
        .win-area { height: 95px; display: grid; grid-template-columns: repeat(3, 1fr); align-items: center; padding: 5px 20px; }
        
        /* 我的号码区：4行5列，对齐原图下部圆圈 */
        .my-area { height: 245px; display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(4, 1fr); }

        .number-box { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: #000; /* 纯黑 */
            font-weight: 900; /* 最粗字体 */
            font-size: 20px; /* 加大字号 */
            /* 关键：白色外发光描边，确保压过底图浅色龙纹 */
            text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 0 2px 0 #fff, 0 -2px 0 #fff, 2px 0 0 #fff, -2px 0 0 #fff; 
        }

        .prize-value { font-size: 10px; color: #d42323; margin-top: -2px; font-weight: bold; }

        /* 覆盖全区域的刮奖层 */
        #scratch-canvas { position: absolute; top: 342px; left: 23px; width: 314px; height: 350px; z-index: 10; touch-action: none; cursor: crosshair; }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="data-layer">
            <div class="win-area" id="win-nums"></div>
            <div class="my-area" id="my-nums"></div>
        </div>
        <canvas id="scratch-canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');

        // 1. 生成 5 个核心中奖号码
        const winList = [];
        while(winList.length < 5) {
            let n = Math.floor(Math.random() * 89) + 10;
            if(!winList.includes(n)) winList.push(n);
        }
        document.getElementById('win-nums').innerHTML = winList.map(n => `<div class="number-box">${n}</div>`).join('');

        // 2. 生成 20 个格子，匹配底图圆圈
        const myBox = document.getElementById('my-nums');
        for (let i = 0; i < 20; i++) {
            let num;
            let isWin = Math.random() > 0.85; // 设置 15% 中奖率
            
            if (isWin) {
                num = winList[Math.floor(Math.random() * winList.length)];
            } else {
                do { num = Math.floor(Math.random() * 89) + 10; } while (winList.includes(num));
            }

            const prize = isWin ? [20, 50, 100, 500][Math.floor(Math.random()*4)] : 0;
            myBox.innerHTML += `<div class="number-box">${num}<div class="prize-value">${prize > 0 ? '¥'+prize : '未中奖'}</div></div>`;
        }

        // 3. 绘制高级磨砂图层
        function initCanvas() {
            canvas.width = 314; canvas.height = 350;
            ctx.fillStyle = '#C0C0C0';
            ctx.fillRect(0, 0, 314, 350);
            // 增加金属质感颗粒
            for(let i=0; i<1000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#E0E0E0' : '#888';
                ctx.fillRect(Math.random()*314, Math.random()*350, 1.2, 1.2);
            }
            ctx.fillStyle = '#666'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('中 奖 号 码 区', 157, 45);
            ctx.fillText('我 的 号 码 区', 157, 175);
        }

        let pressed = false;
        function scratch(e) {
            if (!pressed) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(x, y, 22, 0, Math.PI * 2); ctx.fill();
        }

        canvas.addEventListener('mousedown', () => pressed = true);
        canvas.addEventListener('touchstart', (e) => { pressed = true; scratch(e); });
        window.addEventListener('mouseup', () => pressed = false);
        window.addEventListener('touchend', () => pressed = false);
        canvas.addEventListener('mousemove', scratch);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, {passive: false});

        initCanvas();
    </script>
</body>
</html>
