<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国龙-刮刮乐</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: #000; margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; overflow: hidden;
            font-family: "Microsoft YaHei", sans-serif;
            -webkit-user-select: none; user-select: none;
        }

        .card-container { 
            position: relative; width: 360px; height: 720px;
            background: url('64005.jpg') no-repeat; background-size: cover;
            flex-shrink: 0;
        }

        /* 中奖号码文字层 (基于你的 T=248, L=126, Size=22) */
        #win-box { 
            position: absolute; top: 248px; left: 126px; 
            width: 100px; height: 60px; z-index: 1;
            display: flex; justify-content: center; align-items: center; 
            font-size: 22px; color: #000; font-weight: 900;
            text-shadow: 1px 1px 0 #fff;
        }
        
        /* 我的号码网格层 (基于你的 T=339, L=24, Size=14) */
        #my-grid { 
            position: absolute; top: 339px; left: 24px; 
            width: 312px; z-index: 1;
            display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(5, 1fr);
            row-gap: 5px; font-size: 14px;
        }

        .num-item { 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #000; font-weight: 900; text-shadow: 1px 1px 0 #fff; line-height: 1.1; 
        }
        .prize-item { font-size: 10px; color: #8B0000; font-weight: 900; }

        /* 刮奖图层 */
        .scratch-layer { position: absolute; z-index: 10; touch-action: none; cursor: crosshair; }
        
        /* 涂层A定位 (基于你的 T=258, L=154, W=69) */
        #canv-win { top: 258px; left: 154px; width: 69px; height: 50px; }
        /* 涂层B定位 (基于你的 T=322, L=21, H=299) */
        #canv-mine { top: 322px; left: 21px; width: 318px; height: 299px; }
    </style>
</head>
<body>

    <div class="card-container">
        <div id="win-box"></div>
        <div id="my-grid"></div>
        
        <canvas id="canv-win" class="scratch-layer"></canvas>
        <canvas id="canv-mine" class="scratch-layer"></canvas>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#000000');

        // 1. 初始化游戏数据
        const luckyNum = Math.floor(Math.random() * 89) + 10;
        document.getElementById('win-box').innerText = luckyNum;

        let pool = Array.from({length: 90}, (_, i) => i + 10).sort(() => Math.random() - 0.5);
        const myBox = document.getElementById('my-grid');
        const prizeList = [0, 5, 10, 20, 50, 100, 500, 1000, 5000, 10000, 1000000];

        for (let i = 0; i < 30; i++) {
            let isWin = Math.random() > 0.9; // 10% 中奖概率
            let num = isWin ? luckyNum : (pool[i] === luckyNum ? pool[35] : pool[i]);
            let prize = isWin ? prizeList[Math.floor(Math.random() * prizeList.length)] : [2, 5, 10][Math.floor(Math.random()*3)];
            
            let prizeStr = prize >= 10000 ? (prize/10000) + "W" : prize;
            myBox.innerHTML += `<div class="num-item">${num}<div class="prize-item">¥${prizeStr}</div></div>`;
            
            // 刮出大奖时触发震动
            if (isWin && prize >= 500) tg.HapticFeedback.notificationOccurred('success');
        }

        // 2. 初始化涂层绘制
        function drawScratch(id, w, h) {
            const c = document.getElementById(id);
            const ctx = c.getContext('2d');
            c.width = w; c.height = h;

            // 绘制银色涂层
            ctx.fillStyle = '#C0C0C0';
            ctx.fillRect(0, 0, w, h);
            
            // 增加金属质感颗粒
            for(let i=0; i<500; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#DCDCDC' : '#999';
                ctx.fillRect(Math.random()*w, Math.random()*h, 1.5, 1.5);
            }

            // 刮除功能
            let isDrawing = false;
            const scratch = (e) => {
                if (!isDrawing) return;
                const r = c.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
                
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, 20, 0, Math.PI * 2);
                ctx.fill();
            };

            c.addEventListener('mousedown', () => isDrawing = true);
            c.addEventListener('touchstart', (e) => { isDrawing = true; scratch(e); });
            window.addEventListener('mouseup', () => isDrawing = false);
            window.addEventListener('touchend', () => isDrawing = false);
            c.addEventListener('mousemove', scratch);
            c.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, {passive: false});
        }

        // 启动涂层 (基于你的 W=69, H=50 / W=318, H=299)
        drawScratch('canv-win', 69, 50);
        drawScratch('canv-mine', 318, 299);
    </script>
</body>
</html>
