<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=360, user-scalable=no">
    <title>GOLDEN LUCK - THE FINAL MASTERPIECE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Dancing+Script:wght@700&family=Space+Mono:wght@700&display=swap');

        :root { 
            --accent: #6366f1;
            --glass-bg: rgba(255, 255, 255, 0.88);
        }

        body { margin: 0; background: #fff; color: #1e293b; font-family: 'Outfit', sans-serif; overflow: hidden; touch-action: none; }

        /* --- 1. 倒计时：每秒转一圈的动态环 --- */
        #loader {
            position: fixed; inset: 0; z-index: 100000;
            display: flex; justify-content: center; align-items: center;
            background: #fff;
        }
        .cd-container { position: relative; width: 150px; height: 150px; display: flex; justify-content: center; align-items: center; }
        
        .cd-ring { position: absolute; width: 100%; height: 100%; transform: rotate(-90deg); }
        .cd-ring circle {
            fill: none; stroke-width: 6; stroke-linecap: round;
            stroke: url(#ringGradient);
            stroke-dasharray: 440;
            stroke-dashoffset: 0;
        }
        /* 每一秒转一圈的动画类 */
        .ring-active { animation: ringTick 1s linear infinite; }
        @keyframes ringTick { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 440; } }

        .cd-num { font-size: 70px; font-weight: 900; color: #1e293b; }

        /* --- 2. 悬浮对话框 --- */
        #top-dialog {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-20px);
            width: 320px; padding: 22px 0;
            background: var(--glass-bg); backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(0, 0, 0, 0.05); border-radius: 35px; z-index: 100001;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.15);
            opacity: 0; filter: blur(10px);
            transition: all 1.5s cubic-bezier(0.19, 1, 0.22, 1);
            pointer-events: none; 
        }
        #top-dialog.active { opacity: 1; filter: blur(0px); transform: translateX(-50%) translateY(0); }
        .d-title { font-size: 24px; font-weight: 900; color: #000; margin: 0; }
        .d-msg { font-family: 'Dancing Script'; font-size: 17px; color: #475569; margin: 6px 0; }
        .d-bal-box { margin-top: 10px; padding: 6px 30px; border-radius: 50px; background: #000; color: #fff; font-family: 'Space Mono', monospace; font-size: 14px; }

        /* --- 3. 舞台与金额设计 --- */
        #stage { position: relative; width: 360px; height: 720px; margin: 0 auto; background: #fff url('64005.jpg') center/100% 100% no-repeat; opacity: 0; transition: opacity 1s; }
        #win-area { position: absolute; left: 151px; top: 263px; width: 72px; height: 66px; display: flex; align-items: center; justify-content: center; color: #000; font-size: 26px; font-weight: 900; }
        #grid-area { position: absolute; left: 27px; top: 335px; width: 310px; height: 284px; display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(5, 1fr); gap: 10px; padding: 5px; box-sizing: border-box; }
        
        .cell b { font-size: 19px; display: block; font-weight: 900; color: #000; text-align: center; }
        /* 金额夹心样式：$ 10.00 € */
        .cell i { font-family: 'Space Mono'; font-size: 9px; color: #000; font-weight: 700; display: block; text-align: center; margin-top: -2px; }

        canvas { position: absolute; z-index: 500; touch-action: none; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="cd-container">
            <svg class="cd-ring"><defs><linearGradient id="ringGradient"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#a855f7"/></linearGradient></defs>
                <circle id="rc" cx="75" cy="75" r="70" class="ring-active"></circle>
            </svg>
            <div id="cd" class="cd-num">3</div>
        </div>
    </div>

    <div id="top-dialog">
        <div class="d-title" id="dt">LUCKY REVEAL</div>
        <div class="d-msg" id="dm">The fortune has been unveiled...</div>
        <div class="d-bal-box">BALANCE: <span id="db">$100.00</span></div>
    </div>

    <div id="stage">
        <div id="win-area">88</div>
        <div id="grid-area"></div>
        <canvas id="c_win" style="left:153px; top:258px; width:71px; height:52px;"></canvas>
        <canvas id="c_grid" style="left:22px; top:322px; width:317px; height:300px;"></canvas>
    </div>

    <script>
        let balance = 100.00, winTriggered = false, winTotal = 0;
        let sensorPoints = [];
        let hitCount = 0;
        let mainScrached = false; // 是否已经刮开了中奖号码区域

        // 1. 倒计时流程
        async function runCD() {
            const el = document.getElementById('cd');
            for(let s of ['2', '1', 'GO']) {
                await new Promise(r => setTimeout(r, 1000));
                el.innerText = s;
            }
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('stage').style.opacity = '1';
                initGame();
            }, 600);
        }

        function initGame() {
            const g = document.getElementById('grid-area');
            let h = "";
            for(let i=0; i<30; i++) {
                const n = Math.random() > 0.88 ? "88" : Math.floor(Math.random()*89+10);
                const p = (Math.random()*50+10).toFixed(2);
                if(n === "88") winTotal += parseFloat(p);
                // 修改：前后美元欧元夹心
                h += `<div class="cell"><b>${n}</b><i>$${p}€</i></div>`;
            }
            g.innerHTML = h;

            for(let i=0; i<5; i++) 
                for(let j=0; j<4; j++) sensorPoints.push({ x: 40 + j * 75, y: 40 + i * 55, hit: false });

            setupCanvas("c_win");
            setupCanvas("c_grid");
        }

        function setupCanvas(id) {
            const cvs = document.getElementById(id);
            const ctx = cvs.getContext('2d');
            cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight;

            ctx.fillStyle = '#e2e8f0';
            ctx.fillRect(0,0,cvs.width, cvs.height);
            ctx.fillStyle = "rgba(100,116,139,0.15)";
            ctx.font = "bold 16px Arial";
            for(let x=5; x<cvs.width; x+=28) 
                for(let y=18; y<cvs.height; y+=28) ctx.fillText((x+y)%2===0 ? "€":"$", x, y);

            const scratch = (e) => {
                const r = cvs.getBoundingClientRect();
                const x = (e.clientX || (e.touches && e.touches[0].clientX)) - r.left;
                const y = (e.clientY || (e.touches && e.touches[0].clientY)) - r.top;

                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x, y, 32, 0, Math.PI*2); ctx.fill();

                // 逻辑控制：如果刮的是中奖区域
                if(id === "c_win") {
                    // 只要在中心点附近刮一下就判定主号码已露面
                    if(Math.abs(x - cvs.width/2) < 20) mainScrached = true;
                }

                if(id === "c_grid" && !winTriggered) {
                    sensorPoints.forEach(p => {
                        if(!p.hit) {
                            const d = Math.sqrt((x - p.x)**2 + (y - p.y)**2);
                            if(d < 32) { 
                                p.hit = true; hitCount++; 
                                // 满足 70% 且 必须先刮开了主号码
                                if(hitCount >= 14 && mainScrached) showPopup(); 
                            }
                        }
                    });
                }
            };

            let paint = false;
            cvs.addEventListener('mousedown', () => paint = true);
            window.addEventListener('mouseup', () => paint = false);
            cvs.addEventListener('mousemove', (e) => { if(paint) scratch(e); });
            cvs.addEventListener('touchstart', (e) => { paint = true; scratch(e); e.preventDefault(); }, {passive: false});
            cvs.addEventListener('touchmove', (e) => { scratch(e); e.preventDefault(); }, {passive: false});
        }

        function showPopup() {
            if(winTriggered) return;
            winTriggered = true;

            setTimeout(() => {
                const dialog = document.getElementById('top-dialog');
                document.getElementById('db').innerText = `$${(balance + winTotal).toFixed(2)}`;
                if(winTotal > 0) {
                    document.getElementById('dt').innerText = "CONGRATS!";
                    document.getElementById('dm').innerText = `You've uncovered $${winTotal.toFixed(2)}€ rewards.`;
                } else {
                    document.getElementById('dt').innerText = "TRY AGAIN";
                    document.getElementById('dm').innerText = "Fortune favors the persistent!";
                }
                dialog.classList.add('active');
                if(navigator.vibrate) navigator.vibrate([50, 50]);
            }, 2500); 
        }

        window.onload = runCD;
    </script>
</body>
</html>
