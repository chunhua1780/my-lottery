<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工程调试站 V4.0 - 像素级对齐</title>
    <style>
        :root { --neon: #00f2fe; --gold: #f9d423; --panel-bg: rgba(0,0,0,0.9); }
        body { background: #1a1a1a; margin: 0; font-family: "Arial", sans-serif; display: flex; color: #fff; height: 100vh; overflow: hidden; }

        /* --- 预览容器 --- */
        #stage { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #333; overflow: hidden; }
        .canvas-card { position: relative; width: 360px; height: 720px; background-size: 100% 100%; box-shadow: 0 0 50px #000; scale: 0.9; }
        
        #w-num { position: absolute; z-index: 2; display: flex; justify-content: center; align-items: center; font-weight: 900; pointer-events: none; }
        #grid { position: absolute; z-index: 2; display: grid; grid-template-columns: repeat(6, 1fr); pointer-events: none; }
        .item { display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: 900; }
        
        .layer { position: absolute; z-index: 10; transition: opacity 0.3s; }
        .hide-layer { opacity: 0 !important; pointer-events: none !important; }

        /* --- 调试面板 --- */
        #controls { width: 380px; background: var(--panel-bg); border-left: 1px solid #444; padding: 15px; overflow-y: auto; box-sizing: border-box; font-size: 12px; }
        h2 { color: var(--neon); font-size: 16px; margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .group { background: #222; padding: 10px; margin-bottom: 10px; border-radius: 5px; border-left: 3px solid var(--neon); }
        .group h3 { margin: 0 0 10px 0; font-size: 11px; color: #888; text-transform: uppercase; }
        
        .ctrl-row { display: flex; align-items: center; margin-bottom: 6px; }
        .ctrl-row label { width: 100px; color: #bbb; }
        .ctrl-row input[type=range] { flex: 1; accent-color: var(--neon); }
        .ctrl-row span { width: 35px; text-align: right; color: var(--neon); font-family: monospace; }
        
        .btn { width: 100%; padding: 10px; margin-top: 5px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-toggle { background: #444; color: #fff; margin-bottom: 15px; }
        .btn-toggle.active { background: #ff4757; }
        .btn-export { background: var(--neon); color: #000; }

        /* --- 欧美风格浮动弹窗 (Vegas Style) --- */
        #bubble {
            position: absolute; top: 120px; left: 50%; transform: translateX(-50%) scale(0.5);
            width: 320px; height: 140px; background: rgba(0,0,0,0.85);
            border: 2px solid var(--gold); border-radius: 25px; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 30px rgba(249, 212, 35, 0.4);
        }
        #bubble.show { opacity: 1; transform: translateX(-50%) scale(1); }
        .v-title { color: var(--gold); font-weight: 900; font-size: 18px; font-style: italic; letter-spacing: 1px; }
        .v-amt { font-size: 45px; font-weight: 900; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.5); margin: 5px 0; }
        .v-btn { background: var(--gold); color: #000; border: none; padding: 5px 20px; border-radius: 50px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

<div id="stage">
    <div class="canvas-card" id="card">
        <div id="bubble">
            <div class="v-title">JACKPOT HIT!</div>
            <div class="v-amt" id="res-val">$ 0 $</div>
            <button class="v-btn" onclick="location.reload()">COLLECT NOW</button>
        </div>
        <div id="w-num">88</div>
        <div id="grid"></div>
        <canvas id="c-win" class="layer"></canvas>
        <canvas id="c-main" class="layer"></canvas>
    </div>
</div>

<div id="controls">
    <h2>ENGINEER STUDIO V4.0</h2>
    <button id="ghost-btn" class="btn btn-toggle" onclick="toggleGhost()">👻 屏蔽涂层 (对齐模式)</button>

    <div class="group">
        <h3>1. 中奖号码 (Win Number)</h3>
        <div class="ctrl-row"><label>垂直位置 Y</label><input type="range" min="100" max="500" value="273" oninput="upd('wt',this.value)"> <span id="v_wt">273</span></div>
        <div class="ctrl-row"><label>水平位置 X</label><input type="range" min="0" max="360" value="175" oninput="upd('wl',this.value)"> <span id="v_wl">175</span></div>
        <div class="ctrl-row"><label>数字字号</label><input type="range" min="10" max="60" value="22" oninput="upd('ws',this.value)"> <span id="v_ws">22</span></div>
    </div>

    <div class="group">
        <h3>2. 玩法网格 (Grid Alignment)</h3>
        <div class="ctrl-row"><label>起始垂直 Y</label><input type="range" min="200" max="600" value="343" oninput="upd('gt',this.value)"> <span id="v_gt">343</span></div>
        <div class="ctrl-row"><label>起始水平 X</label><input type="range" min="0" max="100" value="32" oninput="upd('gl',this.value)"> <span id="v_gl">32</span></div>
        <div class="ctrl-row"><label>行间距 (Row)</label><input type="range" min="10" max="60" value="29" oninput="upd('gr',this.value)"> <span id="v_gr">29</span></div>
        <div class="ctrl-row"><label>列间距 (Col)</label><input type="range" min="10" max="60" value="22" oninput="upd('gc',this.value)"> <span id="v_gc">22</span></div>
        <div class="ctrl-row"><label>网格总宽</label><input type="range" min="200" max="350" value="295" oninput="upd('gw',this.value)"> <span id="v_gw">295</span></div>
    </div>

    <div class="group">
        <h3>3. 文字样式 (Typography)</h3>
        <div class="ctrl-row"><label>数字字号</label><input type="range" min="8" max="30" value="16" oninput="upd('gs',this.value)"> <span id="v_gs">16</span></div>
        <div class="ctrl-row"><label>$$ 字号</label><input type="range" min="6" max="20" value="8" oninput="upd('ps',this.value)"> <span id="v_ps">8</span></div>
        <div class="ctrl-row"><label>数字颜色</label><input type="color" value="#000000" oninput="upd('nc',this.value)"></div>
        <div class="ctrl-row"><label>$$ 颜色</label><input type="color" value="#d00000" oninput="upd('pc',this.value)"></div>
    </div>

    <div class="group">
        <h3>4. 弹窗高度 (Bubble Y)</h3>
        <div class="ctrl-row"><label>垂直位置 Y</label><input type="range" min="50" max="300" value="120" oninput="upd('bt',this.value)"> <span id="v_bt">120</span></div>
    </div>

    <button class="btn btn-export" onclick="exportData()">💾 导出最终工程参数</button>
</div>

<script>
    // 初始状态 (包含你之前的精准参数)
    let p = { 
        wt:273, wl:175, ws:22, 
        gt:343, gl:32, gr:29, gc:22, gw:295, 
        gs:16, ps:8, nc:'#000000', pc:'#d00000',
        bt:120 
    };

    let isGhost = false;
    let winClean = false, mainClean = false;

    function toggleGhost() {
        isGhost = !isGhost;
        document.getElementById('ghost-btn').classList.toggle('active', isGhost);
        document.querySelectorAll('.layer').forEach(l => l.classList.toggle('hide-layer', isGhost));
    }

    function upd(key, val) {
        p[key] = isNaN(val) ? val : parseInt(val);
        if(document.getElementById('v_'+key)) document.getElementById('v_'+key).innerText = val;
        render();
    }

    function render() {
        const wn = document.getElementById('w-num');
        wn.style.top = p.wt+'px'; wn.style.left = p.wl+'px'; wn.style.fontSize = p.ws+'px';
        
        const gr = document.getElementById('grid');
        gr.style.top = p.gt+'px'; gr.style.left = p.gl+'px';
        gr.style.rowGap = p.gr+'px'; gr.style.columnGap = p.gc+'px';
        gr.style.width = p.gw+'px';
        
        const bub = document.getElementById('bubble');
        bub.style.top = p.bt+'px';

        const items = gr.querySelectorAll('.item');
        items.forEach(it => {
            it.style.fontSize = p.gs+'px';
            it.style.color = p.nc;
            const usd = it.querySelector('.usd');
            if(usd) { usd.style.fontSize = p.ps+'px'; usd.style.color = p.pc; }
        });
    }

    function initGame() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for(let i=0; i<30; i++) {
            grid.innerHTML += `<div class="item">88<div class="usd">$ 500 $</div></div>`;
        }
        render();
        // 涂层坐标锁定 (固定不再调，只调文字)
        setupLayer('c-win', 157, 260, 61, 49, 'win');
        setupLayer('c-main', 21, 322, 318, 299, 'main');
    }

    function setupLayer(id, x, y, w, h, type) {
        const c = document.getElementById(id);
        c.style.left = x+'px'; c.style.top = y+'px';
        c.width = w; c.height = h;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#BBB'; ctx.fillRect(0,0,w,h);
        
        let drawing = false;
        const scrub = (e) => {
            if(!drawing) return;
            const rect = c.getBoundingClientRect();
            const tx = (e.touches?e.touches[0].clientX:e.clientX) - rect.left;
            const ty = (e.touches?e.touches[0].clientY:e.clientY) - rect.top;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(tx, ty, 22, 0, Math.PI*2); ctx.fill();
            checkProgress(c, type);
        };
        c.onmousedown = () => drawing = true;
        window.onmouseup = () => drawing = false;
        c.onmousemove = scrub;
        c.ontouchstart = (e) => { e.preventDefault(); drawing = true; scrub(e); };
        c.ontouchmove = (e) => { e.preventDefault(); scrub(e); };
    }

    function checkProgress(c, type) {
        const data = c.getContext('2d').getImageData(0,0,c.width,c.height).data;
        let hits = 0;
        for(let i=3; i<data.length; i+=4) if(data[i] === 0) hits++;
        if(hits / (data.length/4) > 0.95) {
            if(type === 'win') winClean = true;
            if(type === 'main') mainClean = true;
        }
        if(winClean && mainClean) {
            setTimeout(() => {
                document.getElementById('res-val').innerText = "$ 1,500 $";
                document.getElementById('bubble').classList.add('show');
            }, 500);
        }
    }

    function exportData() {
        console.log("FINAL_ENGINEER_DATA:", JSON.stringify(p));
        alert("参数已导出！请复制控制台的数据发给我：\n\n" + JSON.stringify(p));
    }

    window.onload = () => {
        const img = new Image(); img.src = '64005.jpg';
        img.onload = () => {
            document.getElementById('card').style.backgroundImage = `url(64005.jpg)`;
            initGame();
        };
    };
</script>
</body>
</html>
