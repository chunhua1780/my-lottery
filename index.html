<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刮刮乐</title>

<style>
body{
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

/* 倒计时 */
#loader{
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99;
}
#count{
    font-size:120px;
    font-weight:900;
    background:linear-gradient(45deg,#00f2fe,#f5576c,#ffe259);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:zoom 1s ease forwards;
}
@keyframes zoom{
    0%{transform:scale(0.3);opacity:0;}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);opacity:1;}
}

/* 卡片 */
.card{
    position:relative;
    width:360px;
    height:720px;
    background:url('64005.jpg') no-repeat;
    background-size:cover;
    opacity:0;
    transition:0.5s;
}

/* 数据层 */
.layer{
    position:absolute;
    left:20px;
    top:150px;
    width:320px;
    height:500px;
}

/* 中奖号码 */
#win{
    position:absolute;
    top:110px;
    left:150px;
    font-size:22px;
    font-weight:900;
}

/* 网格 */
.grid{
    position:absolute;
    top:170px;
    left:10px;
    width:300px;
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:8px;
}
.cell{
    height:50px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}
.num{
    font-size:16px;
    font-weight:900;
}
.money{
    font-size:11px;
    color:#700000;
}

/* canvas */
canvas{
    position:absolute;
    left:0;
    top:0;
    z-index:10;
}
#c1{ top:100px; left:140px; width:80px; height:60px;}
#c2{ top:160px; left:20px; width:320px; height:320px;}
</style>
</head>

<body>

<div id="loader"><div id="count">3</div></div>

<div class="card" id="card">
    <div class="layer" id="layer">
        <div id="win"></div>
        <div class="grid" id="grid"></div>
    </div>
    <canvas id="c1"></canvas>
    <canvas id="c2"></canvas>
</div>

<script>

/* ===== 数据模型（娱乐版） ===== */
function getData(){
    let lucky = Math.floor(Math.random()*90)+10;

    let r=Math.random();
    let total=0;

    if(r<0.5) total=0;
    else if(r<0.85) total=[5,10][Math.floor(Math.random()*2)];
    else if(r<0.97) total=[20,50][Math.floor(Math.random()*2)];
    else total=100;

    let spots=[];
    let used=false;

    for(let i=0;i<30;i++){
        let num=Math.floor(Math.random()*90)+10;
        let prize=0;

        if(!used && total>0 && Math.random()<0.2){
            num=lucky;
            prize=total;
            used=true;
        }

        spots.push({num,prize});
    }

    return {lucky,spots,total};
}

/* ===== 初始化 ===== */
const data=getData();
window.result=data.total;

document.getElementById('win').innerText=data.lucky;

const grid=document.getElementById('grid');
data.spots.forEach(s=>{
    grid.innerHTML+=`
    <div class="cell">
        <div class="num">${s.num}</div>
        <div class="money">${s.prize?('¥'+s.prize):''}</div>
    </div>`;
});

/* ===== 刮层（真实效果） ===== */
function setup(c){
    const ctx=c.getContext('2d');
    c.width=c.offsetWidth;
    c.height=c.offsetHeight;

    ctx.fillStyle='#C0C0C0';
    ctx.fillRect(0,0,c.width,c.height);

    for(let i=0;i<500;i++){
        ctx.fillStyle=Math.random()>0.5?'#eee':'#999';
        ctx.fillRect(Math.random()*c.width,Math.random()*c.height,1,1);
    }

    let down=false;
    let revealed=false;

    function draw(e){
        if(!down)return;
        const r=c.getBoundingClientRect();
        const x=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
        const y=(e.touches?e.touches[0].clientY:e.clientY)-r.top;

        ctx.globalCompositeOperation='destination-out';
        ctx.beginPath();
        ctx.arc(x,y,18,0,Math.PI*2);
        ctx.fill();

        if(!revealed){
            let img=ctx.getImageData(0,0,c.width,c.height);
            let clear=0;
            for(let i=3;i<img.data.length;i+=4){
                if(img.data[i]==0) clear++;
            }
            if(clear>img.data.length/10){
                revealed=true;
                showResult();
            }
        }
    }

    c.onmousedown=()=>down=true;
    window.onmouseup=()=>down=false;
    c.onmousemove=draw;

    c.ontouchstart=e=>{down=true;draw(e);}
    c.ontouchend=()=>down=false;
    c.ontouchmove=e=>{e.preventDefault();draw(e);}
}

/* ===== 结果提示 ===== */
function showResult(){
    let r=window.result;
    let msg='';

    if(r===0) msg='差一点点，再试试 🍀';
    else if(r<=10) msg=`不错！赢了 ¥${r}`;
    else if(r<=50) msg=`手气不错！¥${r}`;
    else msg=`🎉 大奖 ¥${r}！`;

    setTimeout(()=>alert(msg),300);
}

/* ===== 倒计时 ===== */
let n=3;
const el=document.getElementById('count');

let timer=setInterval(()=>{
    n--;
    if(n>0){
        el.innerText=n;
        el.style.animation='none';
        setTimeout(()=>el.style.animation='zoom 1s',10);
    }else{
        clearInterval(timer);
        document.getElementById('loader').style.display='none';
        document.getElementById('card').style.opacity=1;

        setup(document.getElementById('c1'));
        setup(document.getElementById('c2'));
    }
},1000);

</script>

</body>
</html>
