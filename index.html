<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUCKY 88 - SILVER PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        :root { --gold: #FFD700; --pure-black: #000000; --win-red: #d00000; }
        body { background: #000; margin: 0; font-family: 'Montserrat', sans-serif; overflow: hidden; color: white; user-select: none; }

        /* --- 倒计时 --- */
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .cd-num { font-size: 150px; font-weight: 900; background: linear-gradient(180deg, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(0.6); opacity: 0; } 50% { opacity: 1; } 100% { transform: scale(1.2); opacity: 0; } }

        /* --- 核心游戏容器 (锁定你的精准参数) --- */
        #app { display: none; opacity: 0; transition: opacity 1s; }
        .card { position: relative; width: 360px; height: 720px; background-size: 100% 100%; margin: 0 auto; }

        /* 中奖区锚定: wt:273, wl:175 */
        #win-box { 
            position: absolute; z-index: 1; top: 273px; left: 175px; width: 30px; height: 30px;
            display: flex; justify-content: center; align-items: center;
            font-size: 22px; color: var(--pure-black); font-weight: 900;
        }

        /* 玩法网格锚定: gt:343, gl:33, gw:295, gr:34, gc:23 */
        #grid-box { 
            position: absolute; z-index: 1; top: 343px; left: 33px; width: 295px;
            display: grid; grid-template-columns: repeat(6, 1fr);
            row-gap: 34px; column-gap: 23px;
        }
        .cell { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 30px; height: 40px; }
        .num { font-size: 16px; color: var(--pure-black); font-weight: 900; line-height: 1; }
        .val { font-size: 8px; color: var(--win-red); font-weight: 800; margin-top: 2px; }

        /* 涂层配置 */
        .sc-layer { position: absolute; z-index: 10; touch-action: none; cursor: crosshair; }
        #sc-win { top: 260px; left: 157px; width: 61px; height: 49px; }
        #sc-main { top: 322px; left: 21px; width: 318px; height: 299px; }

        /* Vegas 风格弹窗: bt:120 */
        #pop-up {
            position: absolute; top: 120px; left: 50%; transform: translateX(-50%) translateY(30px);
            width: 320px; height: 140px; background: rgba(0,0,0,0.98);
            border: 3px solid var(--gold); border-radius: 30px; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #pop-up.active { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
        .p-amt { font-size: 50px; font-weight: 900; color: #fff; margin: 5px 0; text-shadow: 0 0 15px rgba(255,255,255,0.4); }
    </style>
</head>
<body>

<div id="loader"><div class="cd-num" id="cd-txt">3</div></div>

<div id="app">
    <div class="card" id="card-bg">
        <div id="pop-up">
            <div style="color:var(--gold); font-size:12px; font-weight:900; letter-spacing:2px;">CONGRATULATIONS</div>
            <div class="p-amt" id="final-amt">$ 0 $</div>
            <button style="background:var(--gold); color:#000; border:none; padding:6px 20px; border-radius:20px; font-weight:900; font-size:11px; cursor:pointer;" onclick="location.reload()">PLAY AGAIN</button>
        </div>
        <div id="win-box">88</div>
        <div id="grid-box"></div>
        <canvas id="sc-win" class="sc-layer"></canvas>
        <canvas id="sc-main" class="sc-layer"></canvas>
    </div>
</div>

<script>
    const TARGET_NUM = 88;
    let time = 3;
    let winDone = false, mainDone = false;

    // 倒计时逻辑
    const cdTimer = setInterval(() => {
        time--;
        if(time > 0) document.getElementById('cd-txt').innerText = time;
        else {
            clearInterval(cdTimer);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            setTimeout(()=>document.getElementById('app').style.opacity='1',50);
        }
    }, 1000);

    // 渲染游戏数据
    function buildGame() {
        const slots = [];
        const isWinner = Math.random() < 0.3; // 30% 中奖率
        let totalWin = isWinner ? [500, 1000, 5000][Math.floor(Math.random()*3)] : 0;
        let currAcc = 0;

        for(let i=0; i<30; i++) {
            let n = Math.floor(Math.random()*80)+10; if(n===TARGET_NUM) n++;
            let v = [10, 20, 50, 100][Math.floor(Math.random()*4)];
            if(isWinner && currAcc < totalWin && Math.random() < 0.2) { n = TARGET_NUM; v = Math.max(50, totalWin-currAcc); currAcc += v; }
            slots.push({n, v});
        }
        return {slots, total: currAcc || 0};
    }
    const game = buildGame();

    window.onload = () => {
        const img = new Image(); img.src = '64005.jpg'; // 锚定你的背景图
        img.onload = () => {
            document.getElementById('card-bg').style.backgroundImage = `url(64005.jpg)`;
            document.getElementById('win-box').innerText = TARGET_NUM;
            const g = document.getElementById('grid-box');
            game.slots.forEach(s => {
                g.innerHTML += `<div class="cell"><span class="num">${s.n}</span><span class="val">$ ${s.v} $</span></div>`;
            });
            drawScratch('sc-win', 61, 49, 'win');
            drawScratch('sc-main', 318, 299, 'main');
        };
    };

    // --- 核心：真·银色炫彩涂层与利刃铲除引擎 ---
    function drawScratch(id, w, h, type) {
        const c = document.getElementById(id);
        const ctx = c.getContext('2d');
        c.width = w; c.height = h;

        // 1. 绘制真·银色炫彩涂层 (带金属渐变)
        const grd = ctx.createLinearGradient(0, 0, w, h);
        grd.addColorStop(0, '#A0A0A0'); // 亮银
        grd.addColorStop(0.5, '#E0E0E0'); // 高光
        grd.addColorStop(1, '#808080'); // 暗银
        ctx.fillStyle = grd; ctx.fillRect(0,0,w,h);
        
        // 随机银色噪点纹理
        for(let i=0; i<300; i++) { ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.15})`; ctx.fillRect(Math.random()*w, Math.random()*h, 1, 1); }

        // 2. 欧美潮流暗纹 (微缩Luck symbols)
        ctx.fillStyle = 'rgba(0,0,0,0.06)'; // 极淡暗花
        ctx.font = 'bold 15px Montserrat';
        const icons = ['♣', '$', '★', '♦'];
        for(let x=8; x<w; x+=32) for(let y=20; y<h; y+=32) ctx.fillText(icons[Math.floor(Math.random()*4)], x, y);

        let active = false;
        const scrub = (e) => {
            if(!active) return;
            const r = c.getBoundingClientRect();
            const tx = (e.touches?e.touches[0].clientX:e.clientX) - r.left;
            const ty = (e.touches?e.touches[0].clientY:e.clientY) - r.top;
            
            // --- 物理利刃铲除算法 (Hard Clipping) ---
            ctx.globalCompositeOperation = 'destination-out';
            
            // 使用多个随机散射的硬边缘碎片，模拟物理剥离
            for(let i=0; i<10; i++) {
                const offX = (Math.random()-0.5) * 22;
                const offY = (Math.random()-0.5) * 22;
                const size = 10 + Math.random() * 16;
                
                ctx.save();
                ctx.translate(tx + offX, ty + offY);
                ctx.rotate(Math.random() * Math.PI); // 随机旋转碎片
                
                // 绘制不规则碎片 (多边形铲刀感)
                ctx.beginPath();
                ctx.moveTo(-size/2, -size/2);
                ctx.lineTo(size/2, -size/2);
                ctx.lineTo(size/2 * (Math.random()*0.3+0.7), size/2); // 随机畸变
                ctx.lineTo(-size/2, size/2);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
            check(c, type);
        };

        c.onmousedown = () => active = true;
        window.onmouseup = () => active = false;
        c.onmousemove = scrub;
        c.ontouchstart = (e) => { e.preventDefault(); active = true; scrub(e); };
        c.ontouchmove = (e) => { e.preventDefault(); scrub(e); };
    }

    function check(c, type) {
        const d = c.getContext('2d').getImageData(0,0,c.width,c.height).data;
        let hits = 0;
        for(let i=3; i<d.length; i+=4) if(d[i] === 0) hits++;
        if(hits / (d.length/4) > 0.93) {
            if(type === 'win') winDone = true;
            if(type === 'main') mainDone = true;
        }
        if(winDone && mainDone) {
            setTimeout(() => {
                document.getElementById('final-amt').innerText = `$ ${game.total} $`;
                document.getElementById('pop-up').classList.add('active');
            }, 400);
        }
    }
</script>
</body>
</html>
