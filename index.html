<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EMPIRE COMMAND - LOTTERY</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #1a1a1a; color: #fff; font-family: -apple-system, sans-serif; text-align: center; overflow: hidden; touch-action: none; }
        .header { padding: 20px; font-weight: bold; letter-spacing: 2px; color: #E67E22; }
        #stage { position: relative; width: 340px; margin: 0 auto; background: #2c3e50; border-radius: 15px; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .win-number-label { font-size: 12px; color: #bdc3c7; }
        #win-val { font-size: 32px; font-weight: 900; margin: 5px 0 15px 0; color: #f1c40f; }
        #grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .item { background: #34495e; height: 65px; border-radius: 8px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        .item b { font-size: 18px; }
        .item i { font-size: 10px; color: #2ecc71; font-style: normal; }
        canvas { position: absolute; top: 0; left: 0; z-index: 10; cursor: crosshair; border-radius: 8px; }
        #res-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
        .btn-reload { margin-top: 20px; padding: 12px 30px; background: #E67E22; border: none; border-radius: 25px; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div id="res-mask">
    <h2 id="status-text">审计结算中...</h2>
    <h1 id="win-amount">$0.00</h1>
    <button class="btn-reload" onclick="location.reload()">下一场任务</button>
</div>

<div class="container">
    <div class="header">𝐄𝐌𝐏𝐈𝐑𝐄 𝐑𝐎𝐘𝐀𝐋 𝐀𝐔𝐃𝐈𝐓</div>
    <div id="stage">
        <div class="win-number-label">中奖号码</div>
        <div id="win-val">--</div>
        <div id="grid"></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    let targetNum = Math.floor(Math.random() * 89 + 10);
    let combArray = [];
    let totalWin = 0;
    let scratchedCount = 0;
    let isSubmitted = false;

    function init() {
        document.getElementById('win-val').innerText = targetNum;
        const grid = document.getElementById('grid');
        
        for (let i = 0; i < 16; i++) {
            let n = Math.floor(Math.random() * 89 + 10);
            let prize = (Math.random() * 45 + 5).toFixed(2);
            
            // 胜率控制：15% 概率匹配中奖号码
            if (Math.random() < 0.15) { n = targetNum; totalWin += parseFloat(prize); }
            
            combArray.push(n);
            
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<b>${n}</b><i>$${prize}</i><canvas id="can_${i}"></canvas>`;
            grid.appendChild(div);
            drawCover(`can_${i}`);
        }
    }

    function drawCover(id) {
        const c = document.getElementById(id);
        const ctx = c.getContext('2d');
        c.width = 75; c.height = 65;
        
        // 绘制涂层
        ctx.fillStyle = '#95a5a6';
        ctx.fillRect(0, 0, 75, 65);
        
        // 绘制防伪纹路
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        for(let i=0; i<75; i+=15) ctx.fillRect(i, 0, 1, 65);

        const scratch = (e) => {
            e.preventDefault();
            const rect = c.getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 15, 0, Math.PI * 2);
            ctx.fill();

            if (!isSubmitted) {
                scratchedCount++;
                if (scratchedCount > 50) { // 刮擦动作达到阈值
                    isSubmitted = true;
                    setTimeout(submitData, 2500);
                }
            }
        };

        c.addEventListener('touchstart', scratch);
        c.addEventListener('touchmove', scratch);
    }

    function submitData() {
        document.getElementById('win-amount').innerText = `$${totalWin.toFixed(2)}`;
        document.getElementById('res-mask').style.display = 'flex';
        
        const payload = {
            win: parseFloat(totalWin.toFixed(2)),
            combination: combArray.join('-'),
            timestamp: new Date().getTime()
        };
        
        // 重要：这是回传给 Python 后台的关键指令
        tg.sendData(JSON.stringify(payload));
    }

    window.onload = init;
</script>
</body>
</html>
