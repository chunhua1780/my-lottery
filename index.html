<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=360, user-scalable=no">
    <title>VIP SCRATCH GOLDEN EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Oswald:wght@700&display=swap');

        :root { --gold: #ffd700; --accent: #ff3e3e; }
        body { margin: 0; background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* --- 1. 倒计时层 --- */
        #loader-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .count-num {
            font-family: 'Montserrat', sans-serif; font-size: 150px; color: var(--gold);
            text-shadow: 0 0 30px rgba(255,215,0,0.5);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        /* --- 2. 顶部状态栏 --- */
        #top-bar {
            position: fixed; top: 0; width: 100%; height: 60px; background: rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box; z-index: 100;
        }
        .balance-box { font-family: 'Oswald'; color: var(--gold); font-size: 20px; }

        /* --- 3. 游戏容器 --- */
        #app-viewport {
            opacity: 0; transition: opacity 1s ease;
            display: flex; flex-direction: column; align-items: center; height: 100vh; padding-top: 80px;
        }

        #card {
            position: relative; width: 360px; height: 680px;
            background: #333; border: 4px solid #444; border-radius: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8); overflow: hidden;
        }

        /* 内部排版样式 (继承你提供的技术) */
        .grid-box { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width:100%; height:100%; padding: 5px; box-sizing: border-box; }
        .cell { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .val { font-family: 'Montserrat'; font-weight:900; font-size: 24px; color: #1a1a1a; line-height:1; }
        .amt { font-family: 'Oswald'; font-weight:700; color: #d32f2f; font-size: 12px; }
        
        canvas { position: absolute; z-index: 10; touch-action: none; cursor: crosshair; }

        /* --- 4. 弹窗样式 --- */
        #pop-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000;
            display: none; justify-content: center; align-items: center; text-align: center;
        }
        .modal {
            background: linear-gradient(135deg, #222, #000); border: 2px solid var(--gold);
            padding: 40px; border-radius: 20px; width: 280px;
            box-shadow: 0 0 30px var(--gold);
        }
        .modal h2 { color: var(--gold); font-family: 'Montserrat'; margin: 0; }
        .modal .win-amt { font-size: 40px; margin: 20px 0; font-family: 'Oswald'; }
        .modal button { 
            background: var(--gold); border: none; padding: 12px 30px; 
            border-radius: 30px; font-weight: bold; cursor: pointer;
        }

    </style>
</head>
<body>

    <div id="loader-screen">
        <div class="count-num" id="countdown">3</div>
    </div>

    <div id="top-bar">
        <div style="color:#888;">PLAYER_01</div>
        <div class="balance-box">BALANCE: <span id="balance-val">$100.00</span></div>
    </div>

    <div id="app-viewport">
        <div id="card">
            <div id="card-bg" style="position:absolute; inset:0; background: #fff url('64005.jpg') center/100% 100%;"></div>

            <div id="win-area" style="position:absolute; left:140px; top:120px; width:80px; height:100px; display:flex; flex-direction:column; align-items:center; justify-content:center;">
                <span class="val">88</span><span class="amt">WIN</span>
            </div>

            <div id="matrix-area" style="position:absolute; left:20px; top:250px; width:320px; height:400px;">
                <div id="matrix-inner" class="grid-box"></div>
            </div>

            <canvas id="cvs-win" class="scratch-layer" data-target="win" style="left:140px; top:120px; width:80px; height:100px; z-index:11;"></canvas>
            <canvas id="cvs-matrix" class="scratch-layer" data-target="main" style="left:20px; top:250px; width:320px; height:400px; z-index:10;"></canvas>
        </div>
    </div>

    <div id="pop-overlay">
        <div class="modal">
            <h2 id="res-title">BIG WIN!</h2>
            <div class="win-amt" id="res-amt">$0.00</div>
            <button onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        let balance = 100.00;
        let isGameEnded = false;
        const WIN_NUMBER = "88";
        let totalWin = 0;

        // --- 初始化与加载逻辑 ---
        async function startSequence() {
            // 1. 模拟后台加载背景图
            await new Promise(resolve => {
                const img = new Image();
                img.src = '64005.jpg';
                img.onload = resolve;
            });

            // 2. 填充矩阵
            buildMatrix();

            // 3. 执行倒计时
            const cd = document.getElementById('countdown');
            const nums = ['2', '1', 'GO!'];
            for (let n of nums) {
                await new Promise(r => setTimeout(r, 1000));
                cd.innerText = n;
            }

            // 4. 展示游戏
            document.getElementById('loader-screen').style.display = 'none';
            document.getElementById('app-viewport').style.opacity = '1';

            // 5. 初始化画布
            initCanvases();
        }

        function buildMatrix() {
            const inner = document.getElementById('matrix-inner');
            let html = '';
            for(let i=0; i<30; i++) {
                const num = Math.random() > 0.8 ? "88" : Math.floor(Math.random()*90+10);
                const prize = (Math.random()*100).toFixed(2);
                if(num == WIN_NUMBER) totalWin += parseFloat(prize);
                html += `<div class="cell"><span class="val">${num}</span><span class="amt">$${prize}</span></div>`;
            }
            inner.innerHTML = html;
        }

        function initCanvases() {
            document.querySelectorAll('.scratch-layer').forEach(canvas => {
                const ctx = canvas.getContext('2d');
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
                
                // 绘制银色涂层
                ctx.fillStyle = '#c0c0c0';
                ctx.fillRect(0,0,canvas.width, canvas.height);
                
                // 绘制欧元暗纹
                ctx.fillStyle = "rgba(0,0,0,0.1)";
                ctx.font = "14px Arial";
                for(let i=0;i<canvas.width+20;i+=30)
                    for(let j=0;j<canvas.height+20;j+=30) ctx.fillText("€", i, j);

                setupScratch(canvas, ctx);
            });
        }

        function setupScratch(canvas, ctx) {
            let drawing = false;

            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                return { x: clientX - rect.left, y: clientY - rect.top };
            };

            const scratch = (e) => {
                if(!drawing) return;
                const pos = getPos(e);
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 25, 0, Math.PI*2);
                ctx.fill();
                checkCompletion(canvas, ctx);
            };

            canvas.addEventListener('mousedown', () => drawing = true);
            window.addEventListener('mouseup', () => drawing = false);
            canvas.addEventListener('mousemove', scratch);
            canvas.addEventListener('touchstart', (e) => { drawing = true; e.preventDefault(); });
            canvas.addEventListener('touchmove', (e) => { scratch(e); e.preventDefault(); });
        }

        // --- 核心：计算刮除面积 ---
        function checkCompletion(canvas, ctx) {
            if (isGameEnded) return;

            // 每隔 20 像素取样一次，提升性能
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let clearedPixels = 0;
            for (let i = 3; i < imageData.length; i += 4) {
                if (imageData[i] === 0) clearedPixels++;
            }

            const percent = clearedPixels / (imageData.length / 4);
            
            // 如果主区域刮开 90% 以上
            if (canvas.dataset.target === 'main' && percent > 0.90) {
                endGame();
            }
        }

        function endGame() {
            if(isGameEnded) return;
            isGameEnded = true;

            // 自动清除所有画布
            document.querySelectorAll('canvas').forEach(c => c.style.display = 'none');

            // 判定结果
            setTimeout(() => {
                const overlay = document.getElementById('pop-overlay');
                const title = document.getElementById('res-title');
                const amtDisp = document.getElementById('res-amt');
                const balDisp = document.getElementById('balance-val');

                if(totalWin > 0) {
                    title.innerText = "CONGRATULATIONS!";
                    amtDisp.innerText = `+$${totalWin.toFixed(2)}`;
                    balance += totalWin;
                } else {
                    title.innerText = "NO LUCK THIS TIME";
                    amtDisp.innerText = "$0.00";
                    amtDisp.style.color = "#888";
                }

                balDisp.innerText = `$${balance.toFixed(2)}`;
                overlay.style.display = 'flex';
            }, 500);
        }

        window.onload = startSequence;
    </script>
</body>
</html>
