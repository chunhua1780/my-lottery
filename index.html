<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刮刮乐优化版</title>
<style>
body{
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    position:relative;
    width:360px;
    height:740px;
    background:url('64005.jpg') no-repeat;
    background-size:cover;
}

.layer{
    position:absolute;
    top:150px;
    left:20px;
    width:320px;
    height:560px;
}

/* 数字格子 */
.cell{
    position:absolute;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-weight:900;
    color:#000;
    -webkit-text-stroke:1.5px #fff;
    text-align:center;
}

.num{
    font-size:26px;
}

.money{
    font-size:12px;
    color:#d40000;
    margin-top:-3px;
}

/* canvas */
canvas{
    position:absolute;
    left:20px;
    z-index:10;
    border-radius:4px;
}
</style>
</head>
<body>

<div class="card">

    <div class="layer" id="layer"></div>

    <!-- 玩法区刮层 -->
    <canvas id="scratchWin"></canvas>

    <!-- 刮奖区刮层 -->
    <canvas id="scratchPrize"></canvas>

</div>

<script>
const layer = document.getElementById('layer');

/* =========================
   🎯 精准 5x6 龙圆坐标
========================= */
const positions = [];
let startX = 26;  // 左侧起点
let startY = 140; // 上侧起点
let gapX = 52;    // 横向间距
let gapY = 60;    // 纵向间距

for(let r=0;r<5;r++){
    for(let c=0;c<6;c++){
        positions.push({
            x: startX + c*gapX,
            y: startY + r*gapY
        });
    }
}

/* =========================
   🎰 中奖号码
========================= */
const winNumber = Math.floor(Math.random()*90)+10;

const winDiv = document.createElement('div');
winDiv.className='cell num';
winDiv.style.left='160px';
winDiv.style.top='40px';
winDiv.innerHTML = `
    <div class="num">${winNumber}</div>
`;
layer.appendChild(winDiv);

/* =========================
   🎯 生成 30 个龙圆
========================= */
positions.forEach(pos=>{
    let num = Math.floor(Math.random()*90)+10;
    let prize = Math.floor(Math.random()*1000000); // 0~100万
    let isWin = num === winNumber;

    let d = document.createElement('div');
    d.className='cell';
    d.style.left=pos.x+'px';
    d.style.top=pos.y+'px';

    d.innerHTML = `
        <div class="num">${num}</div>
        <div class="money">${prize>0?'¥'+prize:''}</div>
    `;

    if(isWin){
        d.style.color='red';
        d.style.transform='translate(-50%,-50%) scale(1.2)';
    } else {
        d.style.transform='translate(-50%,-50%)';
    }

    layer.appendChild(d);
});

/* =========================
   🎰 Canvas 涂层通用函数
========================= */
function setup(canvas, height){
    const ctx = canvas.getContext('2d');
    canvas.width=320;
    canvas.height=height;

    ctx.fillStyle='#bbb';
    ctx.fillRect(0,0,320,height);

    for(let i=0;i<800;i++){
        ctx.fillStyle=Math.random()>0.5?'#eee':'#888';
        ctx.fillRect(Math.random()*320,Math.random()*height,1,1);
    }

    return ctx;
}

/* 玩法区 canvas */
const scratchWinCanvas = document.getElementById('scratchWin');
scratchWinCanvas.style.top="10px";
const ctxWin = setup(scratchWinCanvas,80);

/* 刮奖区 canvas */
const scratchPrizeCanvas = document.getElementById('scratchPrize');
scratchPrizeCanvas.style.top="330px";
const ctxPrize = setup(scratchPrizeCanvas,300);

/* =========================
   ✋ 刮奖逻辑
========================= */
function scratch(canvas, ctx){
    let down=false;
    let count=0;

    function draw(e){
        if(!down) return;
        const rect = canvas.getBoundingClientRect();
        const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
        const y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;

        ctx.globalCompositeOperation='destination-out';
        ctx.beginPath();
        ctx.arc(x,y,18,0,Math.PI*2);
        ctx.fill();

        count++;
        if(count>500){
            ctx.clearRect(0,0,canvas.width,canvas.height);
        }
    }

    canvas.onmousedown=()=>down=true;
    canvas.onmouseup=()=>down=false;
    canvas.onmousemove=draw;

    canvas.ontouchstart=e=>{down=true;draw(e)};
    canvas.ontouchend=()=>down=false;
    canvas.ontouchmove=e=>{e.preventDefault();draw(e)};
}

scratch(scratchWinCanvas, ctxWin);
scratch(scratchPrizeCanvas, ctxPrize);
</script>

</body>
</html>
