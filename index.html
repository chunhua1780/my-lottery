<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=360, user-scalable=no">
    <title>GOLDEN LUCK - ABSOLUTE FIX</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;900&family=Oswald:wght@700&family=Dancing+Script:wght@700&display=swap');

        :root { --gold: #fcc201; --panel: rgba(15, 15, 20, 0.95); }
        body { margin: 0; background: #000; color: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; touch-action: none; }

        /* --- 1. 流行风倒计时 (极简扩散) --- */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 99999;
            display: flex; justify-content: center; align-items: center;
        }
        .cd-wrap { text-align: center; }
        .cd-num { 
            font-size: 100px; font-weight: 900; color: var(--gold);
            filter: drop-shadow(0 0 20px var(--gold));
            animation: zoom 1s infinite alternate;
        }
        @keyframes zoom { from { transform: scale(0.8); opacity: 0.6; } to { transform: scale(1.1); opacity: 1; } }

        /* --- 2. 优美小型对话框 (iOS 通知风格) --- */
        #modern-dialog {
            position: fixed; top: -180px; left: 50%; transform: translateX(-50%);
            width: 300px; height: 110px;
            background: var(--panel); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(252, 194, 1, 0.5); border-radius: 25px;
            z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            transition: top 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        #modern-dialog.active { top: 25px; pointer-events: auto; }
        .d-title { font-size: 20px; font-weight: 900; color: var(--gold); margin: 0; }
        .d-msg { font-family: 'Dancing Script'; font-size: 15px; color: #eee; margin: 4px 0; }
        .d-bal { background: rgba(0,255,135,0.1); padding: 3px 15px; border-radius: 12px; border: 1px solid rgba(0,255,135,0.3); color: #00ff87; font-family: 'Oswald'; font-size: 14px; margin-top: 5px; }

        /* --- 3. 游戏核心 --- */
        #stage { position: relative; width: 360px; height: 720px; margin: 0 auto; background: #111 url('64005.jpg') center/100% 100% no-repeat; opacity: 0; transition: opacity 1s; }
        #win-area { position: absolute; left: 151px; top: 263px; width: 72px; height: 66px; display: flex; align-items: center; justify-content: center; color: #09140d; font-size: 26px; font-weight: 900; }
        #grid-area { position: absolute; left: 27px; top: 335px; width: 310px; height: 284px; display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(5, 1fr); gap: 10px; padding: 5px; box-sizing: border-box; }
        .cell { text-align: center; color: #09140d; }
        .cell b { font-size: 18px; display: block; }
        .cell i { font-family: 'Oswald'; font-size: 10px; color: #d00; font-style: normal; }

        canvas { position: absolute; z-index: 100; touch-action: none; cursor: crosshair; }
    </style>
</head>
<body>

    <div id="loader"><div class="cd-wrap"><div id="cd" class="cd-num">3</div></div></div>

    <div id="modern-dialog">
        <div class="d-title" id="dt">LUCKY REVEAL</div>
        <div class="d-msg" id="dm">Magic is happening...</div>
        <div class="d-bal">WALLET: <span id="db">$100.00</span></div>
    </div>

    <div id="stage">
        <div id="win-area">88</div>
        <div id="grid-area"></div>
        <canvas id="c_win" style="left:153px; top:258px; width:71px; height:52px;"></canvas>
        <canvas id="c_grid" style="left:22px; top:322px; width:317px; height:300px;"></canvas>
    </div>

    <script>
        let balance = 100.00, isEnded = false, winTotal = 0;
        let sensorPoints = []; // 物理感应点
        let hitCount = 0;

        // 1. 流行倒计时
        async function run() {
            const el = document.getElementById('cd');
            for(let s of ['2','1','GO']) {
                await new Promise(r => setTimeout(r, 900));
                el.innerText = s;
            }
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('stage').style.opacity = '1';
                init();
            }, 500);
        }

        // 2. 初始化感应点和网格
        function init() {
            const g = document.getElementById('grid-area');
            let h = "";
            for(let i=0; i<30; i++) {
                const n = Math.random() > 0.88 ? "88" : Math.floor(Math.random()*89+10);
                const p = (Math.random()*50+10).toFixed(2);
                if(n === "88") winTotal += parseFloat(p);
                h += `<div class="cell"><b>${n}</b><i>$${p}</i></div>`;
            }
            g.innerHTML = h;

            // 预设 20 个物理感应坐标点（均匀分布在 c_grid 区域内）
            for(let i=0; i<5; i++) {
                for(let j=0; j<4; j++) {
                    sensorPoints.push({
                        x: 40 + j * 75,
                        y: 40 + i * 55,
                        hit: false
                    });
                }
            }

            setupCanvas("c_win");
            setupCanvas("c_grid");
        }

        function setupCanvas(id) {
            const cvs = document.getElementById(id);
            const ctx = cvs.getContext('2d');
            cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight;

            // 涂层美化
            ctx.fillStyle = '#b8b8b8';
            ctx.fillRect(0,0,cvs.width, cvs.height);
            ctx.fillStyle = "rgba(0,0,0,0.15)";
            ctx.font = "bold 16px Arial";
            for(let x=5; x<cvs.width; x+=28) 
                for(let y=18; y<cvs.height; y+=28) ctx.fillText((x+y)%2===0 ? "$":"€", x, y);

            const scratch = (e) => {
                if(isEnded) return;
                const r = cvs.getBoundingClientRect();
                const x = (e.clientX || (e.touches && e.touches[0].clientX)) - r.left;
                const y = (e.clientY || (e.touches && e.touches[0].clientY)) - r.top;

                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x, y, 35, 0, Math.PI*2); ctx.fill();

                // 物理判定核心：检查坐标碰撞
                if(id === "c_grid") {
                    sensorPoints.forEach(p => {
                        if(!p.hit) {
                            const dist = Math.sqrt((x - p.x)**2 + (y - p.y)**2);
                            if(dist < 35) {
                                p.hit = true;
                                hitCount++;
                                // 70% 阈值 (20个点中满14个)
                                if(hitCount >= 14) triggerPopup();
                            }
                        }
                    });
                }
            };

            let painting = false;
            cvs.addEventListener('mousedown', () => painting = true);
            window.addEventListener('mouseup', () => painting = false);
            cvs.addEventListener('mousemove', (e) => { if(painting) scratch(e); });
            cvs.addEventListener('touchstart', (e) => { painting = true; scratch(e); e.preventDefault(); });
            cvs.addEventListener('touchmove', (e) => { scratch(e); e.preventDefault(); });
        }

        function triggerPopup() {
            if(isEnded) return;
            isEnded = true;

            // 彻底清除涂层
            document.querySelectorAll('canvas').forEach(c => c.style.display = 'none');

            const dialog = document.getElementById('modern-dialog');
            document.getElementById('db').innerText = `$${(balance + winTotal).toFixed(2)}`;
            
            if(winTotal > 0) {
                document.getElementById('dt').innerText = "YOU WON!";
                document.getElementById('dm').innerText = `Amazing! You found $${winTotal.toFixed(2)}`;
            } else {
                document.getElementById('dt').innerText = "LUCKY NEXT!";
                document.getElementById('dm').innerText = "Fortune is just one scratch away.";
            }

            // 强制弹出
            dialog.classList.add('active');
            if(navigator.vibrate) navigator.vibrate(200);
        }

        window.onload = run;
    </script>
</body>
</html>
