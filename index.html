<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCRATCH PRO - UI CALIBRATION TOOL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Oswald:wght@700&family=Bebas+Neue&display=swap');

        :root {
            /* 基础布局 - 由JS实时驱动更新 */
            --win-num-size: 32px;
            --slot-num-size: 20px;
            --slot-amt-size: 12px;
            --amt-spacing: 2px;
            --grid-gap-x: 10px;
            --grid-gap-y: 15px;
            --grid-x: 20px;
            --grid-y: 240px;
            --num-color: #ffffff;
            --amt-color: #d32f2f;
        }

        body {
            margin: 0; padding: 0; background: #0a0a0a;
            color: #fff; font-family: 'Montserrat', sans-serif;
            display: flex; height: 100vh; overflow: hidden;
        }

        /* --- 1. 高端倒计时动画 --- */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: flex; justify-content: center; align-items: center;
        }
        .count-wrap {
            font-size: 180px; font-family: 'Bebas Neue';
            background: linear-gradient(45deg, #ff00cc, #3333ff, #00ffcc);
            background-size: 200%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(0, 255, 204, 0.5));
            animation: flow 2s linear infinite, countIn 1s cubic-bezier(0.17, 0.89, 0.32, 1.49) infinite;
        }
        @keyframes flow { to { background-position: 200%; } }
        @keyframes countIn {
            0% { transform: scale(0.5) rotate(-10deg); opacity: 0; filter: blur(10px); }
            50% { transform: scale(1.2) rotate(5deg); opacity: 1; filter: blur(0); }
            100% { transform: scale(1) rotate(0); opacity: 0; }
        }

        /* --- 2. 调试面板 UI --- */
        #debug-panel {
            width: 320px; background: #151515; border-right: 1px solid #333;
            padding: 15px; overflow-y: auto; z-index: 1000;
            font-size: 12px; color: #ccc;
        }
        .debug-section { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .debug-section h3 { color: #00ffcc; font-size: 14px; margin-bottom: 10px; }
        .ctrl-row { margin-bottom: 8px; }
        .ctrl-row label { display: block; margin-bottom: 4px; color: #888; }
        .ctrl-row input[type="range"] { width: 100%; accent-color: #ff00cc; }
        .ctrl-row select, .ctrl-row input[type="color"] { width: 100%; background: #222; border: 1px solid #444; color: #fff; padding: 5px; }
        button.primary-btn { width: 100%; padding: 10px; background: #ff00cc; border: none; color: #fff; font-weight: 900; cursor: pointer; border-radius: 4px; }
        button.secondary-btn { width: 100%; padding: 8px; background: #333; border: 1px solid #444; color: #fff; margin-top: 5px; cursor: pointer; }

        /* --- 3. 游戏预览区 --- */
        #viewport {
            flex: 1; display: flex; justify-content: center; align-items: center;
            background-image: radial-gradient(#222 1px, transparent 1px); background-size: 20px 20px;
            position: relative;
        }

        #game-container {
            position: relative; width: 360px; height: 720px;
            background-image: url('64005.jpg'); /* 请确保图片在同级目录 */
            background-size: 100% 100%;
            background-color: #333;
            border-radius: 10px; box-shadow: 0 0 50px rgba(0,0,0,0.8);
            overflow: hidden;
            opacity: 0; transform: scale(0.9);
            transition: opacity 0.8s, transform 0.8s cubic-bezier(0.17, 0.89, 0.32, 1.49);
        }
        #game-container.active { opacity: 1; transform: scale(1); }

        /* 底层号码 */
        #win-area {
            position: absolute; display: flex; justify-content: center; align-items: center;
            font-weight: 900; font-family: 'Bebas Neue';
        }

        #grid-container {
            position: absolute; display: grid; grid-template-columns: repeat(5, 1fr);
        }
        .cell { display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .cell .n { font-weight: 900; line-height: 1; }
        .cell .a { font-family: 'Oswald'; font-weight: 700; }

        /* Canvas 层 */
        canvas { position: absolute; z-index: 10; cursor: crosshair; touch-action: none; transition: opacity 0.2s; }
        .canvas-hidden { opacity: 0 !important; pointer-events: none; }

        /* --- 4. 结果弹窗 --- */
        #result-pop {
            position: absolute; left: 50%; top: 100px; transform: translateX(-50%) translateY(20px);
            width: 260px; background: rgba(255, 255, 255, 0.95); border-radius: 20px;
            padding: 20px; text-align: center; color: #222; z-index: 100;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); display: none; opacity: 0;
            transition: all 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.49);
        }
        #result-pop.show { display: block; opacity: 1; transform: translateX(-50%) translateY(0); }
        .pop-title { font-size: 22px; font-weight: 900; margin-bottom: 5px; }
        .pop-msg { font-size: 14px; line-height: 1.4; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="loader"><div class="count-wrap" id="cd">3</div></div>

    <div id="debug-panel">
        <div class="debug-section">
            <h3>🎨 刮层视觉系统</h3>
            <div class="ctrl-row">
                <label>涂层主颜色</label>
                <input type="color" id="cfg-canvasColor" value="#aaaaaa" oninput="updateUI()">
            </div>
            <div class="ctrl-row">
                <label>颗粒密度 (Density)</label>
                <input type="range" id="cfg-grainDensity" min="0" max="100" value="50" oninput="updateUI()">
            </div>
            <div class="ctrl-row">
                <label>纹理类型</label>
                <select id="cfg-textureType" onchange="updateUI()">
                    <option value="none">无纹理</option>
                    <option value="noise">噪点颗粒</option>
                    <option value="brushed">金属拉丝</option>
                    <option value="stripes">防伪条纹</option>
                </select>
            </div>
            <button class="secondary-btn" onclick="toggleCanvas()">👁️ 显示/隐藏 刮层</button>
        </div>

        <div class="debug-section">
            <h3>📐 区域 1 (中奖号码区)</h3>
            <div class="ctrl-row"><label>Canvas X</label><input type="range" id="cfg-winX" min="0" max="360" value="145" oninput="updateUI()"></div>
            <div class="ctrl-row"><label>Canvas Y</label><input type="range" id="cfg-winY" min="0" max="720" value="130" oninput="updateUI()"></div>
            <div class="ctrl-row"><label>字体大小</label><input type="range" id="cfg-winFS" min="10" max="60" value="32" oninput="updateUI()"></div>
        </div>

        <div class="debug-section">
            <h3>📐 区域 2 (主刮奖区)</h3>
            <div class="ctrl-row"><label>Grid Y 偏移</label><input type="range" id="cfg-gridY" min="100" max="600" value="260" oninput="updateUI()"></div>
            <div class="ctrl-row"><label>横向间距 (GapX)</label><input type="range" id="cfg-gapX" min="0" max="40" value="10" oninput="updateUI()"></div>
            <div class="ctrl-row"><label>纵向间距 (GapY)</label><input type="range" id="cfg-gapY" min="0" max="40" value="18" oninput="updateUI()"></div>
            <div class="ctrl-row"><label>Canvas 宽度</label><input type="range" id="cfg-mainW" min="100" max="360" value="320" oninput="updateUI()"></div>
            <div class="ctrl-row"><label>Canvas 高度</label><input type="range" id="cfg-mainH" min="100" max="500" value="420" oninput="updateUI()"></div>
        </div>

        <div class="debug-section">
            <h3>💰 数字样式</h3>
            <div class="ctrl-row">
                <label>奖金颜色</label>
                <input type="color" id="cfg-amtColor" value="#d32f2f" oninput="updateUI()">
            </div>
            <div class="ctrl-row"><label>奖金字体大小</label><input type="range" id="cfg-amtFS" min="8" max="24" value="12" oninput="updateUI()"></div>
        </div>

        <button class="primary-btn" onclick="copyConfig()">📋 导出当前参数</button>
    </div>

    <div id="viewport">
        <div id="game-container">
            <div id="win-area">88</div>
            <div id="grid-container"></div>
            
            <canvas id="cvs-win"></canvas>
            <canvas id="cvs-main"></canvas>

            <div id="result-pop">
                <div class="pop-title" id="pop-status">WINNER!</div>
                <div class="pop-msg" id="pop-text">Amazing luck!</div>
                <button class="secondary-btn" style="background:#ff00cc;border:none" onclick="location.reload()">Try Again</button>
            </div>
        </div>
    </div>

    <script>
        // --- 初始化配置 ---
        const cfg = {};
        const winTarget = Math.floor(Math.random() * 90) + 10;
        let isWinDone = false;
        let isMainDone = false;

        // 获取所有输入项并初始化
        function updateUI() {
            const inputs = document.querySelectorAll('#debug-panel input, #debug-panel select');
            inputs.forEach(input => {
                const key = input.id.replace('cfg-', '');
                cfg[key] = input.value;
            });

            // 更新 CSS 变量
            const root = document.documentElement;
            root.style.setProperty('--win-num-size', cfg.winFS + 'px');
            root.style.setProperty('--grid-y', cfg.gridY + 'px');
            root.style.setProperty('--grid-gap-x', cfg.gapX + 'px');
            root.style.setProperty('--grid-gap-y', cfg.gapY + 'px');
            root.style.setProperty('--slot-amt-size', cfg.amtFS + 'px');
            root.style.setProperty('--amt-color', cfg.amtColor);

            // 更新中奖区位置
            const winBox = document.getElementById('win-area');
            winBox.style.left = cfg.winX + 'px';
            winBox.style.top = cfg.winY + 'px';
            winBox.style.width = "80px"; // 默认固定宽度
            winBox.style.height = "80px";

            // 重绘 Canvas
            renderCanvas('cvs-win', cfg.winX, cfg.winY, 80, 80);
            renderCanvas('cvs-main', 20, cfg.gridY - 10, cfg.mainW, cfg.mainH);
        }

        // --- 核心纹理渲染引擎 ---
        function renderCanvas(id, x, y, w, h) {
            const cvs = document.getElementById(id);
            if(cvs.dataset.init === "true" && !configChanged()) return; // 避免刮的时候重刷

            cvs.width = w; cvs.height = h;
            cvs.style.left = x + 'px';
            cvs.style.top = y + 'px';
            const ctx = cvs.getContext('2d');

            // 1. 填充基色
            ctx.fillStyle = cfg.canvasColor;
            ctx.fillRect(0, 0, w, h);

            // 2. 噪点颗粒感
            const density = cfg.grainDensity / 100;
            for (let i = 0; i < (w * h * density * 0.2); i++) {
                ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.3})`;
                ctx.fillRect(Math.random() * w, Math.random() * h, 1, 1);
            }

            // 3. 纹理合成
            ctx.globalAlpha = 0.15;
            if (cfg.textureType === 'brushed') {
                for (let i = 0; i < h; i += 2) {
                    ctx.fillRect(0, i, w, 1);
                }
            } else if (cfg.textureType === 'stripes') {
                ctx.lineWidth = 2;
                for (let i = -w; i < w; i += 10) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0); ctx.lineTo(i + h, h);
                    ctx.stroke();
                }
            }
            ctx.globalAlpha = 1.0;
            initScratchLogic(cvs, ctx);
        }

        // --- 刮开逻辑 ---
        function initScratchLogic(cvs, ctx) {
            let isDrawing = false;
            const scrub = (e) => {
                if (!isDrawing) return;
                const rect = cvs.getBoundingClientRect();
                const pos = e.touches ? e.touches[0] : e;
                const offsetX = pos.clientX - rect.left;
                const offsetY = pos.clientY - rect.top;

                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(offsetX, offsetY, 18, 0, Math.PI * 2);
                ctx.fill();
            };

            const end = () => {
                isDrawing = false;
                checkWin(cvs, ctx);
            };

            cvs.onmousedown = (e) => { isDrawing = true; scrub(e); };
            cvs.ontouchstart = (e) => { isDrawing = true; scrub(e); };
            window.onmousemove = scrub;
            window.ontouchmove = scrub;
            window.onmouseup = end;
            window.ontouchend = end;
        }

        // --- 完成度检测 ---
        function checkWin(cvs, ctx) {
            const data = ctx.getImageData(0, 0, cvs.width, cvs.height).data;
            let count = 0;
            for (let i = 3; i < data.length; i += 4) { if (data[i] === 0) count++; }
            const ratio = count / (cvs.width * cvs.height);

            if (ratio > 0.95) {
                cvs.style.opacity = "0";
                if (cvs.id === 'cvs-win') isWinDone = true;
                if (cvs.id === 'cvs-main') isMainDone = true;
                if (isWinDone && isMainDone) showPop();
            }
        }

        function showPop() {
            const pop = document.getElementById('result-pop');
            pop.style.display = 'block';
            setTimeout(() => pop.classList.add('show'), 50);
        }

        function toggleCanvas() {
            document.querySelectorAll('canvas').forEach(c => c.classList.toggle('canvas-hidden'));
        }

        function configChanged() { return false; } // 调优工具简易化处理

        function copyConfig() {
            const json = JSON.stringify(cfg, null, 2);
            navigator.clipboard.writeText(json);
            alert("配置已复制到剪贴板！\n" + json);
        }

        // --- 启动流程 ---
        window.onload = () => {
            // 生成数字
            const grid = document.getElementById('grid-container');
            const winArea = document.getElementById('win-area');
            winArea.innerText = winTarget;
            
            let gridHtml = '';
            for(let i=0; i<30; i++) {
                const n = Math.random() > 0.8 ? winTarget : Math.floor(Math.random()*90)+10;
                const p = [5,10,20,50,100,500][Math.floor(Math.random()*6)];
                gridHtml += `<div class="cell"><div class="n">${n}</div><div class="a">$${p}$</div></div>`;
            }
            grid.innerHTML = gridHtml;

            updateUI();

            // 倒计时
            let count = 3;
            const cd = document.getElementById('cd');
            const timer = setInterval(() => {
                count--;
                if(count > 0) cd.innerText = count;
                else {
                    clearInterval(timer);
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('game-container').classList.add('active');
                }
            }, 1000);
        };
    </script>
</body>
</html>
