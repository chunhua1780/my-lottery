<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=360, user-scalable=no">
    <title>GOLDEN LUCK - DUAL DETECTION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Oswald:wght@700&family=Dancing+Script:wght@700&display=swap');

        :root { --gold: #fcc201; --panel-bg: rgba(15, 15, 20, 0.95); }
        body { margin: 0; background: #000; color: #fff; font-family: 'Montserrat', sans-serif; overflow: hidden; }

        /* --- 1. 倒计时 (炫丽 3D 缩放效果) --- */
        #loader {
            position: fixed; inset: 0; background: radial-gradient(circle, #333 0%, #000 100%);
            z-index: 9999; display: flex; justify-content: center; align-items: center;
        }
        .count-num {
            font-size: 150px; color: var(--gold); text-shadow: 0 0 40px var(--gold);
            animation: countAnim 1s ease-in-out infinite;
        }
        @keyframes countAnim {
            0% { transform: scale(0.1); opacity: 0; filter: blur(10px); }
            50% { transform: scale(1.1); opacity: 1; filter: blur(0); }
            100% { transform: scale(1.4); opacity: 0; }
        }

        /* --- 2. 游戏容器 (JSON 核心坐标) --- */
        #stage {
            opacity: 0; transition: opacity 1s ease;
            position: relative; width: 360px; height: 720px; margin: 0 auto;
            background: #222 url('64005.jpg') center/100% 100% no-repeat;
        }

        /* 中奖号微调 (向上移 3px -> top: 263px) */
        #win-val {
            position: absolute; left: 151px; top: 263px; width: 72px; height: 66px;
            display: flex; align-items: center; justify-content: center;
            color: #09140d; font-size: 26px; font-weight: 900;
        }

        /* 矩阵区 (310x284) */
        #grid-val {
            position: absolute; left: 27px; top: 335px; width: 310px; height: 284px;
            display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(5, 1fr);
            gap: 10px; padding: 5px; box-sizing: border-box;
        }
        .cell { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .cell b { font-size: 18px; color: #09140d; }
        .cell i { font-family: 'Oswald'; font-style: normal; font-size: 10px; color: #d00; }

        /* 画布 (极致干脆刮除) */
        canvas { position: absolute; z-index: 20; touch-action: none; cursor: crosshair; }

        /* --- 3. 顶部可爱弹出窗 (位于刮奖区上方) --- */
        #result-popup {
            position: absolute; top: -180px; left: 20px; right: 20px; height: 130px;
            background: var(--panel-bg); border: 3px solid var(--gold); border-radius: 25px;
            z-index: 1000; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }
        #result-popup.active { top: 40px; } /* 弹出后的位置 */

        .res-h1 { color: var(--gold); font-size: 24px; font-weight: 900; margin: 0; text-transform: uppercase; }
        .res-sub { font-family: 'Dancing Script'; font-size: 18px; color: #fff; margin: 5px 0; }
        .res-bal { font-family: 'Oswald'; color: #00ff88; font-size: 16px; letter-spacing: 1px; }

        /* 底部 HUD */
        #hud { position: absolute; bottom: 15px; width: 100%; text-align: center; color: rgba(255,255,255,0.3); font-size: 9px; }
    </style>
</head>
<body>

    <div id="loader"><div id="cd" class="count-num">3</div></div>

    <div id="result-popup">
        <div class="res-h1" id="rt">BIG WINNER!</div>
        <div class="res-sub" id="rs">May fortune always find you...</div>
        <div class="res-bal">WALLET: <span id="rb">$100.00</span></div>
    </div>

    <div id="stage">
        <div id="win-val">88</div>
        <div id="grid-val"></div>

        <canvas id="cvs_win" data-id="win" style="left:153px; top:258px; width:71px; height:52px;"></canvas>
        <canvas id="cvs_grid" data-id="grid" style="left:22px; top:322px; width:317px; height:300px;"></canvas>
        
        <div id="hud">DUAL-LAYER 90% SYNC DETECTOR v2.0</div>
    </div>

    <script>
        let balance = 100.00;
        let isOver = false;
        let winTotal = 0;
        // 追踪两个画布的刮开状态
        let state = { win: 0, grid: 0 }; 

        // 1. 倒计时
        async function start() {
            const el = document.getElementById('cd');
            const seq = ['2', '1', 'GO!'];
            for (let v of seq) {
                await new Promise(r => setTimeout(r, 1000));
                el.innerText = v;
            }
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('stage').style.opacity = '1';
                init();
            }, 800);
        }

        // 2. 初始化
        function init() {
            const g = document.getElementById('grid-val');
            let h = "";
            for(let i=0; i<30; i++) {
                const n = Math.random() > 0.88 ? "88" : Math.floor(Math.random()*89+10);
                const p = (Math.random()*100).toFixed(2);
                if(n === "88") winTotal += parseFloat(p);
                h += `<div class="cell"><b>${n}</b><i>$${p}</i></div>`;
            }
            g.innerHTML = h;

            setup("cvs_win");
            setup("cvs_grid");
        }

        function setup(id) {
            const c = document.getElementById(id);
            const ctx = c.getContext('2d', { willReadFrequently: true });
            c.width = c.offsetWidth; c.height = c.offsetHeight;

            // 绘制银色底层
            ctx.fillStyle = '#c0c0c0';
            ctx.fillRect(0,0,c.width, c.height);

            // 欧元美元混合符号 (€ / $)
            ctx.fillStyle = "rgba(0,0,0,0.15)";
            ctx.font = "bold 14px Arial";
            for(let x=5; x<c.width; x+=25) {
                for(let y=18; y<c.height; y+=25) {
                    ctx.fillText((x+y)%2===0 ? "€":"$", x, y);
                }
            }

            // 刮除交互
            let draw = false;
            const scratch = (e) => {
                if(!draw || isOver) return;
                const r = c.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - r.left;
                const y = (e.clientY || e.touches[0].clientY) - r.top;

                // 极致干脆效果：绝对清空，不留残影
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, 28, 0, Math.PI*2);
                ctx.fill();
                
                updateProgress(c, ctx);
            };

            c.addEventListener('mousedown', () => draw = true);
            window.addEventListener('mouseup', () => draw = false);
            c.addEventListener('mousemove', scratch);
            c.addEventListener('touchstart', (e) => { draw = true; e.preventDefault(); });
            c.addEventListener('touchmove', (e) => { scratch(e); e.preventDefault(); });
        }

        // 3. 双重判定逻辑
        function updateProgress(c, ctx) {
            const data = ctx.getImageData(0, 0, c.width, c.height).data;
            let clear = 0;
            // 采样加速算法
            for (let i = 3; i < data.length; i += 32) {
                if (data[i] === 0) clear++;
            }
            const ratio = clear / (data.length / 32);
            
            // 记录当前画布的比例
            state[c.dataset.id] = ratio;

            // 关键：当【中奖区】和【矩阵区】都超过 90% 时弹出
            if (state.win >= 0.9 && state.grid >= 0.9) {
                showResult();
            }
        }

        function showResult() {
            if(isOver) return;
            isOver = true;

            // 瞬间清空所有剩余涂层
            document.querySelectorAll('canvas').forEach(cvs => {
                cvs.style.opacity = '0';
                setTimeout(() => cvs.style.display = 'none', 500);
            });

            // 更新弹窗内容
            const pop = document.getElementById('result-popup');
            const rt = document.getElementById('rt');
            const rs = document.getElementById('rs');
            const rb = document.getElementById('rb');

            if(winTotal > 0) {
                rt.innerText = "BIG WINNER!";
                rt.style.color = "var(--gold)";
                rs.innerText = `You've just won $${winTotal.toFixed(2)}!`;
                balance += winTotal;
            } else {
                rt.innerText = "ALMOST THERE";
                rt.style.color = "#aaa";
                rs.innerText = "The luck is coming, try another one!";
            }

            rb.innerText = `$${balance.toFixed(2)}`;
            
            // 顶部滑入弹窗
            setTimeout(() => {
                pop.classList.add('active');
            }, 300);
        }

        window.onload = start;
    </script>
</body>
</html>
