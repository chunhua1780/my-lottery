<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国龙-双区独立调试器</title>
    <style>
        body { background: #1a1a1a; margin: 0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; font-family: sans-serif; overflow: hidden; }
        .card-container { position: relative; width: 360px; height: 720px; background: url('64005.jpg') no-repeat; background-size: cover; margin-top: 5px; flex-shrink: 0; box-shadow: 0 0 50px #000; }

        /* 数字层 */
        #win-box { position: absolute; z-index: 5; display: flex; justify-content: center; align-items: center; border: 1px dashed gold; pointer-events: none; }
        #my-grid { position: absolute; z-index: 5; display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(5, 1fr); border: 1px dashed cyan; pointer-events: none; }
        .num-item { display: flex; flex-direction: column; justify-content: center; align-items: center; color: #000; font-weight: 900; text-shadow: 1px 1px 0 #fff; line-height: 1.1; }
        .prize-item { color: #8B0000; font-weight: 900; }

        /* 刮奖图层 A & B */
        .scratch-layer { position: absolute; z-index: 10; touch-action: none; outline: 2px solid rgba(255,0,0,0.6); }

        /* 控制台 */
        .console { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; padding: 10px; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); z-index: 1000; max-height: 50vh; overflow-y: auto; }
        .tab-bar { display: flex; gap: 5px; margin-bottom: 10px; sticky: top; background: #fff; }
        .tab-btn { flex: 1; padding: 8px; font-size: 12px; border: none; background: #eee; border-radius: 5px; }
        .tab-btn.active { background: #ff4400; color: #fff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; background: #f9f9f9; padding: 5px; border-radius: 5px; }
        .btn-group { display: flex; align-items: center; gap: 3px; }
        .btn-group button { width: 30px; height: 30px; background: #444; color: #fff; border: none; border-radius: 4px; }
        .btn-group input { width: 45px; text-align: center; border: 1px solid #ccc; font-weight: bold; }
        .code-box { background: #222; color: #0f0; padding: 10px; font-family: monospace; font-size: 11px; margin-top: 5px; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div class="card-container">
        <div id="win-box"><div id="win-text" class="num-item">88</div></div>
        <div id="my-grid"></div>
        <canvas id="canv-a" class="scratch-layer"></canvas>
        <canvas id="canv-b" class="scratch-layer"></canvas>
    </div>

    <div class="console">
        <div class="tab-bar">
            <button class="tab-btn active" onclick="tab(0)">1.数字对齐</button>
            <button class="tab-btn" onclick="tab(1)">2.玩法区涂层(A)</button>
            <button class="tab-btn" onclick="tab(2)">3.数字区涂层(B)</button>
        </div>

        <div id="t0" class="tab-content active">
            <div class="row"><span>玩法区 Top</span><div class="btn-group"><button onclick="adj('wt',-1)">-</button><input id="wt" value="242"><button onclick="adj('wt',1)">+</button></div></div>
            <div class="row"><span>数字区 Top</span><div class="btn-group"><button onclick="adj('gt',-1)">-</button><input id="gt" value="328"><button onclick="adj('gt',1)">+</button></div></div>
            <div class="row"><span>数字区 Left</span><div class="btn-group"><button onclick="adj('gl',-1)">-</button><input id="gl" value="21"><button onclick="adj('gl',1)">+</button></div></div>
        </div>

        <div id="t1" class="tab-content">
            <div class="row"><span>涂层A Top</span><div class="btn-group"><button onclick="adj('at',-1)">-</button><input id="at" value="235"><button onclick="adj('at',1)">+</button></div></div>
            <div class="row"><span>涂层A Left</span><div class="btn-group"><button onclick="adj('al',-1)">-</button><input id="al" value="120"><button onclick="adj('al',1)">+</button></div></div>
            <div class="row"><span>涂层A 宽</span><div class="btn-group"><button onclick="adj('aw',-1)">-</button><input id="aw" value="115"><button onclick="adj('aw',1)">+</button></div></div>
            <div class="row"><span>涂层A 高</span><div class="btn-group"><button onclick="adj('ah',-1)">-</button><input id="ah" value="70"><button onclick="adj('ah',1)">+</button></div></div>
        </div>

        <div id="t2" class="tab-content">
            <div class="row"><span>涂层B Top</span><div class="btn-group"><button onclick="adj('bt',-1)">-</button><input id="bt" value="320"><button onclick="adj('bt',1)">+</button></div></div>
            <div class="row"><span>涂层B Left</span><div class="btn-group"><button onclick="adj('bl',-1)">-</button><input id="bl" value="18"><button onclick="adj('bl',1)">+</button></div></div>
            <div class="row"><span>涂层B 宽</span><div class="btn-group"><button onclick="adj('bw',-1)">-</button><input id="bw" value="324"><button onclick="adj('bw',1)">+</button></div></div>
            <div class="row"><span>涂层B 高</span><div class="btn-group"><button onclick="adj('bh',-1)">-</button><input id="bh" value="320"><button onclick="adj('bh',1)">+</button></div></div>
        </div>

        <div class="code-box" id="output">调好后，复制参数发给我</div>
    </div>

    <script>
        const grid = document.getElementById('my-grid');
        for (let i = 0; i < 30; i++) grid.innerHTML += `<div class="num-item">10<div class="prize-item">¥10</div></div>`;

        window.adj = (id, d) => { document.getElementById(id).value = parseInt(document.getElementById(id).value) + d; update(); }
        window.tab = (n) => { 
            document.querySelectorAll('.tab-btn, .tab-content').forEach((el, i) => {
                el.classList.toggle('active', i % 3 === n);
            });
        }

        function update() {
            const v = (id) => parseInt(document.getElementById(id).value);
            // 应用数字
            document.getElementById('win-box').style.cssText = `top:${v('wt')}px; left:126px; width:100px; height:60px;`;
            grid.style.cssText = `top:${v('gt')}px; left:${v('gl')}px; row-gap:5px; font-size:14px;`;
            
            // 应用涂层A
            const ca = document.getElementById('canv-a');
            ca.style.top = v('at') + 'px'; ca.style.left = v('al') + 'px';
            ca.width = v('aw'); ca.height = v('ah');
            draw(ca);

            // 应用涂层B
            const cb = document.getElementById('canv-b');
            cb.style.top = v('bt') + 'px'; cb.style.left = v('bl') + 'px';
            cb.width = v('bw'); cb.height = v('bh');
            draw(cb);

            document.getElementById('output').innerText = `涂层A: Top=${v('at')}, Left=${v('al')}, W=${v('aw')}, H=${v('ah')}\n涂层B: Top=${v('bt')}, Left=${v('bl')}, W=${v('bw')}, H=${v('bh')}`;
        }

        function draw(c) {
            const ctx = c.getContext('2d');
            ctx.fillStyle = '#BDBDBD'; ctx.fillRect(0,0,c.width,c.height);
            for(let i=0; i<500; i++) { ctx.fillStyle = Math.random()>0.5?'#EEE':'#888'; ctx.fillRect(Math.random()*c.width, Math.random()*c.height, 1, 1); }
        }

        // 刮开逻辑
        function setupScratch(c) {
            const ctx = c.getContext('2d'); let drawing = false;
            const handler = (e) => {
                if(!drawing) return;
                const r = c.getBoundingClientRect();
                const x = (e.touches?e.touches[0].clientX:e.clientX) - r.left;
                const y = (e.touches?e.touches[0].clientY:e.clientY) - r.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x,y,15,0,Math.PI*2); ctx.fill();
            }
            c.onmousedown = () => drawing = true;
            window.onmouseup = () => drawing = false;
            c.onmousemove = handler;
            c.ontouchstart = (e) => { drawing=true; handler(e); };
            c.ontouchmove = (e) => { e.preventDefault(); handler(e); };
        }

        setupScratch(document.getElementById('canv-a'));
        setupScratch(document.getElementById('canv-b'));
        update();
    </script>
</body>
</html>
