<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=360, user-scalable=no">
    <title>LUXE SCRATCH - CINEMATIC</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Dancing+Script:wght@700&family=Space+Mono&display=swap');

        :root { 
            --accent: #6366f1;
            --glass-bg: rgba(255, 255, 255, 0.8);
        }

        body { margin: 0; background: #f8fafc; color: #1e293b; font-family: 'Outfit', sans-serif; overflow: hidden; touch-action: none; }

        /* --- 1. 欧美流行网格渐变背景 (Mesh Gradient) --- */
        #loader {
            position: fixed; inset: 0; z-index: 100000;
            display: flex; justify-content: center; align-items: center;
            background: #fff;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(168, 85, 247, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(59, 130, 246, 0.15) 0px, transparent 50%);
            transition: all 1s ease-out;
        }

        .cd-circle {
            position: relative; width: 140px; height: 140px;
            display: flex; justify-content: center; align-items: center;
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .cd-num {
            font-size: 70px; font-weight: 900;
            background: linear-gradient(135deg, #4f46e5, #9333ea);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: pulse 0.9s infinite alternate;
        }

        @keyframes pulse { from { transform: scale(0.95); } to { transform: scale(1.05); } }

        /* --- 2. 优雅渐现对话框 (Soft Reveal) --- */
        #top-dialog {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-20px);
            width: 310px; padding: 20px 0;
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(160%); -webkit-backdrop-filter: blur(30px) saturate(160%);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 32px; z-index: 100001;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            
            /* 初始状态：不可见且模糊 */
            opacity: 0;
            filter: blur(10px);
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }
        
        /* 激活状态：慢慢显现 */
        #top-dialog.active { 
            opacity: 1; 
            filter: blur(0px);
            transform: translateX(-50%) translateY(0);
        }

        .d-title { font-size: 22px; font-weight: 900; color: #1e293b; margin: 0; }
        .d-msg { font-family: 'Dancing Script'; font-size: 16px; color: #475569; margin: 5px 0; }
        .d-bal-box { 
            margin-top: 10px; padding: 5px 24px; border-radius: 50px;
            background: #1e293b; color: #f8fafc;
            font-family: 'Space Mono', monospace; font-size: 14px;
        }

        /* --- 3. 舞台与画布 --- */
        #stage { 
            position: relative; width: 360px; height: 720px; margin: 0 auto; 
            background: #fff url('64005.jpg') center/100% 100% no-repeat; 
            opacity: 0; transition: opacity 1.5s ease;
        }
        
        #win-area { position: absolute; left: 151px; top: 263px; width: 72px; height: 66px; display: flex; align-items: center; justify-content: center; color: #0f172a; font-size: 26px; font-weight: 900; }
        #grid-area { position: absolute; left: 27px; top: 335px; width: 310px; height: 284px; display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(5, 1fr); gap: 10px; padding: 5px; box-sizing: border-box; }
        .cell b { font-size: 19px; display: block; font-weight: 900; color: #1e293b; text-align: center; }
        .cell i { font-family: 'Space Mono'; font-size: 9px; color: #ef4444; font-style: normal; display: block; text-align: center; }

        canvas { 
            position: absolute; z-index: 100; touch-action: none; 
            transition: opacity 1.2s ease-in-out; /* 画布渐隐效果 */
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="cd-circle">
            <div id="cd" class="cd-num">3</div>
        </div>
    </div>

    <div id="top-dialog">
        <div class="d-title" id="dt">LUCKY STATUS</div>
        <div class="d-msg" id="dm">Magic is in the air...</div>
        <div class="d-bal-box">
            BALANCE: <span id="db">$100.00</span>
        </div>
    </div>

    <div id="stage">
        <div id="win-area">88</div>
        <div id="grid-area"></div>
        <canvas id="c_win" style="left:153px; top:258px; width:71px; height:52px;"></canvas>
        <canvas id="c_grid" style="left:22px; top:322px; width:317px; height:300px;"></canvas>
    </div>

    <script>
        let balance = 100.00, isEnded = false, winTotal = 0;
        let sensorPoints = [];
        let hitCount = 0;

        // 1. 倒计时逻辑
        async function runCD() {
            const el = document.getElementById('cd');
            const steps = ['2', '1', 'GO'];
            for(let s of steps) {
                await new Promise(r => setTimeout(r, 900));
                el.innerText = s;
            }
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('stage').style.opacity = '1';
                initGame();
            }, 800);
        }

        function initGame() {
            const g = document.getElementById('grid-area');
            let h = "";
            for(let i=0; i<30; i++) {
                const n = Math.random() > 0.88 ? "88" : Math.floor(Math.random()*89+10);
                const p = (Math.random()*50+10).toFixed(2);
                if(n === "88") winTotal += parseFloat(p);
                h += `<div class="cell"><b>${n}</b><i>$${p}</i></div>`;
            }
            g.innerHTML = h;

            // 物理感应点
            for(let i=0; i<5; i++) 
                for(let j=0; j<4; j++) sensorPoints.push({ x: 40 + j * 75, y: 40 + i * 55, hit: false });

            setupCanvas("c_win");
            setupCanvas("c_grid");
        }

        function setupCanvas(id) {
            const cvs = document.getElementById(id);
            const ctx = cvs.getContext('2d');
            cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight;

            ctx.fillStyle = '#e2e8f0';
            ctx.fillRect(0,0,cvs.width, cvs.height);
            ctx.fillStyle = "rgba(100,116,139,0.1)";
            ctx.font = "bold 16px Arial";
            for(let x=5; x<cvs.width; x+=28) 
                for(let y=18; y<cvs.height; y+=28) ctx.fillText((x+y)%2===0 ? "€":"$", x, y);

            const scratch = (e) => {
                if(isEnded) return;
                const r = cvs.getBoundingClientRect();
                const x = (e.clientX || (e.touches && e.touches[0].clientX)) - r.left;
                const y = (e.clientY || (e.touches && e.touches[0].clientY)) - r.top;

                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x, y, 32, 0, Math.PI*2); ctx.fill();

                if(id === "c_grid") {
                    sensorPoints.forEach(p => {
                        if(!p.hit) {
                            const dist = Math.sqrt((x - p.x)**2 + (y - p.y)**2);
                            if(dist < 32) {
                                p.hit = true;
                                hitCount++;
                                if(hitCount >= 14) triggerSequence(); // 触发序列
                            }
                        }
                    });
                }
            };

            let paint = false;
            cvs.addEventListener('mousedown', () => paint = true);
            window.addEventListener('mouseup', () => paint = false);
            cvs.addEventListener('mousemove', (e) => { if(paint) scratch(e); });
            cvs.addEventListener('touchstart', (e) => { paint = true; scratch(e); e.preventDefault(); });
            cvs.addEventListener('touchmove', (e) => { scratch(e); e.preventDefault(); });
        }

        // 核心优化：延迟与渐现序列
        function triggerSequence() {
            if(isEnded) return;
            isEnded = true;

            // 1. 涂层软化：先让所有涂层用 1.2 秒慢慢变透明
            document.querySelectorAll('canvas').forEach(c => {
                c.style.opacity = '0';
            });

            // 2. 仪式感延迟：在刮完后等待 2.5 秒，让用户看清楚奖金
            setTimeout(() => {
                const dialog = document.getElementById('top-dialog');
                const dt = document.getElementById('dt');
                const dm = document.getElementById('dm');
                const db = document.getElementById('db');

                db.innerText = `$${(balance + winTotal).toFixed(2)}`;

                if(winTotal > 0) {
                    dt.innerText = "BIG WINNER!";
                    dm.innerText = `You've unlocked $${winTotal.toFixed(2)} rewards!`;
                } else {
                    dt.innerText = "GOOD LUCK";
                    dm.innerText = "The next big win is waiting for you.";
                }

                // 3. 渐渐显现对话框
                dialog.classList.add('active');
                
                if(navigator.vibrate) navigator.vibrate([50, 100, 50]);
            }, 2500); // 延迟时间
        }

        window.onload = runCD;
    </script>
</body>
</html>
