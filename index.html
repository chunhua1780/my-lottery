<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国龙-高精度调试器</title>
    <style>
        body { background: #1a1a1a; margin: 0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        
        /* 彩票容器 */
        .card-container { position: relative; width: 360px; height: 720px; background: url('64005.jpg') no-repeat; background-size: cover; margin: 10px; box-shadow: 0 0 50px rgba(0,0,0,0.8); flex-shrink: 0; }

        /* 元素图层 */
        #win-box { position: absolute; width: 100px; height: 60px; z-index: 5; display: flex; justify-content: center; align-items: center; border: 1px dashed rgba(255,255,255,0.5); }
        #my-grid { position: absolute; width: 312px; height: 280px; z-index: 5; display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(5, 1fr); border: 1px dashed rgba(255,255,255,0.3); }

        .num-item { display: flex; flex-direction: column; justify-content: center; align-items: center; color: #000; font-weight: 900; text-shadow: 1px 1px 0 #fff; line-height: 1.1; pointer-events: none; }
        .prize-item { color: #8B0000; font-weight: 900; }

        /* --- 调试控制台 --- */
        .console { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top-left-radius: 20px; border-top-right-radius: 20px; padding: 15px; box-shadow: 0 -5px 20px rgba(0,0,0,0.3); z-index: 1000; max-height: 45vh; overflow-y: auto; }
        .console-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .console-header h3 { margin: 0; font-size: 16px; color: #333; }
        
        .control-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; background: #f8f9fa; padding: 8px; border-radius: 8px; }
        .label-box { flex: 1; }
        .label-box b { font-size: 13px; display: block; }
        .label-box span { font-size: 11px; color: #666; }

        .btn-group { display: flex; align-items: center; gap: 5px; }
        .btn-group button { width: 35px; height: 35px; border: none; background: #007bff; color: #fff; border-radius: 5px; font-size: 20px; font-weight: bold; cursor: pointer; }
        .btn-group button:active { background: #0056b3; }
        .btn-group input { width: 45px; text-align: center; border: 1px solid #ddd; height: 31px; border-radius: 4px; font-weight: bold; }

        .code-box { background: #222; color: #00ff00; padding: 10px; font-family: monospace; font-size: 12px; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card-container">
        <div id="win-box"><div id="win-text" class="num-item">88</div></div>
        <div id="my-grid"></div>
    </div>

    <div class="console">
        <div class="console-header">
            <h3>🎮 像素级位置微调器</h3>
            <button onclick="copyCode()" style="font-size:12px; padding:4px 8px;">复制参数</button>
        </div>

        <div class="control-row">
            <div class="label-box"><b>玩法区 Top (高度)</b><span>数值越小越靠上</span></div>
            <div class="btn-group">
                <button onclick="adj('wt',-1)">-</button>
                <input type="number" id="wt" value="285" onchange="update()">
                <button onclick="adj('wt',1)">+</button>
            </div>
        </div>

        <div class="control-row">
            <div class="label-box"><b>圆圈区 Top (高度)</b><span>调整30个格子的起点</span></div>
            <div class="btn-group">
                <button onclick="adj('gt',-1)">-</button>
                <input type="number" id="gt" value="385" onchange="update()">
                <button onclick="adj('gt',1)">+</button>
            </div>
        </div>

        <div class="control-row">
            <div class="label-box"><b>圆圈区 Left (左右)</b><span>调整横向对齐</span></div>
            <div class="btn-group">
                <button onclick="adj('gl',-1)">-</button>
                <input type="number" id="gl" value="24" onchange="update()">
                <button onclick="adj('gl',1)">+</button>
            </div>
        </div>

        <div class="control-row">
            <div class="label-box"><b>行间距 (Gap)</b><span>调整上下圆圈的密度</span></div>
            <div class="btn-group">
                <button onclick="adj('rg',-1)">-</button>
                <input type="number" id="rg" value="5" onchange="update()">
                <button onclick="adj('rg',1)">+</button>
            </div>
        </div>

        <div class="control-row">
            <div class="label-box"><b>数字大小 (Size)</b><span>整体缩放</span></div>
            <div class="btn-group">
                <button onclick="adj('fs',-1)">-</button>
                <input type="number" id="fs" value="14" onchange="update()">
                <button onclick="adj('fs',1)">+</button>
            </div>
        </div>

        <div class="code-box" id="output">参数生成中...</div>
    </div>

    <script>
        const winBox = document.getElementById('win-box');
        const winText = document.getElementById('win-text');
        const myGrid = document.getElementById('my-grid');
        const output = document.getElementById('output');

        function init() {
            myGrid.innerHTML = '';
            for (let i = 0; i < 30; i++) {
                myGrid.innerHTML += `<div class="num-item" id="n-${i}">10<div class="prize-item">¥10W</div></div>`;
            }
            update();
        }

        // 调整函数
        window.adj = function(id, delta) {
            const el = document.getElementById(id);
            el.value = parseInt(el.value) + delta;
            update();
        }

        function update() {
            const wt = parseInt(document.getElementById('wt').value);
            const gt = parseInt(document.getElementById('gt').value);
            const gl = parseInt(document.getElementById('gl').value);
            const rg = parseInt(document.getElementById('rg').value);
            const fs = parseInt(document.getElementById('fs').value);

            // 实时应用
            winBox.style.top = wt + 'px';
            winText.style.fontSize = (fs + 8) + 'px';
            
            myGrid.style.top = gt + 'px';
            myGrid.style.left = gl + 'px';
            myGrid.style.rowGap = rg + 'px';

            document.querySelectorAll('.num-item').forEach(el => {
                if(el.id !== 'win-text') el.style.fontSize = fs + 'px';
            });
            document.querySelectorAll('.prize-item').forEach(el => {
                el.style.fontSize = (fs * 0.7) + 'px';
            });

            // 生成反馈文本
            output.innerText = `【调试成功！请复制以下数据】\n玩法区Top: ${wt}, 圆圈区Top: ${gt}, Left: ${gl}, Gap: ${rg}, Size: ${fs}`;
        }

        window.copyCode = function() {
            const text = output.innerText;
            navigator.clipboard.writeText(text).then(() => alert('参数已复制！请发给AI'));
        }

        init();
    </script>
</body>
</html>
