<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTIMATE DEBUG STUDIO V6.0</title>
    <style>
        :root { --neon: #00f2fe; --gold: #FFD700; --panel-bg: #111; }
        body { background: #000; margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; color: #fff; height: 100vh; overflow: hidden; }

        /* --- 左侧：实时预览区 --- */
        #stage { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #222; background-image: radial-gradient(#333 1px, transparent 1px); background-size: 20px 20px; }
        .canvas-card { position: relative; width: 360px; height: 720px; background-color: #444; background-size: 100% 100%; box-shadow: 0 0 50px #000; transition: transform 0.3s; }
        
        #w-num { position: absolute; z-index: 2; display: flex; justify-content: center; align-items: center; font-weight: 900; pointer-events: none; text-shadow: 0 0 2px white; }
        #grid { position: absolute; z-index: 2; display: grid; grid-template-columns: repeat(6, 1fr); pointer-events: none; }
        .item { display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: 900; }
        
        .layer { position: absolute; z-index: 10; touch-action: none; cursor: crosshair; }
        .hide-layer { opacity: 0 !important; pointer-events: none !important; }

        /* --- 右侧：全功能控制面板 --- */
        #controls { width: 400px; background: var(--panel-bg); border-left: 2px solid var(--neon); padding: 20px; overflow-y: auto; box-sizing: border-box; }
        h2 { color: var(--neon); font-size: 18px; margin: 0 0 20px 0; display: flex; justify-content: space-between; }
        .group { background: #1a1a1a; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; }
        .group h3 { margin: 0 0 12px 0; font-size: 11px; color: var(--neon); text-transform: uppercase; letter-spacing: 1px; }
        
        .ctrl-row { display: flex; align-items: center; margin-bottom: 10px; }
        .ctrl-row label { width: 120px; font-size: 11px; color: #888; }
        .ctrl-row input[type=range] { flex: 1; accent-color: var(--neon); }
        .ctrl-row span { width: 45px; text-align: right; color: var(--neon); font-family: monospace; font-size: 12px; }
        
        .btn { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-upload { background: #fff; color: #000; }
        .btn-ghost { background: #333; color: #fff; border: 1px solid #444; }
        .btn-ghost.active { background: #ff4757; border-color: #ff4757; }
        .btn-export { background: var(--neon); color: #000; font-size: 14px; margin-top: 20px; }
        
        #bubble-preview { position: absolute; left: 50%; transform: translateX(-50%); width: 300px; height: 120px; border: 2px solid var(--gold); border-radius: 20px; background: rgba(0,0,0,0.8); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; }
        #bubble-preview.active { opacity: 1; }
    </style>
</head>
<body>

<div id="stage">
    <div class="canvas-card" id="card">
        <div id="bubble-preview">
            <div style="color:var(--gold); font-weight:900;">CONGRATS</div>
            <div style="font-size:32px; font-weight:900;">$ 5,000 $</div>
        </div>
        <div id="w-num">88</div>
        <div id="grid"></div>
        <canvas id="c-win" class="layer"></canvas>
        <canvas id="c-main" class="layer"></canvas>
    </div>
</div>

<div id="controls">
    <h2>ENGINEER PANEL <span>V6.0</span></h2>
    
    <div class="group">
        <h3>0. 背景图片加载 (IMAGE)</h3>
        <input type="file" id="imgLoader" accept="image/*" style="display:none" onchange="handleImage(this)">
        <button class="btn btn-upload" onclick="document.getElementById('imgLoader').click()">📁 上传彩票原图 (64005.jpg)</button>
        <button id="ghost-btn" class="btn btn-ghost" onclick="toggleGhost()">👻 屏蔽涂层 (对齐模式)</button>
    </div>

    <div class="group">
        <h3>1. 中奖区 (WIN ZONE)</h3>
        <div class="ctrl-row"><label>垂直 Y</label><input type="range" min="100" max="600" value="273" oninput="upd('wt',this.value)"> <span id="v_wt">273</span></div>
        <div class="ctrl-row"><label>水平 X</label><input type="range" min="0" max="360" value="175" oninput="upd('wl',this.value)"> <span id="v_wl">175</span></div>
        <div class="ctrl-row"><label>数字大小</label><input type="range" min="10" max="60" value="22" oninput="upd('ws',this.value)"> <span id="v_ws">22</span></div>
    </div>

    <div class="group">
        <h3>2. 玩法网格 (GRID)</h3>
        <div class="ctrl-row"><label>起始 Y</label><input type="range" min="200" max="600" value="343" oninput="upd('gt',this.value)"> <span id="v_gt">343</span></div>
        <div class="ctrl-row"><label>起始 X</label><input type="range" min="0" max="150" value="32" oninput="upd('gl',this.value)"> <span id="v_gl">32</span></div>
        <div class="ctrl-row"><label>行间距 Row</label><input type="range" min="10" max="60" value="29" oninput="upd('gr',this.value)"> <span id="v_gr">29</span></div>
        <div class="ctrl-row"><label>列间距 Col</label><input type="range" min="10" max="60" value="22" oninput="upd('gc',this.value)"> <span id="v_gc">22</span></div>
        <div class="ctrl-row"><label>网格总宽</label><input type="range" min="200" max="360" value="295" oninput="upd('gw',this.value)"> <span id="v_gw">295</span></div>
    </div>

    <div class="group">
        <h3>3. 字体样式 (FONT)</h3>
        <div class="ctrl-row"><label>主数字大小</label><input type="range" min="8" max="40" value="16" oninput="upd('gs',this.value)"> <span id="v_gs">16</span></div>
        <div class="ctrl-row"><label>$$ 字号</label><input type="range" min="5" max="25" value="8" oninput="upd('ps',this.value)"> <span id="v_ps">8</span></div>
        <div class="ctrl-row"><label>弹窗高度 Y</label><input type="range" min="0" max="500" value="120" oninput="upd('bt',this.value)"> <span id="v_bt">120</span></div>
    </div>

    <div class="group">
        <h3>4. 仿真刮除 (REAL SCRATCH)</h3>
        <div class="ctrl-row"><label>笔触大小</label><input type="range" min="10" max="50" value="22" oninput="upd('rad',this.value)"> <span id="v_rad">22</span></div>
    </div>

    <button class="btn btn-export" onclick="exportData()">💾 导出最终 JSON 参数</button>
</div>

<script>
    let p = { wt:273, wl:175, ws:22, gt:343, gl:32, gr:29, gc:22, gw:295, gs:16, ps:8, bt:120, rad:22 };
    let isGhost = false;

    // 处理图片上传
    function handleImage(input) {
        if (input.files && input.files[0]) {
            let reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('card').style.backgroundImage = `url(${e.target.result})`;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function toggleGhost() {
        isGhost = !isGhost;
        document.getElementById('ghost-btn').classList.toggle('active', isGhost);
        document.querySelectorAll('.layer').forEach(l => l.classList.toggle('hide-layer', isGhost));
        document.getElementById('bubble-preview').classList.toggle('active', isGhost);
    }

    function upd(key, val) {
        p[key] = parseInt(val);
        document.getElementById('v_'+key).innerText = val;
        render();
    }

    function render() {
        const wn = document.getElementById('w-num');
        wn.style.top = p.wt+'px'; wn.style.left = p.wl+'px'; wn.style.fontSize = p.ws+'px';
        const gr = document.getElementById('grid');
        gr.style.top = p.gt+'px'; gr.style.left = p.gl+'px'; gr.style.rowGap = p.gr+'px'; gr.style.columnGap = p.gc+'px'; gr.style.width = p.gw+'px';
        document.getElementById('bubble-preview').style.top = p.bt+'px';
        document.querySelectorAll('.item').forEach(it => {
            it.style.fontSize = p.gs+'px';
            it.querySelector('.usd').style.fontSize = p.ps+'px';
        });
    }

    function setupScratch(id, x, y, w, h) {
        const c = document.getElementById(id);
        c.style.left = x+'px'; c.style.top = y+'px';
        c.width = w; c.height = h;
        const ctx = c.getContext('2d');

        // 绘制更真实的涂层背景
        ctx.fillStyle = '#b0b0b0'; ctx.fillRect(0,0,w,h);
        ctx.strokeStyle = '#888'; ctx.lineWidth = 1;
        for(let i=0; i<h; i+=4) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(w,i); ctx.stroke(); }
        
        let drawing = false;
        const scrub = (e) => {
            if(!drawing) return;
            const r = c.getBoundingClientRect();
            const tx = (e.touches?e.touches[0].clientX:e.clientX) - r.left;
            const ty = (e.touches?e.touches[0].clientY:e.clientY) - r.top;
            
            ctx.globalCompositeOperation = 'destination-out';
            
            // 碎裂碎片算法：多次随机散射笔触
            for(let i=0; i<6; i++) {
                const offX = (Math.random()-0.5) * (p.rad * 0.8);
                const offY = (Math.random()-0.5) * (p.rad * 0.8);
                const s = p.rad * (0.5 + Math.random());
                ctx.beginPath();
                ctx.arc(tx + offX, ty + offY, s/2, 0, Math.PI*2);
                ctx.fill();
            }
        };
        c.onmousedown = () => drawing = true;
        window.onmouseup = () => drawing = false;
        c.onmousemove = scrub;
        c.ontouchstart = (e) => { e.preventDefault(); drawing = true; scrub(e); };
        c.ontouchmove = (e) => { e.preventDefault(); scrub(e); };
    }

    function exportData() {
        console.log("RESULT:", JSON.stringify(p));
        alert("参数已就绪！复制以下内容发给我：\n\n" + JSON.stringify(p));
    }

    window.onload = () => {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for(let i=0; i<30; i++) {
            grid.innerHTML += `<div class="item">88<div class="usd" style="color:#d00000;">$ 500 $</div></div>`;
        }
        render();
        setupScratch('c-win', 157, 260, 61, 49);
        setupScratch('c-main', 21, 322, 318, 299);
    };
</script>
</body>
</html>
