<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=360, user-scalable=no, viewport-fit=cover">
    <title>EMPIRE - 皇家刮刮乐</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Space+Mono:wght@700&display=swap');
        body { margin: 0; background: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; touch-action: none; }

        /* --- 倒计时加载 --- */
        #loader {
            position: fixed; inset: 0; z-index: 1000;
            display: flex; justify-content: center; align-items: center; background: #fff;
        }
        .cd-ring { position: absolute; width: 150px; height: 150px; transform: rotate(-90deg); }
        .cd-ring circle {
            fill: none; stroke-width: 6; stroke: #6366f1;
            stroke-dasharray: 440; animation: ringTick 1s linear infinite;
        }
        @keyframes ringTick { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 440; } }
        .cd-num { font-size: 70px; font-weight: 900; }

        /* --- 结算弹窗 --- */
        #top-dialog {
            position: fixed; top: 40px; left: 50%; transform: translateX(-50%) scale(0.9);
            width: 300px; padding: 30px 0; background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px); border-radius: 40px; z-index: 2000;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.15);
            opacity: 0; visibility: hidden;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #top-dialog.active { opacity: 1; visibility: visible; transform: translateX(-50%) scale(1); }

        /* --- 游戏舞台 --- */
        #stage { 
            position: relative; width: 360px; height: 720px; margin: 0 auto; 
            background: #fff url('64005.png') center/100% 100% no-repeat; 
            opacity: 0; transition: opacity 1s; 
        }
        #win-area { position: absolute; left: 151px; top: 263px; width: 72px; height: 66px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 900; color: #d32f2f; }
        #grid-area { position: absolute; left: 27px; top: 335px; width: 310px; height: 284px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; padding: 5px; box-sizing: border-box; }
        .cell b { font-size: 18px; display: block; font-weight: 900; text-align: center; color: #1a1a1a; }
        .cell i { font-family: 'Space Mono'; font-size: 9px; font-weight: 700; display: block; text-align: center; color: #666; }
        canvas { position: absolute; z-index: 500; cursor: crosshair; }
    </style>
</head>
<body>

    <div id="loader">
        <svg class="cd-ring"><circle cx="75" cy="75" r="70"></circle></svg>
        <div id="cd" class="cd-num">3</div>
    </div>

    <div id="top-dialog">
        <div style="font-size: 24px; font-weight: 900; color: #1e293b;">MISSION COMPLETE</div>
        <div id="dm" style="margin: 10px 0; color: #64748b; font-weight: 600;">数据同步中...</div>
        <div style="padding: 10px 40px; background: #6366f1; color: #fff; border-radius: 50px; font-family: 'Space Mono'; font-size: 22px;" id="db">$0.00</div>
        <p style="font-size: 12px; color: #94a3b8; margin-top: 15px;">账单已实时回传指挥部</p>
    </div>

    <div id="stage">
        <div id="win-area">88</div>
        <div id="grid-area"></div>
        <canvas id="c_win" style="left:153px; top:258px; width:71px; height:52px;"></canvas>
        <canvas id="c_grid" style="left:22px; top:322px; width:317px; height:300px;"></canvas>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let winTriggered = false, winTotal = 0, mainScratched = false;

        async function start() {
            const el = document.getElementById('cd');
            for(let s of ['2', '1', 'GO']) {
                await new Promise(r => setTimeout(r, 800));
                el.innerText = s;
            }
            document.getElementById('loader').style.display = 'none';
            document.getElementById('stage').style.opacity = '1';
            init();
        }

        function init() {
            const g = document.getElementById('grid-area');
            let h = "";
            for(let i=0; i<30; i++) {
                const isWin = Math.random() > 0.88; // 中奖概率约 12%
                const n = isWin ? "88" : Math.floor(Math.random()*80+10);
                const p = (Math.random()*40+5).toFixed(2);
                if(isWin) winTotal += parseFloat(p);
                h += `<div class="cell"><b>${n}</b><i>$${p}</i></div>`;
            }
            g.innerHTML = h;
            renderCanvas("c_win");
            renderCanvas("c_grid");
        }

        function renderCanvas(id) {
            const cvs = document.getElementById(id);
            const ctx = cvs.getContext('2d');
            cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight;

            ctx.fillStyle = '#b0bec5'; // 高级银灰色盖层
            ctx.fillRect(0, 0, cvs.width, cvs.height);
            
            // 绘制防伪纹理
            ctx.font = "12px Arial";
            ctx.fillStyle = "rgba(255,255,255,0.2)";
            for(let i=0; i<cvs.width; i+=30) {
                for(let j=0; j<cvs.height; j+=20) ctx.fillText("EMPIRE", i, j);
            }

            const scratch = (x, y) => {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, 20, 0, Math.PI * 2);
                ctx.fill();

                if(id === "c_win") mainScratched = true;
                if(id === "c_grid" && mainScratched && !winTriggered) triggerWin();
            };

            const getPos = (e) => {
                const r = cvs.getBoundingClientRect();
                const cx = e.clientX || (e.touches && e.touches[0].clientX);
                const cy = e.clientY || (e.touches && e.touches[0].clientY);
                return { x: cx - r.left, y: cy - r.top };
            };

            cvs.addEventListener('touchmove', (e) => { e.preventDefault(); const p = getPos(e); scratch(p.x, p.y); });
            cvs.addEventListener('mousemove', (e) => { if(e.buttons===1){ const p = getPos(e); scratch(p.x, p.y); } });
        }

        function triggerWin() {
            if(winTriggered) return;
            winTriggered = true;

            setTimeout(() => {
                const finalWin = parseFloat(winTotal.toFixed(2));
                document.getElementById('db').innerText = `$${finalWin}`;
                document.getElementById('dm').innerText = finalWin > 0 ? "中奖啦！金额已同步" : "遗憾未中奖，继续努力";
                document.getElementById('top-dialog').classList.add('active');

                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

                // --- 📡 指挥部核心回传数据 ---
                const report = {
                    cost: -20.00, // 默认下注额
                    win: finalWin
                };

                // 3秒后自动回传并关闭窗口，确保用户看清中奖金额
                setTimeout(() => {
                    tg.sendData(json.stringify(report));
                }, 3000);

            }, 1500); 
        }

        window.onload = start;
    </script>
</body>
</html>
