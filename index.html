<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刮刮乐-优化版</title>

<style>
body {
    background:#000;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card {
    position:relative;
    width:360px;
    height:740px;
    background:url('64005.jpg') no-repeat;
    background-size:cover;
}

/* 数据层 */
.layer {
    position:absolute;
    top:342px;
    left:23px;
    width:314px;
    height:350px;
}

/* 数字样式 */
.number {
    position:absolute;
    transform:translate(-50%,-50%);
    font-size:22px;
    font-weight:900;
    color:#000;
    -webkit-text-stroke:1.5px #fff;
    text-align:center;
}

.prize {
    font-size:11px;
    color:#d40000;
    margin-top:-2px;
}

/* 刮层 */
canvas {
    position:absolute;
    top:342px;
    left:23px;
    width:314px;
    height:350px;
    z-index:10;
}
</style>
</head>

<body>

<div class="card">

    <div class="layer" id="layer"></div>

    <canvas id="c"></canvas>

</div>

<script>
const layer = document.getElementById('layer');

// 🎯 中奖号码位置（微调这里就能完美贴图）
const winPos = [
    {x:50,y:40},{x:157,y:40},{x:264,y:40},
    {x:100,y:90},{x:214,y:90}
];

// 🎯 我的号码位置（20个）
const myPos=[];
let sx=35, sy=140, gx=58, gy=55;

for(let r=0;r<4;r++){
    for(let c=0;c<5;c++){
        myPos.push({
            x:sx+c*gx,
            y:sy+r*gy
        });
    }
}

// 🎯 生成中奖号码
const winNums=[];
while(winNums.length<5){
    let n=Math.floor(Math.random()*89)+10;
    if(!winNums.includes(n)) winNums.push(n);
}

// 👉 渲染中奖号码
winPos.forEach((p,i)=>{
    let d=document.createElement('div');
    d.className='number';
    d.style.left=p.x+'px';
    d.style.top=p.y+'px';
    d.innerText=winNums[i];
    layer.appendChild(d);
});

// 👉 渲染我的号码
myPos.forEach(p=>{
    let num;
    
    do{
        num=Math.floor(Math.random()*89)+10;
    }while(false);

    let isWin=winNums.includes(num);

    let prize=isWin
        ? [20,50,100,500][Math.floor(Math.random()*4)]
        : 0;

    let d=document.createElement('div');
    d.className='number';
    d.style.left=p.x+'px';
    d.style.top=p.y+'px';

    d.innerHTML = `
        ${num}
        <div class="prize">${prize? '¥'+prize:''}</div>
    `;

    layer.appendChild(d);
});

// 🎰 刮刮乐层
const c=document.getElementById('c');
const ctx=c.getContext('2d');

c.width=314;
c.height=350;

// 灰层
ctx.fillStyle='#C0C0C0';
ctx.fillRect(0,0,314,350);

// 颗粒
for(let i=0;i<1000;i++){
    ctx.fillStyle=Math.random()>0.5?'#eee':'#888';
    ctx.fillRect(Math.random()*314,Math.random()*350,1,1);
}

// 标题
ctx.fillStyle='#666';
ctx.font='bold 16px Arial';
ctx.textAlign='center';
ctx.fillText('中奖号码区',157,40);
ctx.fillText('我的号码区',157,160);

let down=false;

function draw(e){
    if(!down) return;

    const rect=c.getBoundingClientRect();
    const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    const y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;

    ctx.globalCompositeOperation='destination-out';
    ctx.beginPath();
    ctx.arc(x,y,20,0,Math.PI*2);
    ctx.fill();
}

c.onmousedown=()=>down=true;
c.onmouseup=()=>down=false;
c.onmousemove=draw;

c.ontouchstart=e=>{down=true;draw(e)};
c.ontouchend=()=>down=false;
c.ontouchmove=e=>{e.preventDefault();draw(e)};

</script>

</body>
</html>
