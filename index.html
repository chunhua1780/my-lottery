<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拾光·PREMIUM $$</title>
    <style>
        :root { --gold: #f9d423; --neon-purple: #7000ff; }
        body { background: #000; margin: 0; font-family: "Impact", "Arial Black", sans-serif; overflow: hidden; color: white; }

        /* --- 1. 赛博粒子倒计时 --- */
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .cd-text { 
            font-size: 180px; font-weight: 900; 
            background: linear-gradient(to bottom, #fff 20%, var(--neon-purple) 50%, #00f2fe 80%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px var(--neon-purple));
            animation: pulse 1s infinite cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        @keyframes pulse { 0% { transform: scale(0.5); opacity: 0; filter: blur(20px); } 50% { transform: scale(1.1); opacity: 1; filter: blur(0); } 100% { transform: scale(1.5); opacity: 0; filter: blur(10px); } }

        /* --- 2. 核心游戏架构 --- */
        #app { display: none; opacity: 0; transition: opacity 1s; }
        .card { position: relative; width: 360px; height: 720px; background-size: 100% 100%; margin: 0 auto; }

        /* 绝对坐标锁定 */
        #w-num { 
            position: absolute; z-index: 1; display: flex; justify-content: center; align-items: center;
            top: 273px; left: 175px; width: 30px; height: 30px; 
            font-size: 22px; color: #000; font-weight: 900;
        }
        #grid { 
            position: absolute; z-index: 1; display: grid; grid-template-columns: repeat(6, 1fr);
            top: 343px; left: 32px; row-gap: 29px; column-gap: 22px; width: 295px; /* 强制锁定宽度防止偏移 */
        }
        .item { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 32px; height: 40px; }
        .num { font-size: 16px; color: #000; line-height: 1; }
        .usd { font-size: 8px; color: #d00000; font-weight: bold; margin-top: 1px; }

        /* 涂层层级 */
        .layer { position: absolute; z-index: 10; touch-action: none; }
        #c-win { top: 260px; left: 157px; width: 61px; height: 49px; }
        #c-main { top: 322px; left: 21px; width: 318px; height: 299px; }

        /* --- 3. 悬浮美学气泡 (更高、更大、更炫) --- */
        #bubble {
            position: absolute; 
            top: 100px; /* 往上提了40px */
            left: 50%; transform: translateX(-50%) scale(0.8);
            width: 330px; height: 130px; /* 变大一点点 */
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #bubble.active { opacity: 1; transform: translateX(-50%) scale(1); pointer-events: auto; }
        
        .b-t { font-size: 16px; color: var(--gold); letter-spacing: 2px; text-shadow: 0 0 10px rgba(249, 212, 35, 0.5); }
        .b-v { font-size: 42px; font-weight: 900; color: #fff; margin: 5px 0; font-family: 'Arial Black'; }
        .b-btn { background: var(--gold); color: #000; border: none; padding: 6px 25px; border-radius: 50px; font-size: 12px; font-weight: 900; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div id="loader"><div class="cd-text" id="cd-val">3</div></div>

<div id="app">
    <div class="card" id="card-bg">
        <div id="bubble">
            <div class="b-t">★ MISSION ACCOMPLISHED ★</div>
            <div class="b-v" id="res-val">$ 0 $</div>
            <button class="b-btn" onclick="location.reload()">PLAY AGAIN</button>
        </div>

        <div id="w-num"></div>
        <div id="grid"></div>
        <canvas id="c-win" class="layer"></canvas>
        <canvas id="c-main" class="layer"></canvas>
    </div>
</div>

<script>
    // --- 1. 潮流倒计时控制 ---
    let time = 3;
    const cdVal = document.getElementById('cd-val');
    const timer = setInterval(() => {
        time--;
        if(time > 0) {
            cdVal.innerText = time;
        } else {
            clearInterval(timer);
            document.getElementById('loader').style.display = 'none';
            const a = document.getElementById('app');
            a.style.display = 'block'; setTimeout(()=>a.style.opacity='1', 50);
        }
    }, 1000);

    // --- 2. 逻辑内核 ---
    const WIN_NUM = 88;
    function buildGame() {
        const dice = Math.random();
        let target = dice < 0.4 ? 300 : (dice < 0.8 ? 1000 : 5000);
        const data = []; let sum = 0;
        for(let i=0; i<30; i++) {
            let n = Math.floor(Math.random()*80)+10; if(n===WIN_NUM) n++;
            let p = [10, 50, 100][Math.floor(Math.random()*3)];
            if(sum < target && Math.random() < 0.2) { n = WIN_NUM; p = Math.max(50, target-sum); sum += p; }
            data.push({n, p});
        }
        return {data, sum};
    }

    const state = buildGame();

    window.onload = () => {
        const img = new Image(); img.src = '64005.jpg';
        img.onload = () => {
            document.getElementById('card-bg').style.backgroundImage = `url(64005.jpg)`;
            document.getElementById('w-num').innerText = WIN_NUM;
            const grid = document.getElementById('grid');
            state.data.forEach(d => {
                grid.innerHTML += `<div class="item"><span class="num">${d.n}</span><span class="usd">$ ${d.p} $</span></div>`;
            });
            initScratch('c-win', 61, 49, 'win');
            initScratch('c-main', 318, 299, 'main');
        };
    };

    // --- 3. 刮奖与检测引擎 ---
    let winClean = false;
    let mainClean = false;

    function initScratch(id, w, h, type) {
        const c = document.getElementById(id);
        const ctx = c.getContext('2d');
        c.width = w; c.height = h;
        
        // 更有质感的图层填充
        const g = ctx.createLinearGradient(0,0,w,h);
        g.addColorStop(0, '#ccc'); g.addColorStop(0.5, '#999'); g.addColorStop(1, '#bbb');
        ctx.fillStyle = g; ctx.fillRect(0,0,w,h);
        
        let drawing = false;
        const scrub = (e) => {
            if(!drawing) return;
            const r = c.getBoundingClientRect();
            const x = (e.touches?e.touches[0].clientX:e.clientX) - r.left;
            const y = (e.touches?e.touches[0].clientY:e.clientY) - r.top;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(x, y, 22, 0, Math.PI*2); ctx.fill();
            detect(c, type);
        };

        c.onmousedown = () => drawing = true;
        window.onmouseup = () => drawing = false;
        c.onmousemove = scrub;
        c.ontouchstart = (e) => { e.preventDefault(); drawing = true; scrub(e); };
        c.ontouchmove = (e) => { e.preventDefault(); scrub(e); };
    }

    function detect(c, type) {
        if((type==='win' && winClean) || (type==='main' && mainClean)) return;
        const data = c.getContext('2d').getImageData(0,0,c.width,c.height).data;
        let hits = 0;
        for(let i=3; i<data.length; i+=4) if(data[i] === 0) hits++;
        const ratio = hits / (data.length/4);
        
        if(ratio > 0.95) {
            if(type === 'win') winClean = true;
            if(type === 'main') mainClean = true;
        }

        // 双重校验：必须两个区域都刮干净
        if(winClean && mainClean) {
            setTimeout(showWinner, 600);
        }
    }

    function showWinner() {
        const b = document.getElementById('bubble');
        if(b.classList.contains('active')) return;
        document.getElementById('res-val').innerText = `$ ${state.sum} $`;
        b.classList.add('active');
    }
</script>
</body>
</html>
