<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>仿真刮刮乐</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;}
body {min-height:100vh;display:flex;justify-content:center;align-items:center;background:#eee;}
.lottery-card {position:relative;width:400px;height:600px;background:url('64005.jpg') center/cover no-repeat;}
.scratch-area {position:absolute;top:285px;left:75px;width:240px;height:170px;cursor:grabbing;}
</style>
</head>
<body>
<div class="lottery-card">
<canvas class="scratch-area" width="240" height="170"></canvas>
</div>
<script>
const canvas = document.querySelector('.scratch-area');
const ctx = canvas.getContext('2d');
let isScratching = false;

// 初始化刮涂层
ctx.fillStyle = '#f9d749';
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.globalCompositeOperation = 'destination-out';
ctx.lineWidth = 25;
ctx.lineCap = 'round';
ctx.strokeStyle = 'rgba(0,0,0,0.1)';

canvas.addEventListener('mousedown', () => isScratching = true);
canvas.addEventListener('mouseup', () => isScratching = false);
canvas.addEventListener('mousemove', (e) => {
  if(!isScratching) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  ctx.lineTo(x, y);
  ctx.stroke();
});
</script>
</body>
</html>
