<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国福彩刮刮乐 - 模拟</title>
    <style>
        @import url('https://fonts.font.im/css2?family=Noto+Sans+SC:wght@700;900&display=swap');
        :root {
            --lottery-red: #D81F26;
            --lottery-gold: #FFB81C;
            --silver-coat: #A0A0A0;
            --bg-white: #FFFFFF;
            --text-black: #000000;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #111;
            font-family: 'Noto Sans SC', sans-serif;
            overflow: hidden;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 加载倒计时 */
        #loader {
            position: fixed; inset:0; background:#000; z-index:9999;
            display: flex; justify-content: center; align-items: center;
        }
        .cd-num {
            font-size: 120px; font-weight:900;
            background: linear-gradient(180deg, #fff, var(--lottery-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform:scale(0.6); opacity:0; }
            50% { opacity:1; }
            100% { transform:scale(1.2); opacity:0; }
        }

        /* 彩票主体 */
        #app { display:none; opacity:0; transition:opacity 1s; }
        .card {
            position: relative;
            width: 360px;
            height: 720px;
            background: #D81F26;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }
        /* 顶部福彩标题 */
        .card-header {
            height: 80px;
            background: var(--lottery-red);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight:900;
            color: var(--lottery-gold);
            border-bottom: 3px solid var(--lottery-gold);
        }

        /* --------------------------
           中奖号码区（精准对齐）
        --------------------------- */
        #win-area {
            position: absolute;
            top: 110px;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            height: 100px;
            background: var(--bg-white);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 防伪底纹 */
            background-image:
                linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 12px 12px;
        }
        .win-number {
            font-size: 36px;
            font-weight:900;
            color: var(--text-black);
            letter-spacing: 4px;
            /* 数字严格居中 */
            width: 100%;
            text-align: center;
        }

        /* --------------------------
           游戏数字网格（精准对齐）
        --------------------------- */
        #game-grid {
            position: absolute;
            top: 230px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 360px;
            background: var(--bg-white);
            border-radius: 8px;
            padding: 15px;
            /* 防伪网格底纹 */
            background-image:
                linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 10px 10px;
            /* 6×6 网格 */
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 10px;
        }
        .grid-cell {
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.6);
            border-radius: 4px;
            font-size: 20px;
            font-weight:900;
            color: var(--text-black);
            /* 单元格内绝对居中 */
            width: 100%;
            height: 100%;
        }

        /* --------------------------
           刮奖涂层（真实银灰色）
        --------------------------- */
        .scratch-layer {
            position: absolute;
            z-index: 10;
            touch-action: none;
            cursor: crosshair;
            border-radius: 8px;
            overflow: hidden;
        }
        /* 中奖区涂层 */
        #scratch-win {
            top: 110px;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            height: 100px;
        }
        /* 游戏区涂层 */
        #scratch-game {
            top: 230px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 360px;
        }

        /* 中奖弹窗 */
        #win-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 280px;
            background: #fff;
            color: #D81F26;
            border-radius: 16px;
            text-align: center;
            padding: 30px 20px;
            font-size: 24px;
            font-weight:900;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            z-index: 999;
            transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
        }
        #win-popup.active {
            transform: translate(-50%, -50%) scale(1);
        }
        .popup-amount {
            font-size: 36px;
            color: #D81F26;
            margin: 10px 0;
        }
    </style>
</head>
<body>

<!-- 加载 -->
<div id="loader">
    <div class="cd-num">3</div>
</div>

<!-- 彩票 -->
<div id="app">
    <div class="card">
        <div class="card-header">中国福彩 刮刮乐</div>

        <!-- 中奖号码区 -->
        <div id="win-area">
            <div class="win-number" id="win-num">8</div>
        </div>
        <!-- 游戏网格 -->
        <div id="game-grid">
            <!-- 自动生成36个数字 -->
        </div>

        <!-- 刮奖涂层 -->
        <canvas class="scratch-layer" id="scratch-win"></canvas>
        <canvas class="scratch-layer" id="scratch-game"></canvas>
    </div>

    <!-- 中奖弹窗 -->
    <div id="win-popup">
        <div>恭喜中奖！</div>
        <div class="popup-amount" id="final-amount">￥0</div>
    </div>
</div>

<script>
    // ---------- 全局参数 ----------
    const winNum = Math.floor(Math.random()*9)+1; // 1-9
    const gridCount = 36;
    const winCount = 5; // 中奖个数
    let winScratched = false;
    let gameScratched = false;
    let totalWin = 0;

    // ---------- 倒计时 ----------
    let cd = 3;
    const loaderNum = document.querySelector('.cd-num');
    const cdInterval = setInterval(()=>{
        cd--;
        if(cd<=0) {
            clearInterval(cdInterval);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            setTimeout(()=>{
                document.getElementById('app').style.opacity = '1';
                init();
            }, 200);
        } else {
            loaderNum.textContent = cd;
        }
    }, 800);

    // ---------- 初始化彩票 ----------
    function init() {
        // 1. 中奖号码
        document.getElementById('win-num').textContent = winNum;

        // 2. 生成游戏网格（精准居中）
        const grid = document.getElementById('game-grid');
        grid.innerHTML = '';
        // 随机位置中奖
        const winPositions = new Set();
        while(winPositions.size < winCount) {
            winPositions.add(Math.floor(Math.random()*gridCount));
        }
        // 生成单元格
        for(let i=0; i<gridCount; i++) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell';
            const num = winPositions.has(i) ? winNum : Math.floor(Math.random()*9)+1;
            cell.textContent = num;
            if(num === winNum) totalWin += 50;
            grid.appendChild(cell);
        }

        // 3. 初始化刮奖涂层
        initScratch('scratch-win', 'win');
        initScratch('scratch-game', 'game');
    }

    // ---------- 刮奖涂层核心（真实银灰+硬边刮开） ----------
    function initScratch(id, type) {
        const c = document.getElementById(id);
        const ctx = c.getContext('2d');
        const rect = c.getBoundingClientRect();
        c.width = rect.width;
        c.height = rect.height;
        const w = c.width;
        const h = c.height;

        // ---------- 1. 真实银灰色涂层（铝粉质感） ----------
        const silverGrd = ctx.createLinearGradient(0,0,w,h);
        silverGrd.addColorStop(0, '#A0A0A0'); // 亮银
        silverGrd.addColorStop(0.5, '#C0C0C0'); // 中银
        silverGrd.addColorStop(1, '#888888');   // 暗银
        ctx.fillStyle = silverGrd;
        ctx.fillRect(0,0,w,h);

        // 金属颗粒噪点
        for(let i=0; i<400; i++) {
            ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.2})`;
            ctx.fillRect(Math.random()*w, Math.random()*h, 1, 1);
        }

        // ---------- 2. 防伪底纹（ZGFLCP微缩文字） ----------
        ctx.fillStyle = 'rgba(0,0,0,0.07)';
        ctx.font = 'bold 10px SimHei';
        const antiFake = 'ZGFLCP';
        for(let x=5; x<w; x+=40) {
            for(let y=12; y<h; y+=20) {
                ctx.fillText(antiFake, x, y);
            }
        }

        // ---------- 3. 刮开交互（真实剥落效果） ----------
        let active = false;
        const scrub = (e) => {
            if(!active) return;
            const r = c.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;

            ctx.globalCompositeOperation = 'destination-out';

            // 不规则碎片（硬边、随机旋转、大小不一）
            for(let i=0; i<12; i++) {
                const ox = (Math.random()-0.5)*24;
                const oy = (Math.random()-0.5)*24;
                const size = 12 + Math.random()*18;
                ctx.save();
                ctx.translate(x+ox, y+oy);
                ctx.rotate(Math.random()*Math.PI);
                // 不规则四边形
                ctx.beginPath();
                ctx.moveTo(-size/2, -size/2);
                ctx.lineTo(size/2, -size/3);
                ctx.lineTo(size/3, size/2);
                ctx.lineTo(-size/2, size/3);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
            checkComplete(c, type);
        };

        // 事件
        c.onmousedown = ()=> active=true;
        window.onmouseup = ()=> active=false;
        c.onmousemove = scrub;
        c.ontouchstart = (e)=>{ e.preventDefault(); active=true; scrub(e); };
        c.ontouchmove = (e)=>{ e.preventDefault(); scrub(e); };
    }

    // ---------- 检测是否刮完 ----------
    function checkComplete(c, type) {
        const ctx = c.getContext('2d');
        const data = ctx.getImageData(0,0,c.width,c.height).data;
        let transparent = 0;
        for(let i=3; i<data.length; i+=4) {
            if(data[i] < 10) transparent++;
        }
        const ratio = transparent / (data.length/4);
        // 刮开90%算完成
        if(ratio > 0.9) {
            if(type==='win') winScratched=true;
            if(type==='game') gameScratched=true;
        }
        // 全部刮开 → 中奖弹窗
        if(winScratched && gameScratched) {
            setTimeout(()=>{
                document.getElementById('final-amount').textContent = `￥${totalWin}`;
                document.getElementById('win-popup').classList.add('active');
            }, 500);
        }
    }
</script>
</body>
</html>
