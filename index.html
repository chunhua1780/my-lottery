<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=360, user-scalable=no">
    <title>GOLDEN LUCK SCRATCH</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Oswald:wght@700&family=Dancing+Script:wght@700&display=swap');

        :root { --gold: #fcc201; --win-bg: #b00020; }
        body { margin: 0; background: #050505; color: #fff; font-family: 'Montserrat', sans-serif; overflow: hidden; }

        /* --- 1. 炫丽倒计时层 --- */
        #countdown-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, #222 0%, #000 100%);
            z-index: 9999; display: flex; justify-content: center; align-items: center;
        }
        .count-wrap { position: relative; }
        .num {
            font-size: 180px; color: var(--gold); text-shadow: 0 0 50px rgba(252,194,1,0.6);
            animation: zoomInOut 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) infinite;
        }
        @keyframes zoomInOut {
            0% { transform: scale(0.3); opacity: 0; filter: blur(10px); }
            50% { transform: scale(1); opacity: 1; filter: blur(0); }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* --- 2. 游戏容器 (严格执行 JSON 坐标) --- */
        #game-container {
            opacity: 0; transition: opacity 1.5s ease;
            position: relative; width: 360px; height: 720px; margin: 0 auto;
            background: url('64005.jpg') center/100% 100% no-repeat;
        }

        /* 中奖区 (JSON: pos [151, 266], size [72, 66]) */
        #winning-zone {
            position: absolute; left: 151px; top: 266px; width: 72px; height: 66px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #09140d; font-size: 24px; font-weight: 900;
        }

        /* 矩阵区 (JSON: pos [27, 335], size [310, 284]) */
        #grid-zone {
            position: absolute; left: 27px; top: 335px; width: 310px; height: 284px;
            display: grid; 
            grid-template-columns: repeat(6, 1fr); /* 6 cols */
            grid-template-rows: repeat(5, 1fr);    /* 5 rows */
            gap: 10px; padding: 5px; box-sizing: border-box;
        }
        .cell { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .cell .v { font-size: 18px; font-weight: 900; color: #09140d; }
        .cell .a { font-family: 'Oswald'; font-size: 10px; color: #d32f2f; }

        /* 画布层 (JSON: Layer_Win_Cover & Layer_Main_Cover) */
        canvas { position: absolute; z-index: 20; touch-action: none; cursor: crosshair; }

        /* --- 3. 顶部非遮挡弹窗 --- */
        #top-result-panel {
            position: absolute; top: -150px; left: 10px; right: 10px; height: 120px;
            background: rgba(0, 0, 0, 0.85); border: 2px solid var(--gold); border-radius: 15px;
            z-index: 100; transition: top 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #top-result-panel.show { top: 20px; }
        .msg-main { color: var(--gold); font-size: 22px; font-weight: bold; margin-bottom: 5px; }
        .msg-warm { font-family: 'Dancing Script'; font-size: 16px; color: #eee; }
        .balance-info { font-family: 'Oswald'; color: #4caf50; font-size: 18px; margin-top: 5px; }

        /* --- 4. 底部状态 (常驻) --- */
        #hud { position: absolute; bottom: 10px; width: 100%; text-align: center; color: rgba(255,255,255,0.5); font-size: 10px; }
    </style>
</head>
<body>

    <div id="countdown-screen">
        <div class="count-wrap">
            <div id="number" class="num">3</div>
        </div>
    </div>

    <div id="top-result-panel">
        <div class="msg-main" id="res-title">WINNER!</div>
        <div class="msg-warm" id="res-warm">Your heart is as bright as gold...</div>
        <div class="balance-info">BALANCE: <span id="balance-txt">$100.00</span></div>
    </div>

    <div id="game-container">
        <div id="winning-zone">88</div>
        <div id="grid-zone"></div>

        <canvas id="Layer_Win_Cover" style="left:153px; top:258px; width:71px; height:52px;"></canvas>
        <canvas id="Layer_Main_Cover" style="left:22px; top:322px; width:317px; height:300px;"></canvas>
        
        <div id="hud">SYSTEM READY • 95% CLEARANCE DETECTOR ACTIVE</div>
    </div>

    <script>
        let balance = 100.00;
        let gameActive = false;
        const targetNum = "88";
        let winAmount = 0;

        // --- 1. 倒计时流程 ---
        async function runCountdown() {
            const numEl = document.getElementById('number');
            const stages = ['2', '1', 'GO!'];
            
            for (let s of stages) {
                await new Promise(r => setTimeout(r, 1000));
                numEl.innerText = s;
            }
            
            setTimeout(() => {
                document.getElementById('countdown-screen').style.display = 'none';
                document.getElementById('game-container').style.opacity = '1';
                gameActive = true;
                initGame();
            }, 800);
        }

        // --- 2. 初始化矩阵与画布 ---
        function initGame() {
            const grid = document.getElementById('grid-zone');
            let cells = "";
            for(let i=0; i<30; i++) { // 6x5=30
                const n = Math.random() > 0.85 ? "88" : Math.floor(Math.random()*90+10);
                const p = (Math.random()*50 + 5).toFixed(2);
                if(n === targetNum) winAmount += parseFloat(p);
                cells += `<div class="cell"><span class="v">${n}</span><span class="a">$${p}</span></div>`;
            }
            grid.innerHTML = cells;

            setupCanvas("Layer_Win_Cover");
            setupCanvas("Layer_Main_Cover");
        }

        function setupCanvas(id) {
            const canvas = document.getElementById(id);
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            // 绘制银色欧美涂层
            ctx.fillStyle = '#c0c0c0';
            ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.font = '14px Arial';
            for(let i=5; i<canvas.width; i+=25) 
                for(let j=15; j<canvas.height; j+=25) ctx.fillText("€", i, j);

            // 刮除逻辑
            let drawing = false;
            const scratch = (e) => {
                if(!drawing || !gameActive) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, 20, 0, Math.PI*2);
                ctx.fill();
                
                checkProgress(canvas, ctx);
            };

            canvas.addEventListener('mousedown', () => drawing = true);
            window.addEventListener('mouseup', () => drawing = false);
            canvas.addEventListener('mousemove', scratch);
            canvas.addEventListener('touchstart', (e) => { drawing = true; e.preventDefault(); });
            canvas.addEventListener('touchmove', (e) => { scratch(e); e.preventDefault(); });
        }

        // --- 3. 95% 判定与结果展示 ---
        function checkProgress(canvas, ctx) {
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let cleared = 0;
            for (let i = 3; i < data.length; i += 4) {
                if (data[i] === 0) cleared++;
            }
            
            if (cleared / (data.length / 4) > 0.95) {
                canvas.style.transition = 'opacity 0.5s';
                canvas.style.opacity = '0';
                setTimeout(() => canvas.style.pointerEvents = 'none', 500);
                
                if(canvas.id === "Layer_Main_Cover") showFinalResult();
            }
        }

        function showFinalResult() {
            if(!gameActive) return;
            gameActive = false;

            const panel = document.getElementById('top-result-panel');
            const title = document.getElementById('res-title');
            const warm = document.getElementById('res-warm');
            const balTxt = document.getElementById('balance-txt');

            if(winAmount > 0) {
                title.innerText = `YOU WON $${winAmount.toFixed(2)}!`;
                warm.innerText = "Keep that golden touch, the fortune favors the brave!";
                balance += winAmount;
            } else {
                title.innerText = "ALMOST THERE!";
                warm.innerText = "Success is just one scratch away. Try again, winner!";
                title.style.color = "#aaa";
            }

            balTxt.innerText = `$${balance.toFixed(2)}`;
            panel.classList.add('show');
        }

        window.onload = runCountdown;
    </script>
</body>
</html>
