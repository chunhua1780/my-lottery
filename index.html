<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=360, user-scalable=no, viewport-fit=cover">
    <title>拾光 - 时尚刮刮乐</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* === 样式部分：完全保持原样，未做任何修改 === */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Space+Mono:wght@700&display=swap');

        body { margin: 0; background: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; touch-action: none; }

        /* --- 计时器 --- */
        #loader {
            position: fixed; inset: 0; z-index: 1000;
            display: flex; justify-content: center; align-items: center; background: #fff;
        }
        .cd-ring { position: absolute; width: 150px; height: 150px; transform: rotate(-90deg); }
        .cd-ring circle {
            fill: none; stroke-width: 6; stroke: #6366f1;
            stroke-dasharray: 440; animation: ringTick 1s linear infinite;
        }
        @keyframes ringTick { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 440; } }
        .cd-num { font-size: 70px; font-weight: 900; }

        /* --- 弹窗：平滑过渡 --- */
        #top-dialog {
            position: fixed; top: 40px; left: 50%; transform: translateX(-50%) scale(0.9);
            width: 300px; padding: 30px 0; background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px); border-radius: 40px; z-index: 2000;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.15);
            opacity: 0; visibility: hidden;
            transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #top-dialog.active { opacity: 1; visibility: visible; transform: translateX(-50%) scale(1); }

        /* --- 游戏舞台 --- */
        #stage { 
            position: relative; 
            width: 360px; 
            height: 720px; 
            margin: 0 auto; 
            background: #fff url('64005.png') center/100% 100% no-repeat; 
            opacity: 0; 
            transition: opacity 1s; 
        }
        #win-area { position: absolute; left: 151px; top: 263px; width: 72px; height: 66px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 900; }
        #grid-area { position: absolute; left: 27px; top: 335px; width: 310px; height: 284px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; padding: 5px; box-sizing: border-box; }
        .cell b { font-size: 20px; display: block; font-weight: 900; text-align: center; }
        .cell i { font-family: 'Space Mono'; font-size: 10px; font-weight: 700; display: block; text-align: center; }

        canvas { position: absolute; z-index: 500; cursor: crosshair; }
    </style>
</head>
<body>

    <div id="loader">
        <svg class="cd-ring"><circle cx="75" cy="75" r="70"></circle></svg>
        <div id="cd" class="cd-num">3</div>
    </div>

    <div id="top-dialog">
        <div style="font-size: 28px; font-weight: 900;">🎊 CONGRATS</div>
        <div id="dm" style="margin: 10px 0; color: #64748b;">Finding Magic...</div>
        <div style="padding: 10px 40px; background: #000; color: #fff; border-radius: 50px; font-family: 'Space Mono';" id="db">$0.00</div>
        <button onclick="location.reload()" style="margin-top: 20px; background: none; border: 1px solid #ddd; padding: 8px 20px; border-radius: 20px; cursor: pointer;">REPLAY</button>
    </div>

    <div id="stage">
        <div id="win-area">88</div>
        <div id="grid-area"></div>
        <canvas id="c_win" style="left:153px; top:258px; width:71px; height:52px;"></canvas>
        <canvas id="c_grid" style="left:22px; top:322px; width:317px; height:300px;"></canvas>
    </div>

    <script>
        // ============================================
        // 游戏核心逻辑 (完全保持原样)
        // ============================================
        const tg = window.Telegram.WebApp;
        tg.expand();
        // 移除关闭确认，直接弹出页面
        // tg.enableClosingConfirmation();

        let winTriggered = false, winTotal = 0, mainScratched = false;
        let scratchedCount = 0; // 记录已刮开的格子数量

        async function start() {
            const el = document.getElementById('cd');
            for(let s of ['2', '1', 'GO']) {
                await new Promise(r => setTimeout(r, 1000));
                el.innerText = s;
            }
            document.getElementById('loader').style.display = 'none';
            document.getElementById('stage').style.opacity = '1';
            init();
        }

        function init() {
            const g = document.getElementById('grid-area');
            let h = "";
            scratchedCount = 0; // 重置刮开计数
            for(let i=0; i<30; i++) {
                const isWin = Math.random() > 0.85;
                const n = isWin ? "88" : Math.floor(Math.random()*89+10);
                const p = (Math.random()*50+10).toFixed(2);
                if(isWin) winTotal += parseFloat(p);
                h += `<div class="cell"><b>${n}</b><i>$${p}</i></div>`;
            }
            g.innerHTML = h;
            renderCanvas("c_win");
            renderCanvas("c_grid");
        }

        function renderCanvas(id) {
            const cvs = document.getElementById(id);
            const ctx = cvs.getContext('2d');
            cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight;

            // 1. 绘制清爽底色
            ctx.fillStyle = '#cfd8dc';
            ctx.fillRect(0, 0, cvs.width, cvs.height);

            // 2. 绘制 Monogram 交错纹理 (类似奢侈品排列)
            const stepX = 42; // 水平间距
            const stepY = 38; // 垂直间距
            ctx.font = `bold 14px Arial`;
            ctx.fillStyle = "rgba(0,0,0,0.12)";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            for (let y = 0; y < cvs.height + stepY; y += stepY) {
                for (let x = 0; x < cvs.width + stepX; x += stepX) {
                    ctx.save();
                    
                    const row = Math.floor(y / stepY);
                    const col = Math.floor(x / stepX);
                    
                    // 奇数行水平偏移半个间距，形成交错斜线感
                    let offsetX = (row % 2 === 0) ? 0 : stepX / 2;
                    
                    ctx.translate(x + offsetX, y);
                    
                    // 美元和欧元符号交替分布
                    const symbol = ((row + col) % 2 === 0) ? '$' : '€';
                    
                    // 增加 15 度轻微倾斜，更显优雅
                    ctx.rotate(-0.25); 
                    ctx.fillText(symbol, 0, 0);
                    
                    ctx.restore();
                }
            }

            // 3. 刮除逻辑
            const scratch = (x, y) => {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                
                ctx.beginPath();
                ctx.arc(x, y, 22, 0, Math.PI * 2, false);
                ctx.fill();

                if(id === "c_win") mainScratched = true;
                if(id === "c_grid") {
                    scratchedCount++;
                    // 当刮开70% (21个) 格子，并且主号码已刮开，且尚未触发中奖时，延迟2秒弹出
                    if (scratchedCount >= 21 && mainScratched && !winTriggered) {
                        setTimeout(() => {
                            triggerWin();
                        }, 2000);
                    }
                }
            };

            const getPos = (e) => {
                const r = cvs.getBoundingClientRect();
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                return {
                    x: clientX - r.left,
                    y: clientY - r.top
                };
            };

            cvs.addEventListener('touchstart', (e) => { e.preventDefault(); const p = getPos(e); scratch(p.x, p.y); });
            cvs.addEventListener('touchmove', (e) => { e.preventDefault(); const p = getPos(e); scratch(p.x, p.y); });
            cvs.addEventListener('mousemove', (e) => { if(e.buttons===1){ const p = getPos(e); scratch(p.x, p.y); } });
        }

        function triggerWin() {
            if(winTriggered) return;
            winTriggered = true;

            const dialog = document.getElementById('top-dialog');
            document.getElementById('db').innerText = `$${(100 + winTotal).toFixed(2)}`;
            document.getElementById('dm').innerText = winTotal > 0 ? `Amazing! You won $${winTotal.toFixed(2)}` : "Better luck next time!";
            
            dialog.classList.add('active');
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            
            // 静默发送完整游戏数据到Bot
            reportGameEnd();
        }

        // ============================================
        // 优化后的通讯模块 (静默、可靠、无干扰)
        // ============================================
        const userInfo = tg.initDataUnsafe?.user || null;
        let gameDataSent = false;

        const sendDataSilently = (data) => {
            if (!tg || typeof tg.sendData !== 'function') return false;
            try {
                tg.sendData(JSON.stringify(data));
                console.log('[通讯] 数据已悄悄发送至 Bot', data.type);
                return true;
            } catch (error) {
                console.error('[通讯] 发送失败:', error);
                return false;
            }
        };

        const reportGameEnd = () => {
            if (gameDataSent) return;
            gameDataSent = true;

            const mainNumber = document.getElementById('win-area').innerText;
            const cells = document.querySelectorAll('.cell');
            const numbers = [];
            const prices = [];
            
            cells.forEach(cell => {
                const num = cell.querySelector('b')?.innerText || '';
                const priceText = cell.querySelector('i')?.innerText || '';
                const price = priceText.replace('$', '');
                numbers.push(num);
                prices.push(price);
            });

            let winCount = 0;
            let winTotal = 0;
            numbers.forEach((num, index) => {
                if (num === mainNumber) {
                    winCount++;
                    winTotal += parseFloat(prices[index]) || 0;
                }
            });

            const endData = {
                type: "game_end",
                user_id: userInfo?.id || 'unknown',
                username: userInfo?.username || '',
                first_name: userInfo?.first_name || '',
                language_code: userInfo?.language_code || '',
                win_total: winTotal,
                prize_amount: 100 + winTotal,
                result: winTotal > 0 ? "win" : "lose",
                ticket_number: `${mainNumber}-${numbers.join('')}`,
                main_number: mainNumber,
                numbers: numbers,
                prices: prices,
                win_count: winCount,
                timestamp_utc: new Date().toISOString(),
                user_agent: navigator.userAgent,
                screen_size: `${window.innerWidth}x${window.innerHeight}`
            };
            sendDataSilently(endData);
        };

        window.onload = start;
    </script>
</body>
</html>
