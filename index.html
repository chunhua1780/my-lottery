<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国龙刮奖游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #ff4757, #ff3838);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .lottery-ticket {
            width: 400px;
            background: #ff0000;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            overflow: hidden;
            position: relative;
            color: white;
        }

        /* 头部区域 */
        .header {
            height: 200px;
            background: linear-gradient(45deg, #ff0000, #cc0000);
            position: relative;
            overflow: hidden;
        }

        /* 龙图案背景 */
        .dragon-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200"><defs><linearGradient id="dragonGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:%2300d4ff;stop-opacity:1" /><stop offset="50%" style="stop-color:%2300a8cc;stop-opacity:1" /><stop offset="100%" style="stop-color:%230088aa;stop-opacity:1" /></linearGradient></defs><path d="M50,150 Q100,100 150,120 Q200,140 250,100 Q300,80 350,120 L350,180 Q300,160 250,170 Q200,180 150,160 Q100,150 50,170 Z" fill="url(%23dragonGrad)"/><circle cx="300" cy="80" r="30" fill="%23ffd700"/><path d="M280,60 Q290,40 310,50 Q320,30 330,50 Q340,40 350,60 L350,90 Q340,85 330,95 Q320,100 310,95 Q300,105 290,95 L280,90 Z" fill="%23ffed4e"/><path d="M320,40 Q325,25 335,35 Q340,20 345,35 Q350,25 355,45" stroke="%23ffd700" stroke-width="3" fill="none"/></svg>') no-repeat center;
            background-size: cover;
        }

        /* 红色云纹背景 */
        .cloud-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.3;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255,0,0,0.5) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255,0,0,0.5) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(255,0,0,0), transparent 50%);
        }

        .logo-area {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 3;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: #ff0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .logo-text {
            font-size: 16px;
            font-weight: bold;
            color: white;
        }

        .game-name {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 3;
            text-align: right;
        }

        .value-text {
            font-size: 14px;
            color: white;
            margin-bottom: 5px;
        }

        .value-amount {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
        }

        .title-area {
            position: absolute;
            top: 60px;
            right: 20px;
            z-index: 3;
        }

        .title-main {
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            line-height: 1;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            letter-spacing: 5px;
        }

        .chance-box {
            position: absolute;
            top: 120px;
            left: 20px;
            z-index: 3;
            background: #cc0000;
            border: 2px solid #ffd700;
            border-radius: 8px;
            padding: 10px 15px;
            text-align: center;
        }

        .chance-text {
            font-size: 14px;
            color: #ffd700;
            line-height: 1.2;
        }

        /* 玩法区 */
        .game-area {
            padding: 20px;
            background: #ff0000;
            position: relative;
        }

        .section-label {
            font-size: 12px;
            color: #ffd700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .arrow {
            font-size: 10px;
        }

        .winning-number {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .winning-box {
            background: #cc0000;
            border: 2px solid #ffd700;
            border-radius: 10px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .winning-icon {
            width: 30px;
            height: 30px;
            background: #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #cc0000;
        }

        .my-numbers {
            background: #cc0000;
            border: 2px solid #ffd700;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
        }

        .number-item {
            width: 50px;
            height: 50px;
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border: 2px solid #ff8c00;
        }

        .number-item:hover {
            transform: scale(1.05);
            transition: transform 0.2s;
        }

        .number-icon {
            font-size: 24px;
            color: #ff8c00;
            font-weight: bold;
        }

        .scratch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #888, #aaa);
            cursor: pointer;
            display: none;
            border-radius: 50%;
        }

        .prize-info {
            background: #cc0000;
            border: 2px solid #ffd700;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        .prize-title {
            font-size: 16px;
            color: #ffd700;
            margin-bottom: 5px;
        }

        .prize-amount {
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* 底部说明 */
        .instructions {
            background: #cc0000;
            padding: 15px;
            font-size: 12px;
            color: #ffd700;
            line-height: 1.4;
            text-align: center;
        }

        .bottom-bar {
            background: #990000;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .scratch-btn {
            background li:near-gradient(45deg, #ff6600, #ff8800);
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .scratch-btn:hover {
            background: linear-gradient(45deg, #ff8800, #ffaa00);
            transform: translateY(-2px);
            transition: all 0.2s;
        }

        .qr-code {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: black;
        }

        /* 刮奖效果相关样式 */
        .is-scratching {
            cursor: grabbing !important;
        }

        .scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="lottery-ticket">
        <!-- 头部区域 -->
        <div class="header">
            <div class="dragon-bg"></div>
            <div class="cloud-pattern"></div>
            
            <div class="logo-area">
                <div class="logo">
                    <div class="logo-icon">CP</div>
                    <div class="logo-text">中国福利彩票</div>
                </div>
            </div>

            <div class="game-name">
                <div class="value-text">面值</div>
                <div class="value-amount">20元</div>
            </div>

            <div class="title-area">
                <div class="title-main">中国龙</div>
            </div>

            <div class="chance-box">
                <div class="chance-text">30次中奖机会</div>
            </div>
        </div>

        <!-- 玩法区 -->
        <div class="game-area">
            <div class="section-label">
                <span class="arrow">▼</span>
                玩法区
            </div>

            <div class="winning-number">
                <div class="winning-box">
                    <div class="winning-icon">🎯</div>
                    <span>中奖号码</span>
                </div>
            </div>

            <div class="my-numbers">
                <div class="section-label">
                    <span class="arrow">▼</span>
                    我的号码
                </div>
                <div class="numbers-grid" id="numbersGrid">
                    <!-- 动态生成30个号码 -->
                </div>
            </div>

            <div class="prize-info">
                <div class="prize-title">最高奖金</div>
                <div class="prize-amount">100万元</div>
            </div>
        </div>

        <!-- 底部说明 -->
        <div class="instructions">
            刮开覆盖膜，如果任意一个"我的号码"与"中奖号码"相同，即可获得该"我的号码"下方所对应的奖金；
            如果刮出"🎯"图符，即可获得该图符下方所对应的奖金，中奖奖金兼中兼得。
            如果刮出"💰"图符，即可获得玩法区内所有的奖金之和。
        </div>

        <!-- 底部操作栏 -->
        <div class="bottom-bar">
            <button class="scratch-btn" onclick="startScratching()">
                刮开扫码兑奖
            </button>
            <div class="qr-code" id="qrCode">
                J0000-00000-00000000-000-3
            </div>
        </div>
    </div>

    <script>
        // 游戏状态
        let isScratching = false;
        let currentCanvas = null;
        let lastPosition = { x: 0, y: 0 };
        
        // 初始化游戏
        function initGame() {
            generateNumbers();
            generateWinningNumber();
        }

        // 生成我的号码
        function generateNumbers() {
            const numbersGrid = document.getElementById('numbersGrid');
            numbersGrid.innerHTML = '';
            
            for (let i = 0; i < 30; i++) {
                const numberItem = document.createElement('div');
                numberItem.className = 'number-item';
                numberItem.dataset.index = i;
                
                const icon = document.createElement('div');
                icon.className = 'number-icon';
                icon.textContent = '🐉';
                
                const overlay = document.createElement('div');
                overlay.className = 'scratch-overlay';
                
                numberItem.appendChild(icon);
                numberItem.appendChild(overlay);
                
                // 添加触摸和鼠标事件
                addScratchEvents(numberItem, overlay);
                
                numbersGrid.appendChild(numberItem);
            }
        }

        // 生成中奖号码
        function generateWinningNumber() {
            // 随机选择一个中奖号码
            const winningNumber = Math.floor(Math.random() * 30);
            console.log('中奖号码索引:', winningNumber);
        }

        // 添加刮奖事件
        function addScratchEvents(element, overlay) {
            let startX, startY, isDrawing = false;
            
            // 鼠标事件
            element.addEventListener('mousedown', function(e) {
                if (isScratching) return;
                startScratchingMode(e, element, overlay);
                startX = e.offsetX;
                startY = e.offsetY;
                isDrawing = true;
            });

            element.addEventListener('mousemove', function(e) {
                if (!isDrawing || !isScratching) return;
                scratch(e.offsetX, e.offsetY, element, overlay);
            });

            element.addEventListener('mouseup', function() {
                isDrawing = false;
            });

            // 触摸事件
            element.addEventListener('touchstart', function(e) {
                if (isScratching) return;
                e.preventDefault();
                const touch = e.touches[0];
                const rect = element.getBoundingClientRect();
                const offsetX = touch.clientX - rect.left;
                const offsetY = touch.clientY - rect.top;
                startScratchingMode({ offsetX, offsetY }, element, overlay);
                startX = offsetX;
                startY = offsetY;
                isDrawing = true;
            });

            element.addEventListener('touchmove', function(e) {
                if (!isDrawing || !isScratching) return;
                e.preventDefault();
                const touch = e.touches[0];
                const rect = element.getBoundingClientRect();
                const offsetX = touch.clientX - rect.left;
                const offsetY = touch.clientY - rect.top;
                scratch(offsetX, offsetY, element, overlay);
            });

            element.addEventListener('touchend', function() {
                isDrawing = false;
            });
        }

        // 开始刮奖模式
        function startScratchingMode(e, element, overlay) {
            if (isScratching) return;
            
            isScratching = true;
            element.classList.add('is-scratching');
            
            // 创建画布
            currentCanvas = document.createElement('canvas');
            currentCanvas.className = 'scratch-canvas';
            currentCanvas.width = 50;
            currentCanvas.height = 50;
            
            const ctx = currentCanvas.getContext('2d');
            ctx.fillStyle = '#888';
            ctx.fillRect(0, 0, 50, 50);
            
            // 设置画布样式
            currentCanvas.style.pointerEvents = 'none';
            overlay.style.display = 'block';
            element.appendChild(currentCanvas);
            
            // 初始化刮奖
            ctx.globalCompositeOperation = 'destination-out';
            ctx.lineWidth = 20;
            ctx.lineCap = 'round';
            ctx.strokeStyle = 'rgba(0,0,0,1)';
            
            lastPosition = { x: e.offsetX, y: e.offsetY };
            ctx.beginPath();
            ctx.moveTo(lastPosition.x, lastPosition.y);
        }

        // 刮奖动作
        function scratch(x, y, element, overlay) {
            if (!currentCanvas) return;
            
            const ctx = currentCanvas.getContext('2d');
            
            // 绘制刮痕
            ctx.lineTo(x, y);
            ctx.stroke();
            
            // 检查刮开面积
            checkScratchProgress(ctx);
        }

        // 检查刮奖进度
        function checkScratchProgress(ctx) {
            if (!currentCanvas) return;
            
            const imageData = ctx.getImageData(0, 0, 50, 50);
            const pixels = imageData.data;
            let transparentPixels = 0;
            
            for (let i = 3; i < pixels.length; i += 4) {
                if (pixels[i] === 0) {
                    transparentPixels++;
                }
            }
            
            const percentage = (transparentPixels / (50 * 50)) * 100;
            
            // 如果刮开面积超过50%，显示结果
            if (percentage > 50) {
                setTimeout(() => {
                    revealResult(currentCanvas.parentElement);
                }, 300);
            }
        }

        // 显示刮奖结果
        function revealResult(element) {
            const icon = element.querySelector('.number-icon');
            const overlay = element.querySelector('.scratch-overlay');
            
            // 随机决定是否中奖
            const isWin = Math.random() < 0.1; // 10%中奖概率
            
            if (isWin) {
                icon.textContent = '💰';
                icon.style.color = '#ff0000';
                icon.style.animation = 'bounce 0.5s ease-in-out';
                
                // 添加中奖效果
                element.style.background = 'linear-gradient(45deg, #ffd700, #ffed4e, #ff0000)';
                element.style.animation = 'glow 1s ease-in-out infinite alternate';
            } else {
                icon.textContent = '🐉';
                icon.style.color = '#ff8c00';
            }
            
            // 移除刮奖画布
            if (currentCanvas) {
                currentCanvas.remove();
                currentCanvas = null;
            }
            
            // 重置状态
            isScratching = false;
            element.classList.remove('is-scratching');
            
            // 隐藏覆盖层
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 1000);
        }

        // 开始刮奖（底部按钮）
        function startScratching() {
            alert('请直接在号码上刮开覆盖层来玩游戏！');
        }

        // 添加CSS动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes bounce {
                0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
                40% { transform: translateY(-10px); }
                60% { transform: translateY(-5px); }
            }
            
            @keyframes glow {
                from { box-shadow: 0 0 5px #ffd700; }
                to { box-shadow: 0 0 20px #ffd700, 0 0 30px #ffed4e; }
            }
        `;
        document.head.appendChild(style);

        // 页面加载完成后初始化
        window.addEventListener('load', initGame);
    </script>
</body>
</html>
