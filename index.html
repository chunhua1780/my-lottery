<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国龙-至尊兑奖版</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: "Arial Black", "Verdana", sans-serif; }
        
        .card-container { position: relative; width: 360px; height: 720px; background: url('64005.jpg') no-repeat; background-size: cover; border-radius: 10px; }

        /* 1. 玩法区 (中奖号码) - 对应如意红框中心 */
        .win-box { position: absolute; top: 358px; left: 130px; width: 100px; height: 60px; z-index: 1; display: flex; justify-content: center; align-items: center; }

        /* 2. 我的号码区 - 对应大黄色方框 (6列 x 5行) */
        /* 精调 top/left 和 grid 间距，确保每个数字都在龙圆圈正中心 */
        .my-grid { 
            position: absolute; 
            top: 445px; /* 下移确保对准第一排 */
            left: 24px; /* 右移 0.3cm */
            width: 312px; 
            height: 255px; 
            z-index: 1; 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            grid-template-rows: repeat(5, 1fr);
            row-gap: 5px; /* 纵向微调 */
        }

        .num-item { display: flex; flex-direction: column; justify-content: center; align-items: center; color: #000; font-weight: 900; font-size: 15px; text-shadow: 1px 1px 0 #fff; }
        
        /* 奖金深红色，W 缩写 */
        .prize-item { font-size: 10px; color: #8B0000; font-weight: 900; margin-top: 1px; }

        /* 覆盖层 - 覆盖玩法区和黄色大框 */
        #scratch-canvas { position: absolute; top: 345px; left: 18px; width: 324px; height: 365px; z-index: 10; touch-action: none; cursor: crosshair; }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="win-box" id="win-num"></div>
        <div class="my-grid" id="my-nums"></div>
        <canvas id="scratch-canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. 生成玩法区随机中奖号码
        const luckyNum = Math.floor(Math.random() * 89) + 10;
        document.getElementById('win-num').innerHTML = `<div class="num-item" style="font-size:24px">${luckyNum}</div>`;

        // 2. 生成30个格子
        const myBox = document.getElementById('my-nums');
        const prizePool = ["10", "20", "50", "100", "500", "1000", "1W", "10W", "100W"];

        for (let i = 0; i < 30; i++) {
            // 随机生成我的号码
            let n = Math.floor(Math.random() * 89) + 10;
            // 随机抽取奖金
            let p = prizePool[Math.floor(Math.random() * prizePool.length)];
            
            myBox.innerHTML += `
                <div class="num-item">
                    ${n}
                    <div class="prize-item">¥${p}</div>
                </div>`;
        }

        // 3. 绘制磨砂涂层
        function init() {
            canvas.width = 324;
            canvas.height = 365;
            
            // 银灰色遮盖
            ctx.fillStyle = '#BDBDBD';
            ctx.fillRect(0, 0, 324, 365);
            
            // 模拟真实涂层颗粒
            for(let i=0; i<2000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#E0E0E0' : '#828282';
                ctx.fillRect(Math.random()*324, Math.random()*365, 1.2, 1.2);
            }

            // 涂层上的说明文字
            ctx.fillStyle = '#444';
            ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('玩法区', 162, 45);
            ctx.fillText('刮 开 区', 162, 210);
        }

        let isDrawing = false;
        function scratch(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 20, 0, Math.PI * 2); // 稍微加大刮除圆圈，更爽快
            ctx.fill();
        }

        canvas.addEventListener('mousedown', () => isDrawing = true);
        canvas.addEventListener('touchstart', (e) => { isDrawing = true; scratch(e); });
        window.addEventListener('mouseup', () => isDrawing = false);
        window.addEventListener('touchend', () => isDrawing = false);
        canvas.addEventListener('mousemove', scratch);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, {passive: false});

        init();
    </script>
</body>
</html>
