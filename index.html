<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=360, user-scalable=no, viewport-fit=cover">
    <title>拾光 - Scratch & Win Global</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');
        body { margin: 0; background: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; touch-action: none; }
        
        /* 倒计时光环 */
        #loader { position: fixed; inset: 0; z-index: 1000; display: flex; justify-content: center; align-items: center; background: #fff; }
        .cd-wrapper { position: relative; width: 160px; height: 160px; display: flex; justify-content: center; align-items: center; }
        .cd-ring-svg { position: absolute; width: 160px; height: 160px; transform: rotate(-90deg); }
        .cd-ring-svg circle { 
            fill: none; stroke-width: 8; stroke-linecap: round;
            stroke: url(#ringGradient); stroke-dasharray: 440; stroke-dashoffset: 0;
            transition: stroke-dashoffset 0.9s linear;
        }
        .cd-num { font-size: 70px; font-weight: 900; color: #1e293b; z-index: 10; }

        /* 国际化双语弹窗：撬出感加强 */
        #top-dialog { 
            position: fixed; top: 40px; left: 50%; transform: translateX(-50%) scale(0.7); 
            width: 320px; padding: 35px 0; background: rgba(255,255,255,0.98); 
            backdrop-filter: blur(25px); border-radius: 45px; z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; 
            box-shadow: 0 50px 120px rgba(0,0,0,0.35); 
            opacity: 0; visibility: hidden; 
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); 
            border: 1.5px solid rgba(255,255,255,0.6); 
        }
        #top-dialog.active { opacity: 1; visibility: visible; transform: translateX(-50%) scale(1); }
        
        #stage { position: relative; width: 360px; height: 720px; margin: 0 auto; background: #fff url('64005.png') center/100% 100% no-repeat; opacity: 0; transition: opacity 1s; }
        #win-area { position: absolute; left: 151px; top: 263px; width: 72px; height: 66px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 900; color: #1e293b; }
        #grid-area { position: absolute; left: 27px; top: 335px; width: 310px; height: 284px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; padding: 5px; box-sizing: border-box; }
        .cell b { font-size: 20px; display: block; font-weight: 900; text-align: center; color: #000; }
        .cell i { font-size: 10px; display: block; text-align: center; color: #000; font-style: normal; font-weight: 600; }
        
        /* 坐标微调 */
        #c_win { position: absolute; z-index: 500; left: 152px; top: 256px; width: 71px; height: 52px; cursor: crosshair; }
        #c_grid { position: absolute; z-index: 500; left: 22px; top: 322px; width: 317px; height: 300px; cursor: crosshair; }
        
        /* 按钮组双语优化 */
        .btn-group { display: flex; gap: 15px; margin-top: 30px; }
        .btn-replay { background: #6366f1; color: #fff; padding: 14px 24px; border-radius: 35px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; text-align: center; line-height: 1.2; box-shadow: 0 10px 20px rgba(99,102,241,0.3); }
        .btn-exit { background: #f1f5f9; color: #64748b; padding: 14px 24px; border-radius: 35px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; text-align: center; line-height: 1.2; }
    </style>
</head>
<body>
    <div id="loader">
        <div class="cd-wrapper">
            <svg class="cd-ring-svg">
                <defs>
                    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#6366f1" />
                        <stop offset="100%" stop-color="#ec4899" />
                    </linearGradient>
                </defs>
                <circle id="progress-circle" cx="80" cy="80" r="70"></circle>
            </svg>
            <div id="cd" class="cd-num">3</div>
        </div>
    </div>
    
    <div id="top-dialog">

        <div id="res-num" style="margin-top: 10px; font-size: 13px; color: #94a3b8; letter-spacing: 1px;">WINNING NUMBER / 中奖号码: --</div>

        <div id="res-amt" style="padding: 15px 55px; background: #000; color: #fff; border-radius: 50px; font-size: 28px; font-weight: 900; box-shadow: 0 15px 30px rgba(0,0,0,0.2);">$0.00</div>
        
        <div class="btn-group">
            <button class="btn-replay" onclick="location.reload()">PLAY AGAIN<br>再玩一次</button>
            <button class="btn-exit" onclick="tg.close()">EXIT<br>离开</button>
        </div>
    </div>

        <div id="grid-area"></div>
        <canvas id="c_win"></canvas>
        <canvas id="c_grid"></canvas>
    </div>

        tg.expand();

        async function start() {
            const el = document.getElementById('cd');
            const circle = document.getElementById('progress-circle');
            const steps = [3, 2, 1, 'GO'];
            for(let i=0; i<steps.length; i++) {
                el.innerText = steps[i];
                circle.style.strokeDashoffset = 440 - (440 * (i + 1) / steps.length);
                await new Promise(r => setTimeout(r, 900));
            }
            document.getElementById('loader').style.display = 'none';
            document.getElementById('stage').style.opacity = '1';
            init();
        }

            document.getElementById('win-area').innerText = winNum;
            const g = document.getElementById('grid-area');
            let h = ""; combinations = []; winTotal = 0;
            for(let i=0; i<30; i++) {
                const isWin = Math.random() < 0.15;

                if(isWin) winTotal += parseFloat(p);
                combinations.push(n);
                h += `<div class="cell"><b>${n}</b><i>$${p}</i></div>`;
            }
            g.innerHTML = h;
            setupCanvas("c_win");
            setupCanvas("c_grid");
        }

            }
