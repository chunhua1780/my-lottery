<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>刮刮乐Pro+</title>

<style>
body{
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

/* ===== 倒计时 ===== */
#loader{
    position:fixed;
    width:100%;height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    z-index:99;
}
#count{
    font-size:140px;
    font-weight:900;
    background:linear-gradient(45deg,#ff00cc,#00fff0,#ffe600,#ff0066);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    filter:blur(1px);
    animation:pop 1s ease;
}
@keyframes pop{
    0%{transform:scale(0.3) rotate(-20deg);opacity:0;}
    50%{transform:scale(1.3) rotate(10deg);}
    100%{transform:scale(1);opacity:1;}
}

/* 卡片 */
.card{
    position:relative;
    width:360px;height:720px;
    background:url('64005.jpg') no-repeat;
    background-size:cover;
    opacity:0;
    transition:0.6s;
}

/* 中奖区 */
#win{
    position:absolute;
    top:140px;
    left:160px;
    font-size:22px;
    font-weight:900;
}

/* 网格 */
.grid{
    position:absolute;
    top:230px;
    left:20px;
    width:310px;
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:6px;
}
.cell{
    height:48px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}
.num{font-size:15px;font-weight:900;}
.money{font-size:11px;color:#700000;}

/* 刮层 */
canvas{position:absolute;z-index:10;}
#c1{top:130px;left:150px;width:70px;height:50px;}
#c2{top:220px;left:20px;width:310px;height:300px;}

/* 结果气泡 */
#popup{
    position:absolute;
    top:80px;
    left:50%;
    transform:translateX(-50%);
    background:#fff;
    padding:15px 25px;
    border-radius:20px;
    display:none;
    animation:fadeUp 0.5s;
}
@keyframes fadeUp{
    from{opacity:0;transform:translate(-50%,20px);}
    to{opacity:1;transform:translate(-50%,0);}
}
</style>
</head>

<body>

<div id="loader"><div id="count">3</div></div>

<div class="card" id="card">
    <div id="win"></div>
    <div class="grid" id="grid"></div>
    <canvas id="c1"></canvas>
    <canvas id="c2"></canvas>
    <div id="popup"></div>
</div>

<audio id="sound" src="https://actions.google.com/sounds/v1/scrapes/scratch.ogg"></audio>

<script>

/* ===== 概率模型 ===== */
function getData(){
    let lucky=Math.floor(Math.random()*90)+10;
    let r=Math.random();
    let total=5;

    if(r<0.55) total=5;
    else if(r<0.8) total=10;
    else if(r<0.95) total=20;
    else total=50;

    let arr=[];
    let used=false;

    for(let i=0;i<30;i++){
        let num=Math.floor(Math.random()*90)+10;
        let prize=0;

        if(!used && Math.random()<0.2){
            num=lucky;
            prize=total;
            used=true;
        }

        arr.push({num,prize});
    }

    return {lucky,arr,total};
}

const data=getData();
document.getElementById('win').innerText=data.lucky;

const grid=document.getElementById('grid');
data.arr.forEach(s=>{
    grid.innerHTML+=`
    <div class="cell">
        <div class="num">${s.num}</div>
        <div class="money">${s.prize?('¥'+s.prize):''}</div>
    </div>`;
});

/* ===== 刮层 ===== */
let done1=false,done2=false;

function setup(id,flag){
    const c=document.getElementById(id);
    const ctx=c.getContext('2d');

    c.width=c.offsetWidth;
    c.height=c.offsetHeight;

    ctx.fillStyle='#bbb';
    ctx.fillRect(0,0,c.width,c.height);

    let down=false;
    const sound=document.getElementById('sound');

    function draw(e){
        if(!down)return;

        sound.currentTime=0;
        sound.play();

        const r=c.getBoundingClientRect();
        const x=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
        const y=(e.touches?e.touches[0].clientY:e.clientY)-r.top;

        ctx.globalCompositeOperation='destination-out';
        ctx.beginPath();
        ctx.arc(x,y,18,0,Math.PI*2);
        ctx.fill();

        let img=ctx.getImageData(0,0,c.width,c.height);
        let clear=0;
        for(let i=3;i<img.data.length;i+=4){
            if(img.data[i]==0) clear++;
        }

        if(clear>img.data.length*0.95){
            if(flag===1) done1=true;
            if(flag===2) done2=true;
            if(done1 && done2) showResult();
        }
    }

    c.onmousedown=()=>down=true;
    window.onmouseup=()=>down=false;
    c.onmousemove=draw;
}

setup('c1',1);
setup('c2',2);

/* ===== 倒计时 ===== */
let n=3;
const el=document.getElementById('count');

let timer=setInterval(()=>{
    n--;
    if(n>0){
        el.innerText=n;
        el.style.animation='none';
        setTimeout(()=>el.style.animation='pop 1s',10);
    }else{
        clearInterval(timer);
        document.getElementById('loader').style.display='none';
        document.getElementById('card').style.opacity=1;
    }
},1000);

/* ===== 结果 ===== */
function showResult(){
    let r=data.total;
    let msg='';

    if(r===5) msg='不错！小幸运 🍀';
    else if(r===10) msg='运气在线！继续冲';
    else if(r===20) msg='可以可以！手气不错';
    else msg='🎉 大奖来了！';

    const pop=document.getElementById('popup');
    pop.innerText=`${msg} +¥${r}`;
    pop.style.display='block';
}

</script>

</body>
</html>
