<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工程测试版 - 全维度调优工具</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Oswald:wght@700&display=swap');

        :root {
            /* 所有的参数都通过 CSS 变量驱动，JS 实时改写 */
            --win-x: 145px; --win-y: 135px; --win-w: 80px; --win-h: 80px;
            --win-fs: 36px; --win-color: #000000; --win-off-x: 0px; --win-off-y: 0px;

            --grid-x: 18px; --grid-y: 260px; --grid-w: 324px;
            --gap-x: 10px; --gap-y: 18px;
            
            --num-fs: 22px; --num-color: #ffffff; --num-weight: 900;
            --num-off-x: 0px; --num-off-y: 0px;
            
            --amt-fs: 14px; --amt-color: #d32f2f; --amt-spacing: 2px;
            --main-cvs-h: 420px;
        }

        body { margin: 0; background: #000; color: #fff; font-family: 'Montserrat', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* --- 超强调试面板 --- */
        #editor-panel {
            width: 400px; background: #111; border-right: 1px solid #333;
            padding: 20px; overflow-y: auto; z-index: 1000; box-shadow: 10px 0 30px rgba(0,0,0,1);
        }
        .editor-h { color: #ff4444; border-left: 4px solid #ff4444; padding-left: 10px; margin-bottom: 20px; font-size: 18px; font-weight: 900; }
        .group { background: #1a1a1a; border: 1px solid #222; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .group h4 { margin: 0 0 15px 0; color: #ffeb3b; font-size: 12px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .ctrl { display: flex; align-items: center; margin-bottom: 10px; justify-content: space-between; }
        .ctrl label { width: 120px; font-size: 11px; color: #999; }
        input[type="range"] { flex: 1; accent-color: #ff4444; cursor: pointer; }
        .val-num { width: 45px; text-align: right; font-family: monospace; color: #ff4444; font-size: 12px; font-weight: bold; }
        input[type="color"] { background: none; border: 1px solid #333; width: 40px; height: 25px; cursor: pointer; }
        
        .toolbar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; position: sticky; top: 0; background: #111; z-index: 10; padding-bottom: 15px; }
        button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 900; font-size: 12px; }
        .btn-eye { background: #333; color: white; border: 1px solid #444; }
        .btn-copy { background: #ff4444; color: white; }

        /* --- 预览舞台 --- */
        #preview-stage { flex: 1; display: flex; justify-content: center; align-items: center; background: #080808; position: relative; }
        
        #card-mockup {
            position: relative; width: 360px; height: 720px;
            background: url('64005.jpg') center/100% 100% no-repeat;
            box-shadow: 0 0 100px rgba(0,0,0,0.5); border-radius: 12px; overflow: hidden;
        }

        /* 1. 中奖号码区权限 */
        #win-container {
            position: absolute; 
            left: var(--win-x); top: var(--win-y);
            width: var(--win-w); height: var(--win-h);
            display: flex; justify-content: center; align-items: center;
        }
        #win-text {
            font-size: var(--win-fs); 
            color: var(--win-color); 
            transform: translate(var(--win-off-x), var(--win-off-y));
            font-weight: 900;
        }

        /* 2. 刮奖网格权限 */
        #grid-layout {
            position: absolute; 
            left: var(--grid-x); top: var(--grid-y);
            width: var(--grid-w); 
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            column-gap: var(--gap-x); 
            row-gap: var(--gap-y);
        }
        .slot {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            /* 每个格子的独立偏移 */
            transform: translate(var(--num-off-x), var(--num-off-y));
        }
        .slot-n { 
            font-size: var(--num-fs); 
            color: var(--num-color); 
            font-weight: var(--num-weight); 
            line-height: 1; 
        }
        .slot-a { 
            font-size: var(--amt-fs); 
            color: var(--amt-color); 
            margin-top: var(--amt-spacing); 
            font-family: 'Oswald'; font-weight: 700;
        }

        /* 3. 画布权限 */
        canvas { position: absolute; z-index: 10; cursor: crosshair; touch-action: none; transition: opacity 0.2s; }
        .canvas-hidden { opacity: 0 !important; pointer-events: none; }
    </style>
</head>
<body>

<div id="editor-panel">
    <div class="editor-h">PARAM EDITOR v4.0</div>
    
    <div class="toolbar">
        <button class="btn-eye" onclick="toggleCanvas()">👁️ 隐藏涂层对齐</button>
        <button class="btn-copy" onclick="copyParams()">📋 导出最终参数</button>
    </div>

    <div class="group">
        <h4>中奖区 (Winning Zone)</h4>
        <div class="ctrl"><label>容器 X (左右)</label><input type="range" data-p="win-x" min="0" max="300" value="145"><span class="val-num"></span></div>
        <div class="ctrl"><label>容器 Y (上下)</label><input type="range" data-p="win-y" min="0" max="300" value="135"><span class="val-num"></span></div>
        <div class="ctrl"><label>字体大小</label><input type="range" data-p="win-fs" min="10" max="80" value="36"><span class="val-num"></span></div>
        <div class="ctrl"><label>数字水平微调</label><input type="range" data-p="win-off-x" min="-50" max="50" value="0"><span class="val-num"></span></div>
        <div class="ctrl"><label>数字垂直微调</label><input type="range" data-p="win-off-y" min="-50" max="50" value="0"><span class="val-num"></span></div>
        <div class="ctrl"><label>字体颜色</label><input type="color" data-p="win-color" value="#000000"></div>
    </div>

    <div class="group">
        <h4>网格布局 (Grid Spacing)</h4>
        <div class="ctrl"><label>起始 X</label><input type="range" data-p="grid-x" min="0" max="100" value="18"><span class="val-num"></span></div>
        <div class="ctrl"><label>起始 Y</label><input type="range" data-p="grid-y" min="100" max="600" value="260"><span class="val-num"></span></div>
        <div class="ctrl"><label>网格总宽</label><input type="range" data-p="grid-w" min="200" max="360" value="324"><span class="val-num"></span></div>
        <div class="ctrl"><label>水平间距 (GapX)</label><input type="range" data-p="gap-x" min="0" max="50" value="10"><span class="val-num"></span></div>
        <div class="ctrl"><label>垂直间距 (GapY)</label><input type="range" data-p="gap-y" min="0" max="50" value="18"><span class="val-num"></span></div>
    </div>

    <div class="group">
        <h4>数字详情 (Slot Details)</h4>
        <div class="ctrl"><label>数字字体大小</label><input type="range" data-p="num-fs" min="10" max="40" value="22"><span class="val-num"></span></div>
        <div class="ctrl"><label>奖金字体大小</label><input type="range" data-p="amt-fs" min="8" max="30" value="14"><span class="val-num"></span></div>
        <div class="ctrl"><label>数字奖金间距</label><input type="range" data-p="amt-spacing" min="-10" max="20" value="2"><span class="val-num"></span></div>
        <div class="ctrl"><label>整体水平微调</label><input type="range" data-p="num-off-x" min="-30" max="30" value="0"><span class="val-num"></span></div>
        <div class="ctrl"><label>整体垂直微调</label><input type="range" data-p="num-off-y" min="-30" max="30" value="0"><span class="val-num"></span></div>
        <div class="ctrl"><label>数字颜色</label><input type="color" data-p="num-color" value="#ffffff"></div>
        <div class="ctrl"><label>奖金颜色</label><input type="color" data-p="amt-color" value="#d32f2f"></div>
    </div>

    <div class="group">
        <h4>涂层画布 (Canvas Overlay)</h4>
        <div class="ctrl"><label>主区涂层高度</label><input type="range" data-p="main-cvs-h" min="100" max="600" value="420"><span class="val-num"></span></div>
    </div>
</div>

<div id="preview-stage">
    <div id="card-mockup">
        <div id="win-container"><span id="win-text">88</span></div>
        <div id="grid-layout"></div>
        
        <canvas id="cvs-win-layer"></canvas>
        <canvas id="cvs-main-layer"></canvas>
    </div>
</div>

<script>
    // --- 核心响应式引擎 ---
    function bootstrap() {
        const controllers = document.querySelectorAll('input');
        
        controllers.forEach(input => {
            const propertyName = `--${input.dataset.p}`;
            const valueDisplay = input.nextElementSibling;

            const sync = () => {
                let finalValue = input.value;
                // 非颜色值自动补充 px 单位
                if(input.type === 'range') {
                    finalValue += (propertyName.includes('color') ? '' : 'px');
                }
                document.documentElement.style.setProperty(propertyName, finalValue);
                if(valueDisplay) valueDisplay.innerText = input.value;

                // 涉及关键坐标变动时，实时刷绘画布
                syncCanvas();
            };

            input.addEventListener('input', sync);
            sync(); // 初始同步一次
        });
    }

    // --- 画布实时覆盖系统 ---
    function syncCanvas() {
        const rootStyle = getComputedStyle(document.documentElement);
        
        // 同步中奖区
        const winCanvas = document.getElementById('cvs-win-layer');
        winCanvas.style.left = rootStyle.getPropertyValue('--win-x');
        winCanvas.style.top = rootStyle.getPropertyValue('--win-y');
        winCanvas.width = parseInt(rootStyle.getPropertyValue('--win-w'));
        winCanvas.height = parseInt(rootStyle.getPropertyValue('--win-h'));
        renderLayer(winCanvas);

        // 同步刮奖主网格区
        const mainCanvas = document.getElementById('cvs-main-layer');
        mainCanvas.style.left = rootStyle.getPropertyValue('--grid-x');
        mainCanvas.style.top = rootStyle.getPropertyValue('--grid-y');
        mainCanvas.width = parseInt(rootStyle.getPropertyValue('--grid-w'));
        mainCanvas.height = parseInt(rootStyle.getPropertyValue('--main-cvs-h'));
        renderLayer(mainCanvas);
    }

    function renderLayer(canvas) {
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#b7b7b7'; // 银灰色涂层
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 渲染颗粒纹理 (金属磨砂感)
        for(let i=0; i<200; i++) {
            ctx.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.1)';
            ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1, 1);
        }
        attachScratchLogic(canvas, ctx);
    }

    // --- 刮卡交互 ---
    function attachScratchLogic(canvas, ctx) {
        let drawing = false;
        const process = (e) => {
            if(!drawing) return;
            const b = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const x = clientX - b.left;
            const y = clientY - b.top;

            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 18, 0, Math.PI*2);
            ctx.fill();
        };
        canvas.onmousedown = (e) => { drawing = true; process(e); };
        canvas.ontouchstart = (e) => { drawing = true; process(e); };
        window.onmousemove = process;
        window.ontouchmove = process;
        window.onmouseup = () => drawing = false;
        window.ontouchend = () => drawing = false;
    }

    function toggleCanvas() {
        document.querySelectorAll('canvas').forEach(c => c.classList.toggle('canvas-hidden'));
    }

    function copyParams() {
        let dump = "/* 导出的 UI 调优参数 */\n";
        document.querySelectorAll('input').forEach(input => {
            dump += `${input.dataset.p}: ${input.value}\n`;
        });
        console.log(dump);
        alert("参数已生成至 Console，请按 F12 复制。");
    }

    // --- 动态生成 5x6 网格 ---
    function buildGrid() {
        const grid = document.getElementById('grid-layout');
        let slots = '';
        for(let i=0; i<30; i++) {
            const num = Math.floor(Math.random()*90)+10;
            const prize = [5, 10, 20, 50, 100, 500][Math.floor(Math.random()*6)];
            slots += `<div class="slot"><div class="slot-n">${num}</div><div class="slot-a">$${prize}$</div></div>`;
        }
        grid.innerHTML = slots;
    }

    window.onload = () => {
        buildGrid();
        bootstrap();
    };
</script>

</body>
</html>
