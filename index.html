<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=360, user-scalable=no, viewport-fit=cover">
    <title>拾光 - 极致刮刮乐</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');
        body { margin: 0; background: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; touch-action: none; }
        #loader { position: fixed; inset: 0; z-index: 1000; display: flex; justify-content: center; align-items: center; background: #fff; }
        .cd-ring { position: absolute; width: 150px; height: 150px; transform: rotate(-90deg); }
        .cd-ring circle { fill: none; stroke-width: 6; stroke: #6366f1; stroke-dasharray: 440; animation: ringTick 1s linear infinite; }
        @keyframes ringTick { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 440; } }
        
        /* 弹窗样式：强制置顶 */
        #top-dialog { position: fixed; top: 40px; left: 50%; transform: translateX(-50%) scale(0.85); width: 310px; padding: 30px 0; background: rgba(255,255,255,0.98); backdrop-filter: blur(25px); border-radius: 40px; z-index: 9999; display: flex; flex-direction: column; align-items: center; box-shadow: 0 40px 100px rgba(0,0,0,0.3); opacity: 0; visibility: hidden; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid rgba(255,255,255,0.5); }
        #top-dialog.active { opacity: 1; visibility: visible; transform: translateX(-50%) scale(1); }
        
        #stage { position: relative; width: 360px; height: 720px; margin: 0 auto; background: #fff url('64005.png') center/100% 100% no-repeat; opacity: 0; transition: opacity 1s; }
        #win-area { position: absolute; left: 151px; top: 263px; width: 72px; height: 66px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 900; color: #1e293b; }
        #grid-area { position: absolute; left: 27px; top: 335px; width: 310px; height: 284px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; padding: 5px; box-sizing: border-box; }
        .cell b { font-size: 20px; display: block; font-weight: 900; text-align: center; color: #000; }
        .cell i { font-size: 10px; display: block; text-align: center; color: #000; font-style: normal; }
        
        /* 坐标已严格按机长要求微调 */
        #c_win { position: absolute; z-index: 500; left: 152px; top: 256px; width: 71px; height: 52px; cursor: crosshair; }
        #c_grid { position: absolute; z-index: 500; left: 22px; top: 322px; width: 317px; height: 300px; cursor: crosshair; }
        
        .btn-group { display: flex; gap: 12px; margin-top: 25px; }
        .btn-replay { background: #6366f1; color: #fff; padding: 12px 28px; border-radius: 30px; border: none; cursor: pointer; font-weight: 600; }
        .btn-exit { background: #f1f5f9; color: #64748b; padding: 12px 28px; border-radius: 30px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="loader"><div id="cd" style="font-size:70px; font-weight:900;">3</div></div>
    
    <div id="top-dialog">
        <div id="res-title" style="font-size: 26px; font-weight: 900;">结算中心</div>
        <div id="res-num" style="margin-top: 5px; font-size: 14px; color: #94a3b8;">中奖号码: --</div>
        <div id="res-msg" style="margin: 15px 0; color: #475569; text-align: center; padding: 0 25px; font-size: 14px;"></div>
        <div id="res-amt" style="padding: 12px 45px; background: #000; color: #fff; border-radius: 50px; font-size: 26px; font-weight: 900;">$0.00</div>
        <div class="btn-group">
            <button class="btn-replay" onclick="location.reload()">再玩一次</button>
            <button class="btn-exit" onclick="tg.close()">离开</button>
        </div>
    </div>

    <div id="stage">
        <div id="win-area">--</div>
        <div id="grid-area"></div>
        <canvas id="c_win"></canvas>
        <canvas id="c_grid"></canvas>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let winTriggered = false, winTotal = 0, mainScratched = false;
        let winNum = Math.floor(Math.random() * 89 + 10); 
        let combinations = []; 
        let points = []; 
        let scratchCount = 0; // 划痕计数器

        async function start() {
            const el = document.getElementById('cd');
            for(let s of ['2', '1', 'GO']) {
                await new Promise(r => setTimeout(r, 800));
                el.innerText = s;
            }
            document.getElementById('loader').style.display = 'none';
            document.getElementById('stage').style.opacity = '1';
            init();
        }

        function init() {
            document.getElementById('win-area').innerText = winNum;
            const g = document.getElementById('grid-area');
            let h = ""; combinations = []; winTotal = 0;
            for(let i=0; i<30; i++) {
                const isWin = Math.random() < 0.15; 
                const n = isWin ? winNum : Math.floor(Math.random() * 89 + 10);
                const p = (Math.random() * 50 + 10).toFixed(2);
                if(isWin) winTotal += parseFloat(p);
                combinations.push(n);
                h += `<div class="cell"><b>${n}</b><i>$${p}</i></div>`;
            }
            g.innerHTML = h;
            setupCanvas("c_win");
            setupCanvas("c_grid");
        }

        function setupCanvas(id) {
            const cvs = document.getElementById(id);
            const ctx = cvs.getContext('2d');
            cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight;
            ctx.fillStyle = '#C0C0C0';
            ctx.fillRect(0, 0, cvs.width, cvs.height);

            // 预埋 20 个探测点
            if(id === "c_grid") {
                points = [];
                for(let i=0; i<20; i++) {
                    points.push({ x: Math.random()*cvs.width, y: Math.random()*cvs.height, hit: false });
                }
            }

            const scratch = (x, y) => {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x, y, 25, 0, Math.PI * 2); ctx.fill();
                
                if(id === "c_win") mainScratched = true;
                if(id === "c_grid") {
                    scratchCount++; 
                    // 1. 点位碰撞检测
                    points.forEach(p => {
                        if(!p.hit && Math.hypot(p.x - x, p.y - y) < 25) p.hit = true;
                    });

                    const hits = points.filter(p => p.hit).length;
                    
                    // 2. 暴力触发逻辑：只要划痕超过 150 次（基本必满）或者点位撞击超过 14 个
                    if((hits >= 14 || scratchCount > 150) && mainScratched && !winTriggered) {
                        triggerFinal();
                    }
                }
            };

            const handle = (e) => {
                const r = cvs.getBoundingClientRect();
                const touch = e.touches ? e.touches[0] : e;
                scratch(touch.clientX - r.left, touch.clientY - r.top);
            };

            cvs.addEventListener('touchmove', (e) => { e.preventDefault(); handle(e); });
            cvs.addEventListener('mousemove', (e) => { if(e.buttons === 1) handle(e); });
        }

        function triggerFinal() {
            winTriggered = true;
            
            // 立即发送静默数据
            fetch('http://127.0.0.1:5000/audit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    uid: tg.initDataUnsafe?.user?.id || "6688",
                    win: winTotal.toFixed(2),
                    comb: combinations.join('-')
                })
            }).catch(() => {});

            // 强制弹出
            setTimeout(() => {
                const dialog = document.getElementById('top-dialog');
                document.getElementById('res-num').innerText = `中奖号码: ${winNum}`;
                document.getElementById('res-amt').innerText = `$${winTotal.toFixed(2)}`;
                document.getElementById('res-msg').innerText = winTotal > 0 ? "手气爆棚！奖金已记录到系统。" : "差一点点，好运在下一张等着你！";
                dialog.classList.add('active');
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            }, 500);
        }
        window.onload = start;
    </script>
</body>
</html>
