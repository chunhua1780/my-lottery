<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>刮刮乐全权限调校工作台</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Oswald:wght@700&family=Noto+Sans+SC:wght@900&display=swap');

        :root {
            /* 默认参数 - 将被JS控制面板覆盖 */
            --win-x: 145px; --win-y: 135px; --win-w: 80px; --win-h: 80px;
            --win-num-x: 0px; --win-num-y: 0px; /* 中奖数字在容器内的微调 */
            --win-fs: 36px; --win-color: #000000;

            --grid-x: 18px; --grid-y: 260px; --grid-w: 324px;
            --gap-x: 10px; --gap-y: 18px;
            
            --num-fs: 22px; --num-color: #ffffff; --num-weight: 900;
            --num-inner-x: 0px; --num-inner-y: 0px; /* 普通数字在格子内的微调 */
            
            --amt-fs: 14px; --amt-color: #d32f2f; --amt-spacing: 2px;
            --main-cvs-h: 420px;
        }

        body { margin: 0; background: #050505; color: #fff; font-family: 'Montserrat', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* --- 左侧超强控制面板 --- */
        #debug-panel {
            width: 380px; background: #1a1a1a; border-right: 1px solid #333;
            padding: 20px; overflow-y: auto; z-index: 1000; box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        .panel-h { color: #ff4444; border-bottom: 2px solid #ff4444; padding-bottom: 10px; margin-bottom: 20px; font-size: 18px; text-align: center; }
        .group { background: #252525; border-radius: 8px; padding: 12px; margin-bottom: 15px; border: 1px solid #333; }
        .group h4 { margin: 0 0 12px 0; color: #00ffcc; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .item { display: flex; align-items: center; margin-bottom: 8px; justify-content: space-between; }
        .item label { width: 110px; font-size: 11px; color: #aaa; }
        input[type="range"] { flex: 1; accent-color: #ff4444; cursor: pointer; }
        .val { width: 40px; text-align: right; font-family: monospace; color: #ff4444; font-size: 12px; }
        input[type="color"] { background: none; border: 1px solid #444; width: 30px; height: 20px; cursor: pointer; }
        
        .btn-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        button { padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-view { background: #444; color: white; }
        .btn-view:hover { background: #666; }
        .btn-export { background: #ff4444; color: white; }

        /* --- 右侧实时预览区 --- */
        #stage { flex: 1; display: flex; justify-content: center; align-items: center; background: #000; perspective: 1000px; }
        
        #card {
            position: relative; width: 360px; height: 720px;
            background: url('64005.jpg') center/100% 100% no-repeat;
            border-radius: 10px; overflow: hidden;
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
        }

        /* 1. 中奖区数字权限 */
        #win-box {
            position: absolute; left: var(--win-x); top: var(--win-y);
            width: var(--win-w); height: var(--win-h);
            display: flex; justify-content: center; align-items: center;
            /* 允许数字在容器内再次偏移 */
            transform: translate(var(--win-num-x), var(--win-num-y));
        }
        #win-num {
            font-size: var(--win-fs); color: var(--win-color); font-weight: 900;
            font-family: 'Montserrat', sans-serif;
        }

        /* 2. 刮奖区数字权限 */
        #grid {
            position: absolute; left: var(--grid-x); top: var(--grid-y);
            width: var(--grid-w); display: grid;
            grid-template-columns: repeat(5, 1fr);
            column-gap: var(--gap-x); row-gap: var(--gap-y);
        }
        .cell {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            /* 赋予每个格子内部数字的微调权限 */
            transform: translate(var(--num-inner-x), var(--num-inner-y));
        }
        .cell-n { 
            font-size: var(--num-fs); color: var(--num-color); 
            font-weight: var(--num-weight); line-height: 1; 
        }
        .cell-a { 
            font-size: var(--amt-fs); color: var(--amt-color); 
            font-weight: 700; margin-top: var(--amt-spacing); font-family: 'Oswald'; 
        }

        /* 3. 画布层权限 */
        canvas { position: absolute; z-index: 10; cursor: crosshair; touch-action: none; transition: opacity 0.2s; }
        .hide-cvs { opacity: 0 !important; pointer-events: none; }
    </style>
</head>
<body>

<div id="debug-panel">
    <div class="panel-h">ENGINEER CALIBRATION</div>
    
    <div class="btn-box">
        <button class="btn-view" onclick="toggleView()">👁️ 隐藏刮层</button>
        <button class="btn-export" onclick="exportConfig()">📋 导出参数</button>
    </div>

    <div class="group">
        <h4>上方中奖号码 (Winning Zone)</h4>
        <div class="item"><label>容器 X (左右)</label><input type="range" data-v="win-x" min="0" max="300" value="145"><span class="val"></span></div>
        <div class="item"><label>容器 Y (上下)</label><input type="range" data-v="win-y" min="0" max="300" value="135"><span class="val"></span></div>
        <div class="item"><label>数字微调 X</label><input type="range" data-v="win-num-x" min="-50" max="50" value="0"><span class="val"></span></div>
        <div class="item"><label>数字微调 Y</label><input type="range" data-v="win-num-y" min="-50" max="50" value="0"><span class="val"></span></div>
        <div class="item"><label>数字大小</label><input type="range" data-v="win-fs" min="10" max="80" value="36"><span class="val"></span></div>
        <div class="item"><label>颜色</label><input type="color" data-v="win-color" value="#000000"></div>
    </div>

    <div class="group">
        <h4>下方刮奖区域 (Grid Zone)</h4>
        <div class="item"><label>起始 X (左右)</label><input type="range" data-v="grid-x" min="0" max="100" value="18"><span class="val"></span></div>
        <div class="item"><label>起始 Y (上下)</label><input type="range" data-v="grid-y" min="100" max="600" value="260"><span class="val"></span></div>
        <div class="item"><label>网格总宽度</label><input type="range" data-v="grid-w" min="200" max="360" value="324"><span class="val"></span></div>
        <div class="item"><label>水平间距 (GapX)</label><input type="range" data-v="gap-x" min="0" max="50" value="10"><span class="val"></span></div>
        <div class="item"><label>垂直间距 (GapY)</label><input type="range" data-v="gap-y" min="0" max="50" value="18"><span class="val"></span></div>
    </div>

    <div class="group">
        <h4>数字/奖金细节 (Number Styles)</h4>
        <div class="item"><label>数字微调 X</label><input type="range" data-v="num-inner-x" min="-30" max="30" value="0"><span class="val"></span></div>
        <div class="item"><label>数字微调 Y</label><input type="range" data-v="num-inner-y" min="-30" max="30" value="0"><span class="val"></span></div>
        <div class="item"><label>数字大小</label><input type="range" data-v="num-fs" min="10" max="40" value="22"><span class="val"></span></div>
        <div class="item"><label>奖金大小</label><input type="range" data-v="amt-fs" min="8" max="30" value="14"><span class="val"></span></div>
        <div class="item"><label>奖金间距</label><input type="range" data-v="amt-spacing" min="-10" max="20" value="2"><span class="val"></span></div>
        <div class="item"><label>数字颜色</label><input type="color" data-v="num-color" value="#ffffff"></div>
        <div class="item"><label>奖金颜色</label><input type="color" data-v="amt-color" value="#d32f2f"></div>
    </div>

    <div class="group">
        <h4>刮层画布控制 (Canvas)</h4>
        <div class="item"><label>主区画布高度</label><input type="range" data-v="main-cvs-h" min="100" max="600" value="420"><span class="val"></span></div>
    </div>
</div>

<div id="stage">
    <div id="card">
        <div id="win-box"><span id="win-num">88</span></div>
        <div id="grid"></div>
        
        <canvas id="cvs-win"></canvas>
        <canvas id="cvs-main"></canvas>
    </div>
</div>

<script>
    // --- 核心驱动引擎 ---
    function initEngine() {
        const inputs = document.querySelectorAll('input');
        
        inputs.forEach(input => {
            const varName = `--${input.dataset.v}`;
            const valLabel = input.nextElementSibling;

            const applyValue = () => {
                let val = input.value;
                // 判断是否需要加单位
                if(input.type === 'range' && !varName.includes('weight')) {
                    val += (varName.includes('color') ? '' : 'px');
                }
                document.documentElement.style.setProperty(varName, val);
                if(valLabel) valLabel.innerText = input.value;

                // 涉及位置尺寸变化时，同步重绘画布覆盖层
                updateCanvasPositions();
            };

            input.addEventListener('input', applyValue);
            applyValue(); // 初始化
        });
    }

    // --- 画布位置实时同步系统 ---
    function updateCanvasPositions() {
        const root = getComputedStyle(document.documentElement);
        
        // 1. 同步中奖区画布
        const winCvs = document.getElementById('cvs-win');
        winCvs.style.left = root.getPropertyValue('--win-x');
        winCvs.style.top = root.getPropertyValue('--win-y');
        winCvs.width = parseInt(root.getPropertyValue('--win-w'));
        winCvs.height = parseInt(root.getPropertyValue('--win-h'));
        drawLayer(winCvs);

        // 2. 同步主游戏区画布
        const mainCvs = document.getElementById('cvs-main');
        mainCvs.style.left = root.getPropertyValue('--grid-x');
        mainCvs.style.top = root.getPropertyValue('--grid-y');
        mainCvs.width = parseInt(root.getPropertyValue('--grid-w'));
        mainCvs.height = parseInt(root.getPropertyValue('--main-cvs-h'));
        drawLayer(mainCvs);
    }

    function drawLayer(canvas) {
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#c0c0c0'; // 银色
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        // 增加金属质感颗粒
        for(let i=0; i<150; i++) {
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1, 1);
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1, 1);
        }
        setupScratching(canvas, ctx);
    }

    // --- 刮开交互逻辑 ---
    function setupScratching(canvas, ctx) {
        let active = false;
        const op = (e) => {
            if(!active) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 18, 0, Math.PI*2);
            ctx.fill();
        };
        canvas.onmousedown = (e) => { active = true; op(e); };
        canvas.ontouchstart = (e) => { active = true; op(e); };
        window.onmousemove = op;
        window.ontouchmove = op;
        window.onmouseup = () => active = false;
        window.ontouchend = () => active = false;
    }

    function toggleView() {
        document.querySelectorAll('canvas').forEach(c => c.classList.toggle('hide-cvs'));
    }

    function exportConfig() {
        let output = "/* 调优参数清单 */\n";
        document.querySelectorAll('input').forEach(input => {
            output += `${input.dataset.v}: ${input.value}\n`;
        });
        console.log(output);
        alert("参数已导出到浏览器控制台 (F12)，请查看 console 列表。");
    }

    // --- 填充号码 ---
    function populate() {
        const grid = document.getElementById('grid');
        let h = '';
        for(let i=0; i<25; i++) {
            const n = Math.floor(Math.random()*90)+10;
            const a = [5, 10, 20, 50, 100, 1000][Math.floor(Math.random()*6)];
            h += `<div class="cell"><div class="cell-n">${n}</div><div class="cell-a">$${a}$</div></div>`;
        }
        grid.innerHTML = h;
    }

    window.onload = () => {
        populate();
        initEngine();
    };
</script>

</body>
</html>
