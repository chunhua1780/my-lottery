<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=360, user-scalable=no">
    <title>GOLDEN LUCK - LUXE EDITION</title>
    <style>
        /* 引入欧美流行字体 */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Dancing+Script:wght@700&family=Space+Mono&display=swap');

        :root { 
            --accent: #6366f1; /* 现代靛蓝色 */
            --gold-soft: #facc15;
            --glass-bg: rgba(255, 255, 255, 0.75);
        }

        body { margin: 0; background: #f0f2f5; color: #1e293b; font-family: 'Outfit', sans-serif; overflow: hidden; touch-action: none; }

        /* --- 1. 极简流行风倒计时 (Ultra-Clean) --- */
        #loader {
            position: fixed; inset: 0; background: #ffffff; z-index: 100000;
            display: flex; justify-content: center; align-items: center;
            transition: all 0.8s ease;
        }
        .cd-circle {
            position: relative; width: 180px; height: 180px;
            border: 4px solid #f1f5f9; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
        }
        .cd-num {
            font-size: 90px; font-weight: 900; color: var(--accent);
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: breathe 0.9s infinite alternate ease-in-out;
        }
        .cd-progress {
            position: absolute; inset: -4px; border-radius: 50%;
            border: 4px solid transparent; border-top-color: var(--accent);
            animation: spin 1s linear infinite;
        }
        @keyframes breathe { from { transform: scale(0.9); opacity: 0.7; } to { transform: scale(1.1); opacity: 1; } }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- 2. 欧美浅色系对话框 (Premium Light Mode) --- */
        #top-dialog {
            position: fixed; top: -180px; left: 50%; transform: translateX(-50%);
            width: 320px; height: 115px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%); -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 30px; z-index: 100001;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08), inset 0 0 15px rgba(255,255,255,0.5);
            transition: top 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        #top-dialog.active { top: 25px; }

        .d-title { font-size: 20px; font-weight: 900; letter-spacing: 1px; color: #1e293b; margin: 0; }
        .d-msg { font-family: 'Dancing Script'; font-size: 16px; color: #64748b; margin: 2px 0; }
        .d-bal-box { 
            margin-top: 6px; padding: 4px 20px; border-radius: 50px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            color: white; font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 600;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        /* --- 3. 舞台设计 --- */
        #stage { 
            position: relative; width: 360px; height: 720px; margin: 0 auto; 
            background: #fff url('64005.jpg') center/100% 100% no-repeat; 
            opacity: 0; transition: opacity 1s; 
        }
        #win-area { position: absolute; left: 151px; top: 263px; width: 72px; height: 66px; display: flex; align-items: center; justify-content: center; color: #0f172a; font-size: 26px; font-weight: 900; }
        #grid-area { position: absolute; left: 27px; top: 335px; width: 310px; height: 284px; display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(5, 1fr); gap: 10px; padding: 5px; box-sizing: border-box; }
        .cell { text-align: center; color: #0f172a; }
        .cell b { font-size: 19px; display: block; font-weight: 900; }
        .cell i { font-family: 'Space Mono'; font-size: 9px; color: #ef4444; font-style: normal; font-weight: bold; }

        canvas { position: absolute; z-index: 100; touch-action: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="cd-circle">
            <div class="cd-progress"></div>
            <div id="cd" class="cd-num">3</div>
        </div>
    </div>

    <div id="top-dialog">
        <div class="d-title" id="dt">LUCKY STATUS</div>
        <div class="d-msg" id="dm">Checking your fortune...</div>
        <div class="d-bal-box">
            BALANCE: <span id="db">$100.00</span>
        </div>
    </div>

    <div id="stage">
        <div id="win-area">88</div>
        <div id="grid-area"></div>
        <canvas id="c_win" style="left:153px; top:258px; width:71px; height:52px;"></canvas>
        <canvas id="c_grid" style="left:22px; top:322px; width:317px; height:300px;"></canvas>
    </div>

    <script>
        let balance = 100.00, isEnded = false, winTotal = 0;
        let sensorPoints = [];
        let hitCount = 0;

        // 1. 倒计时逻辑
        async function runCD() {
            const el = document.getElementById('cd');
            const steps = ['2', '1', 'GO'];
            for(let s of steps) {
                await new Promise(r => setTimeout(r, 900));
                el.innerText = s;
            }
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('stage').style.opacity = '1';
                initGame();
            }, 600);
        }

        function initGame() {
            const g = document.getElementById('grid-area');
            let h = "";
            for(let i=0; i<30; i++) {
                const n = Math.random() > 0.88 ? "88" : Math.floor(Math.random()*89+10);
                const p = (Math.random()*50+10).toFixed(2);
                if(n === "88") winTotal += parseFloat(p);
                h += `<div class="cell"><b>${n}</b><i>$${p}</i></div>`;
            }
            g.innerHTML = h;

            // 物理感应点初始化 (20点判定)
            for(let i=0; i<5; i++) {
                for(let j=0; j<4; j++) {
                    sensorPoints.push({ x: 40 + j * 75, y: 40 + i * 55, hit: false });
                }
            }

            setupCanvas("c_win");
            setupCanvas("c_grid");
        }

        function setupCanvas(id) {
            const cvs = document.getElementById(id);
            const ctx = cvs.getContext('2d');
            cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight;

            // 欧美高级感涂层：浅灰色哑光 + 微光纹理
            ctx.fillStyle = '#e2e8f0';
            ctx.fillRect(0,0,cvs.width, cvs.height);
            ctx.fillStyle = "rgba(100,116,139,0.15)";
            ctx.font = "bold 16px Arial";
            for(let x=5; x<cvs.width; x+=28) 
                for(let y=18; y<cvs.height; y+=28) ctx.fillText((x+y)%2===0 ? "€":"$", x, y);

            const scratch = (e) => {
                if(isEnded) return;
                const r = cvs.getBoundingClientRect();
                const x = (e.clientX || (e.touches && e.touches[0].clientX)) - r.left;
                const y = (e.clientY || (e.touches && e.touches[0].clientY)) - r.top;

                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x, y, 32, 0, Math.PI*2); ctx.fill();

                if(id === "c_grid") {
                    sensorPoints.forEach(p => {
                        if(!p.hit) {
                            const dist = Math.sqrt((x - p.x)**2 + (y - p.y)**2);
                            if(dist < 32) {
                                p.hit = true;
                                hitCount++;
                                if(hitCount >= 14) triggerPopup(); // 70% 触发
                            }
                        }
                    });
                }
            };

            let paint = false;
            cvs.addEventListener('mousedown', () => paint = true);
            window.addEventListener('mouseup', () => paint = false);
            cvs.addEventListener('mousemove', (e) => { if(paint) scratch(e); });
            cvs.addEventListener('touchstart', (e) => { paint = true; scratch(e); e.preventDefault(); });
            cvs.addEventListener('touchmove', (e) => { scratch(e); e.preventDefault(); });
        }

        function triggerPopup() {
            if(isEnded) return;
            isEnded = true;

            document.querySelectorAll('canvas').forEach(c => c.style.display = 'none');
            
            const dialog = document.getElementById('top-dialog');
            const dt = document.getElementById('dt');
            const dm = document.getElementById('dm');
            const db = document.getElementById('db');

            db.innerText = `$${(balance + winTotal).toFixed(2)}`;

            if(winTotal > 0) {
                dt.innerText = "BIG WINNER!";
                dm.innerText = `Congratulations! You found $${winTotal.toFixed(2)}`;
            } else {
                dt.innerText = "GOOD LUCK!";
                dm.innerText = "Fortune favors the bold. Try again!";
            }

            dialog.classList.add('active');
            if(navigator.vibrate) navigator.vibrate(100);
        }

        window.onload = runCD;
    </script>
</body>
</html>
