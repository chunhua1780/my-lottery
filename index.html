<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国龙-刮刮乐</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: #000; margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; overflow: hidden;
            font-family: "Microsoft YaHei", sans-serif;
            -webkit-user-select: none; user-select: none;
        }

        .card-container { 
            position: relative; width: 360px; height: 720px;
            background: url('64005.jpg') no-repeat; background-size: cover;
            flex-shrink: 0;
        }

        /* 1. 中奖号码 (修正后: T=266, L=169) */
        #win-box { 
            position: absolute; 
            top: 266px; /* 原274 - 8 */
            left: 169px; /* 原177 - 8 */
            width: 40px; height: 35px; z-index: 1;
            display: flex; justify-content: center; align-items: center; 
            font-size: 22px; color: #000; font-weight: 900;
            text-shadow: 1px 1px 0 #fff;
        }
        
        /* 2. 我的号码网格 (维持之前校准好的参数) */
        #my-grid { 
            position: absolute; top: 326px; left: 25px; 
            width: 310px; z-index: 1;
            display: grid; grid-template-columns: repeat(6, 1fr);
            row-gap: 2px; column-gap: 9px;
        }

        .num-item { 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #000; font-weight: 900; line-height: 1.1;
            height: 55px; font-size: 14px;
            text-shadow: 1px 1px 0 #fff;
        }
        .prize-item { font-size: 10px; color: #8B0000; font-weight: 900; }

        /* 3. 刮奖涂层 */
        .scratch-layer { position: absolute; z-index: 10; touch-action: none; }
        
        /* 中奖号涂层同步修正 (修正后: T=260, L=160) */
        #canv-win { 
            top: 260px; /* 原268 - 8 */
            left: 160px; /* 原168 - 8 */
            width: 55px; height: 45px; 
        }
        /* 我的号码涂层保持不变 */
        #canv-mine { top: 322px; left: 21px; width: 318px; height: 299px; }
    </style>
</head>
<body>

    <div class="card-container">
        <div id="win-box"></div>
        <div id="my-grid"></div>
        
        <canvas id="canv-win" class="scratch-layer"></canvas>
        <canvas id="canv-mine" class="scratch-layer"></canvas>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#000000');

        // 随机生成逻辑
        const luckyNum = Math.floor(Math.random() * 89) + 10;
        document.getElementById('win-box').innerText = luckyNum;

        let pool = Array.from({length: 90}, (_, i) => i + 10).sort(() => Math.random() - 0.5);
        const myBox = document.getElementById('my-grid');
        const prizeList = [10, 20, 50, 100, 500, 1000, 5000];

        for (let i = 0; i < 30; i++) {
            let isWin = Math.random() > 0.9; 
            let num = isWin ? luckyNum : (pool[i] === luckyNum ? pool[35] : pool[i]);
            let prize = isWin ? prizeList[Math.floor(Math.random() * prizeList.length)] : [2, 5, 10][Math.floor(Math.random()*3)];
            let prizeStr = prize >= 10000 ? (prize/10000) + "W" : prize;
            myBox.innerHTML += `<div class="num-item">${num}<div class="prize-item">¥${prizeStr}</div></div>`;
            if (isWin && prize >= 500) tg.HapticFeedback.notificationOccurred('success');
        }

        // 初始化涂层
        function initScratch(id, w, h) {
            const c = document.getElementById(id);
            const ctx = c.getContext('2d');
            c.width = w; c.height = h;
            ctx.fillStyle = '#C0C0C0';
            ctx.fillRect(0, 0, w, h);
            for(let i=0; i<400; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#DCDCDC' : '#999';
                ctx.fillRect(Math.random()*w, Math.random()*h, 1.2, 1.2);
            }

            let active = false;
            const scratch = (e) => {
                if (!active) return;
                const rect = c.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, 18, 0, Math.PI * 2);
                ctx.fill();
            };

            c.addEventListener('mousedown', () => active = true);
            c.addEventListener('touchstart', (e) => { active = true; scratch(e); });
            window.addEventListener('mouseup', () => active = false);
            window.addEventListener('touchend', () => active = false);
            c.addEventListener('mousemove', scratch);
            c.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, {passive: false});
        }

        initScratch('canv-win', 55, 45);
        initScratch('canv-mine', 318, 299);
    </script>
</body>
</html>
