<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国龙-位置调试器</title>
    <style>
        body { background: #333; margin: 0; display: flex; flex-direction: column; align-items: center; padding-top: 20px; font-family: sans-serif; }
        
        /* 彩票主体 */
        .card-container { position: relative; width: 360px; height: 720px; background: url('64005.jpg') no-repeat; background-size: cover; border: 2px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        /* 中奖号码区 */
        #win-box { position: absolute; width: 100px; height: 60px; border: 1px dashed lime; display: flex; justify-content: center; align-items: center; z-index: 5; pointer-events: none; }
        
        /* 30个圆圈区 */
        #my-grid { position: absolute; width: 310px; height: 270px; border: 1px dashed cyan; z-index: 5; display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(5, 1fr); pointer-events: none; }

        .num-item { display: flex; flex-direction: column; justify-content: center; align-items: center; color: #000; font-weight: 900; font-size: 14px; text-shadow: 1px 1px 0 #fff; line-height: 1.2; }
        .prize-item { font-size: 9px; color: #8B0000; font-weight: 900; }

        /* 控制面板样式 */
        .control-panel { position: fixed; right: 20px; top: 20px; background: rgba(255,255,255,0.95); padding: 20px; border-radius: 10px; width: 280px; box-shadow: 0 0 10px rgba(0,0,0,0.3); z-index: 100; }
        .control-group { margin-bottom: 15px; }
        .control-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        input[type="range"] { width: 100%; }
        .val-display { color: blue; font-weight: bold; float: right; }
        .code-output { background: #eee; padding: 10px; font-size: 11px; margin-top: 10px; border: 1px solid #ccc; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div class="card-container">
        <div id="win-box"><div class="num-item" style="font-size:22px">88</div></div>
        <div id="my-grid" id="my-nums"></div>
    </div>

    <div class="control-panel">
        <h3>📏 位置调试器</h3>
        
        <div class="control-group">
            <label>玩法区 (中奖号) Top: <span id="winTopVal" class="val-display">350</span></label>
            <input type="range" id="winTop" min="300" max="450" value="350">
        </div>

        <div class="control-group">
            <label>玩法区 (中奖号) Left: <span id="winLeftVal" class="val-display">130</span></label>
            <input type="range" id="winLeft" min="0" max="250" value="130">
        </div>

        <hr>

        <div class="control-group">
            <label>30个圆圈区 Top: <span id="gridTopVal" class="val-display">430</span></label>
            <input type="range" id="gridTop" min="400" max="550" value="430">
        </div>

        <div class="control-group">
            <label>30个圆圈区 Left: <span id="gridLeftVal" class="val-display">25</span></label>
            <input type="range" id="gridLeft" min="0" max="50" value="25">
        </div>

        <div class="control-group">
            <label>行间距 (Row Gap): <span id="rowGapVal" class="val-display">0</span></label>
            <input type="range" id="rowGap" min="-10" max="20" value="0">
        </div>

        <p style="font-size: 12px; color: red;">* 虚线框仅供参考，对准后记下数值告诉我。</p>
        <div class="code-output" id="outputText"></div>
    </div>

    <script>
        const winBox = document.getElementById('win-box');
        const myGrid = document.getElementById('my-grid');
        const output = document.getElementById('outputText');

        // 生成测试格子
        function refreshGrid() {
            myGrid.innerHTML = '';
            for (let i = 0; i < 30; i++) {
                myGrid.innerHTML += `<div class="num-item">10<div class="prize-item">¥1000</div></div>`;
            }
        }

        // 更新位置函数
        function updateStyles() {
            const wt = document.getElementById('winTop').value;
            const wl = document.getElementById('winLeft').value;
            const gt = document.getElementById('gridTop').value;
            const gl = document.getElementById('gridLeft').value;
            const rg = document.getElementById('rowGap').value;

            // 应用样式
            winBox.style.top = wt + 'px';
            winBox.style.left = wl + 'px';
            myGrid.style.top = gt + 'px';
            myGrid.style.left = gl + 'px';
            myGrid.style.rowGap = rg + 'px';

            // 更新数值显示
            document.getElementById('winTopVal').innerText = wt;
            document.getElementById('winLeftVal').innerText = wl;
            document.getElementById('gridTopVal').innerText = gt;
            document.getElementById('gridLeftVal').innerText = gl;
            document.getElementById('rowGapVal').innerText = rg;

            // 生成代码参考
            output.innerText = `中奖号 Top: ${wt}px, Left: ${wl}px\n30个圆圈 Top: ${gt}px, Left: ${gl}px\n行间距: ${rg}px`;
        }

        // 监听所有滑块
        document.querySelectorAll('input[type="range"]').forEach(input => {
            input.addEventListener('input', updateStyles);
        });

        refreshGrid();
        updateStyles();
    </script>
</body>
</html>
