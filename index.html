<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拾光·至臻</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2fe; --gold: #f9d423; --soft-white: #f8f9fa; }
        body { background: #000; margin: 0; font-family: "PingFang SC", "Helvetica Neue", sans-serif; overflow: hidden; color: white; }

        /* --- 1. 极简艺术倒计时 --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; display: flex; justify-content: center; align-items: center;
        }
        #countdown-num {
            font-size: 140px; font-weight: 200; letter-spacing: -5px;
            background: linear-gradient(135deg, #fff 0%, #444 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            opacity: 0;
        }
        .zoom-anim { animation: elegantZoom 1s ease-in-out forwards; }
        @keyframes elegantZoom {
            0% { transform: scale(0.8); opacity: 0; filter: blur(10px); }
            50% { transform: scale(1); opacity: 1; filter: blur(0); }
            100% { transform: scale(1.2); opacity: 0; filter: blur(20px); }
        }

        /* --- 2. 彩票主容器 --- */
        #app-wrapper { display: none; opacity: 0; transition: opacity 0.8s ease; }
        .card-container { position: relative; width: 360px; height: 720px; background-size: 100% 100%; margin: 0 auto; }

        /* 应用你提供的精准参数 */
        #win-box { 
            position: absolute; z-index: 1; display: flex; justify-content: center; align-items: center; font-weight: 900;
            top: 273px; left: 175px; font-size: 22px; color: #000000;
        }
        #my-grid { 
            position: absolute; z-index: 1; display: grid; grid-template-columns: repeat(6, 1fr);
            top: 343px; left: 42px; row-gap: 29px; column-gap: 34px;
        }
        .num-item { display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: 900; font-size: 16px; color: #000; }
        .prize-item { font-size: 9px; color: #9d0000; font-weight: bold; margin-top: -2px; }

        /* 涂层层级 */
        .scratch-layer { position: absolute; z-index: 10; touch-action: none; }
        #canv-win { top: 260px; left: 157px; width: 61px; height: 49px; }
        #canv-mine { top: 322px; left: 21px; width: 318px; height: 299px; }

        /* --- 3. 黄金比例时尚弹窗 (0.618) --- */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 2000;
            display: none; justify-content: center; align-items: center; backdrop-filter: blur(8px);
        }
        #result-modal {
            width: 300px; height: 185px; /* 300 * 0.618 ≈ 185 黄金比例 */
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(240,240,240,0.98) 100%);
            border-radius: 24px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transform: scale(0.7); opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 20px; box-sizing: border-box; position: relative;
        }
        #result-modal.show { transform: scale(1); opacity: 1; }
        
        #res-title { font-size: 18px; font-weight: 600; color: #111; margin: 0; }
        #res-desc { font-size: 13px; color: #666; margin: 8px 0; font-style: italic; line-height: 1.4; }
        #res-amt { font-size: 36px; font-weight: 900; margin: 5px 0; background: linear-gradient(45deg, #ff416c, #ff4b2b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .btn-retry {
            width: 120px; height: 40px; background: #000; color: #fff; border: none;
            border-radius: 20px; font-size: 12px; font-weight: bold; letter-spacing: 1px;
            cursor: pointer; margin-top: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="loader"><div id="countdown-num"></div></div>

    <div id="app-wrapper">
        <div class="card-container" id="main-card">
            <div id="win-box"></div>
            <div id="my-grid"></div>
            <canvas id="canv-win" class="scratch-layer"></canvas>
            <canvas id="canv-mine" class="scratch-layer"></canvas>
        </div>
    </div>

    <div id="modal-overlay">
        <div id="result-modal">
            <h2 id="res-title"></h2>
            <p id="res-desc"></p>
            <h1 id="res-amt"></h1>
            <button class="btn-retry" onclick="location.reload()">NEXT ROUND</button>
        </div>
    </div>

    <script>
        const WIN_QUOTES = [
            { t: "极光之吻", d: "运气这种东西，藏在你的指尖里。" },
            { t: "财运觉醒", d: "这不仅仅是奖金，更是命运的偏爱。" },
            { t: "爆裂惊喜", d: "看吧，属于你的光芒谁也挡不住。" },
            { t: "指尖奇迹", d: "这一秒，全世界都为你心跳。" }
        ];

        const LOSE_QUOTES = [
            { t: "优雅错过", d: "完美的曲线总是带点遗憾，下一张更精彩。" },
            { t: "蓄势待发", d: "财神正在整理领带，马上就来敲你的门。" },
            { t: "未完待续", d: "比起枯燥的成功，我更爱这心跳的一瞬。" },
            { t: "灵感缺位", d: "换个手指，重新定义你的好运。" }
        ];

        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        function getGameData() {
            const ln = Math.floor(Math.random() * 89) + 10;
            const dice = Math.random();
            let tw = dice < 0.45 ? 0 : (dice < 0.9 ? Math.floor(Math.random()*11)+5 : Math.floor(Math.random()*30)+20);
            const sp = []; let acc = 0;
            for (let i = 0; i < 30; i++) {
                let n = Math.floor(Math.random()*89)+10; if(n===ln) n++;
                let pz = [5, 10, 20][Math.floor(Math.random()*3)];
                if (acc < tw && Math.random() < 0.15) { n = ln; pz = Math.max(5, tw - acc); acc += pz; }
                sp.push({ n, p: pz });
            }
            return { ln, sp, tw };
        }

        const game = getGameData();

        window.onload = () => {
            const img = new Image();
            img.src = '64005.jpg';
            img.onload = () => {
                document.getElementById('main-card').style.backgroundImage = `url(64005.jpg)`;
                document.getElementById('win-box').innerText = game.ln;
                const grid = document.getElementById('my-grid');
                game.sp.forEach(s => {
                    grid.innerHTML += `<div class="num-item">${s.n}<div class="prize-item">¥${s.p}</div></div>`;
                });
                initScratch('canv-win', 61, 49);
                initScratch('canv-mine', 318, 299, true);
                startUI();
            };
        };

        function startUI() {
            const el = document.getElementById('countdown-num');
            const nums = ['3', '2', '1'];
            let i = 0;
            const run = () => {
                if (i < 3) {
                    el.innerText = nums[i]; el.className = 'zoom-anim';
                    setTimeout(() => { el.className = ''; }, 950);
                    i++; setTimeout(run, 1000);
                } else {
                    document.getElementById('loader').style.display = 'none';
                    const wrap = document.getElementById('app-wrapper');
                    wrap.style.display = 'block';
                    setTimeout(() => { wrap.style.opacity = '1'; }, 50);
                }
            };
            run();
        }

        function initScratch(id, w, h, isMain = false) {
            const c = document.getElementById(id);
            const ctx = c.getContext('2d');
            c.width = w; c.height = h;
            
            // 涂层艺术感填充
            ctx.fillStyle = '#BBB';
            ctx.fillRect(0,0,w,h);
            ctx.globalAlpha = 0.5;
            for(let i=0; i<400; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#FFF' : '#888';
                ctx.fillRect(Math.random()*w, Math.random()*h, 1, 1);
            }
            ctx.globalAlpha = 1.0;

            let drawing = false;
            let pixels = 0;
            const scrub = (e) => {
                if (!drawing) return;
                const r = c.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x, y, 22, 0, Math.PI*2); ctx.fill();
                if(isMain && ++pixels > 120) showResult();
            };
            c.addEventListener('mousedown', () => drawing = true);
            window.addEventListener('mouseup', () => drawing = false);
            c.addEventListener('mousemove', scrub);
            c.addEventListener('touchstart', (e) => { e.preventDefault(); drawing = true; scrub(e); });
            c.addEventListener('touchmove', (e) => { e.preventDefault(); scrub(e); });
            c.addEventListener('touchend', () => drawing = false);
        }

        let shown = false;
        function showResult() {
            if(shown) return; shown = true;
            const overlay = document.getElementById('modal-overlay');
            const modal = document.getElementById('result-modal');
            const t = document.getElementById('res-title');
            const d = document.getElementById('res-desc');
            const a = document.getElementById('res-amt');

            const pool = game.tw > 0 ? WIN_QUOTES : LOSE_QUOTES;
            const q = pool[Math.floor(Math.random() * pool.length)];
            
            t.innerText = q.t;
            d.innerText = q.d;
            a.innerText = "¥" + game.tw;

            overlay.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 100);
        }
    </script>
</body>
</html>
