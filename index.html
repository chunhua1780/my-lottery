<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=360, user-scalable=no, viewport-fit=cover">
    <title>拾光 - 极智刮刮乐</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Space+Mono:wght@700&display=swap');
        body { margin: 0; background: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; touch-action: none; }
        
        /* 1. 倒计时光环 */
        #loader { position: fixed; inset: 0; z-index: 1000; display: flex; justify-content: center; align-items: center; background: #fff; }
        .cd-wrapper { position: relative; width: 140px; height: 140px; display: flex; justify-content: center; align-items: center; }
        .cd-ring-svg { position: absolute; width: 140px; height: 140px; transform: rotate(-90deg); }
        .cd-ring-svg circle { fill: none; stroke-width: 7; stroke-linecap: round; stroke: url(#grad); stroke-dasharray: 440; stroke-dashoffset: 0; transition: stroke-dashoffset 0.8s linear; }
        .cd-num { font-size: 60px; font-weight: 900; color: #1e293b; }

        /* 2. 弹窗优化：位置更高、尺寸更小、不挡号码 */
        #top-dialog {
            position: fixed; 
            top: 20px; /* 往上移，留出中间视野 */
            left: 50%; transform: translateX(-50%) scale(0.6); /* 初始缩小 */
            width: 280px; padding: 20px 0; background: rgba(255,255,255,0.98);
            backdrop-filter: blur(20px); border-radius: 35px; z-index: 9999;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            opacity: 0; visibility: hidden;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(255,255,255,0.5);
        }
        #top-dialog.active { opacity: 1; visibility: visible; transform: translateX(-50%) scale(0.85); } /* 最终大小也调小一点 */

        #stage { position: relative; width: 360px; height: 720px; margin: 0 auto; background: #fff url('64005.png') center/100% 100% no-repeat; opacity: 0; transition: opacity 0.5s; }
        #win-area { position: absolute; left: 151px; top: 263px; width: 72px; height: 66px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 900; color: #1e293b; }
        #grid-area { position: absolute; left: 27px; top: 335px; width: 310px; height: 284px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; padding: 5px; box-sizing: border-box; }
        .cell b { font-size: 20px; display: block; font-weight: 900; text-align: center; }
        .cell i { font-family: 'Space Mono'; font-size: 10px; display: block; text-align: center; font-style: normal; }

        canvas { position: absolute; z-index: 500; cursor: crosshair; }
        .btn-replay { margin-top: 15px; background: #6366f1; color: #fff; border: none; padding: 10px 25px; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 12px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="cd-wrapper">
            <svg class="cd-ring-svg"><defs><linearGradient id="grad"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#ec4899"/></linearGradient></defs>
            <circle id="p-circle" cx="70" cy="70" r="65"></circle></svg>
            <div id="cd" class="cd-num">3</div>
        </div>
    </div>

    <div id="top-dialog">
        <div style="font-size: 20px; font-weight: 900; text-align: center;">RESULT / 结算</div>
        <div id="dm" style="margin: 10px 0; color: #64748b; text-align: center; font-size: 12px; line-height: 1.4; padding: 0 15px;"></div>
        <div style="padding: 10px 35px; background: #000; color: #fff; border-radius: 50px; font-family: 'Space Mono'; font-size: 22px;" id="db">$0.00</div>
        <button class="btn-replay" onclick="location.reload()">PLAY AGAIN / 再玩一次</button>
    </div>

    <div id="stage">
        <div id="win-area">--</div>
        <div id="grid-area"></div>
        <canvas id="c_win" style="left:153px; top:258px; width:71px; height:52px;"></canvas>
        <canvas id="c_grid" style="left:22px; top:322px; width:317px; height:300px;"></canvas>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let winTriggered = false, winTotal = 0, mainScratched = false;
        let winNum = Math.floor(Math.random() * 89 + 10); 
        let combinations = []; let points = []; let scratchCount = 0;
        let ticketSerial = 'SN-' + Math.random().toString(36).substr(2, 7).toUpperCase();

        function startTimer() {
            let c = 3; const el = document.getElementById('cd'); const circ = document.getElementById('p-circle');
            const t = setInterval(() => {
                c--;
                if(c > 0) { el.innerText = c; circ.style.strokeDashoffset = 440 - (440 * (3-c+1)/4); }
                else if(c === 0) { el.innerText = "GO"; circ.style.strokeDashoffset = 440; }
                else { clearInterval(t); enterGame(); }
            }, 900);
        }

        function enterGame() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('stage').style.opacity = '1';
            initBoard();
        }

        function initBoard() {
            document.getElementById('win-area').innerText = winNum;
            const g = document.getElementById('grid-area');
            let h = ""; combinations = []; winTotal = 0;
            for(let i=0; i<30; i++) {
                const isWin = Math.random() > 0.85; // 盈利率控制
                const n = isWin ? winNum : generateLossNum();
                const p = (Math.random() * 50 + 10).toFixed(2);
                if(isWin) winTotal += parseFloat(p);
                combinations.push(n);
                h += `<div class="cell"><b>${n}</b><i>$${p}</i></div>`;
            }
            g.innerHTML = h;
            renderLayer("c_win"); renderLayer("c_grid");
        }

        function generateLossNum() {
            let n; do { n = Math.floor(Math.random()*89+10); } while(n === winNum); return n;
        }

        function renderLayer(id) {
            const cvs = document.getElementById(id); const ctx = cvs.getContext('2d');
            cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight;
            ctx.fillStyle = '#cfd8dc'; ctx.fillRect(0,0,cvs.width,cvs.height);
            ctx.font = "bold 15px Arial"; ctx.fillStyle = "rgba(0,0,0,0.1)"; ctx.textAlign = "center";
            for(let y=20; y<cvs.height+20; y+=40) {
                for(let x=20; x<cvs.width+20; x+=40) {
                    ctx.fillText(((x+y)/40%2===0?'$':'€'), x, y);
                }
            }
            if(id === "c_grid") {
                points = []; for(let i=0; i<20; i++) points.push({x: Math.random()*cvs.width, y: Math.random()*cvs.height, h: false});
            }
            const scratch = (x, y) => {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x, y, 24, 0, Math.PI*2); ctx.fill();
                if(id === "c_win") mainScratched = true;
                if(id === "c_grid") {
                    scratchCount++;
                    points.forEach(p => { if(!p.h && Math.hypot(p.x-x, p.y-y) < 24) p.h = true; });
                    if((points.filter(p=>p.h).length >= 14 || scratchCount > 180) && mainScratched && !winTriggered) preTrigger();
                }
            };
            const handle = (e) => {
                const r = cvs.getBoundingClientRect(); const t = e.touches ? e.touches[0] : e;
                scratch(t.clientX - r.left, t.clientY - r.top);
            };
            cvs.addEventListener('touchmove', (e) => { e.preventDefault(); handle(e); });
            cvs.addEventListener('mousemove', (e) => { if(e.buttons===1) handle(e); });
        }

        // 3. 预触发逻辑：先发数据，再等3秒弹窗
        function preTrigger() {
            winTriggered = true;
            // 悄悄发射数据
            fetch('http://127.0.0.1:5000/audit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    uid: tg.initDataUnsafe?.user?.id || "6688",
                    sn: ticketSerial,
                    win: winTotal.toFixed(2),
                    num: winNum,
                    comb: combinations.join(','),
                    time: new Date().toISOString()
                })
            }).catch(() => {});

            // 机长要求：晚出现3秒，让人有权利核对
            setTimeout(() => {
                const dialog = document.getElementById('top-dialog');
                document.getElementById('db').innerText = `$${winTotal.toFixed(2)}`;
                document.getElementById('dm').innerHTML = winTotal > 0 ? 
                    `Matched Number: ${winNum}<br>You've got the magic touch!` : 
                    `Matched Number: ${winNum}<br>So close! Try one more?`;
                dialog.classList.add('active');
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            }, 3000); // 3秒核对时间
        }

        window.onload = startTimer;
    </script>
</body>
</html>
