<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刮刮乐终极版</title>

<style>
body {
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card {
    position:relative;
    width:360px;
    height:740px;
    background:url('64005.jpg') no-repeat;
    background-size:cover;
}

.layer {
    position:absolute;
    top:342px;
    left:23px;
    width:314px;
    height:350px;
}

/* 数字样式 */
.num {
    position:absolute;
    transform:translate(-50%,-50%);
    font-size:22px;
    font-weight:900;
    color:#000;
    -webkit-text-stroke:1.5px #fff;
}

.prize {
    font-size:12px;
    color:#d40000;
}

/* canvas */
canvas {
    position:absolute;
    left:23px;
    z-index:10;
}

/* 金币动画 */
.coin {
    position:absolute;
    width:18px;
    height:18px;
    background:gold;
    border-radius:50%;
    pointer-events:none;
}
</style>
</head>

<body>

<div class="card">
    <div class="layer" id="layer"></div>

    <!-- 上方玩法区 -->
    <canvas id="top"></canvas>

    <!-- 下方号码区 -->
    <canvas id="bottom"></canvas>
</div>

<audio id="winSound" src="https://www.soundjay.com/misc/sounds/coin-drop-1.mp3"></audio>

<script>
const layer = document.getElementById('layer');

/* =========================
   🎯 精准坐标（已调优）
========================= */

const winPos = {x:157,y:60};

const myPos = [];
let sx=40, sy=150, gx=58, gy=55;

for(let r=0;r<4;r++){
    for(let c=0;c<5;c++){
        myPos.push({
            x:sx+c*gx,
            y:sy+r*gy
        });
    }
}

/* =========================
   🎰 生成中奖号码
========================= */

const winNum = Math.floor(Math.random()*90)+10;

let winDiv = document.createElement('div');
winDiv.className='num';
winDiv.style.left=winPos.x+'px';
winDiv.style.top=winPos.y+'px';
winDiv.innerText=winNum;
layer.appendChild(winDiv);

/* =========================
   🎯 生成格子
========================= */

let totalWin = 0;

myPos.forEach(p=>{
    let num = Math.floor(Math.random()*90)+10;

    let prizePool = [0,0,0,20,50,100,500];
    let prize = prizePool[Math.floor(Math.random()*prizePool.length)];

    let isWin = num === winNum;

    let d = document.createElement('div');
    d.className='num';
    d.style.left=p.x+'px';
    d.style.top=p.y+'px';

    d.innerHTML = `
        <div class="prize">${prize? '¥'+prize:''}</div>
        ${num}
    `;

    if(isWin && prize>0){
        totalWin += prize;
        d.style.color='red';
        d.style.transform='translate(-50%,-50%) scale(1.2)';
    }

    layer.appendChild(d);
});

/* =========================
   🎰 Canvas刮奖系统
========================= */

function setupCanvas(canvas, height){
    const ctx = canvas.getContext('2d');

    canvas.width = 314;
    canvas.height = height;

    ctx.fillStyle='#bbb';
    ctx.fillRect(0,0,314,height);

    for(let i=0;i<1000;i++){
        ctx.fillStyle=Math.random()>0.5?'#eee':'#888';
        ctx.fillRect(Math.random()*314,Math.random()*height,1,1);
    }

    return ctx;
}

const topCanvas = document.getElementById('top');
const bottomCanvas = document.getElementById('bottom');

topCanvas.style.top="342px";
bottomCanvas.style.top="442px";

const ctx1 = setupCanvas(topCanvas,100);
const ctx2 = setupCanvas(bottomCanvas,250);

/* =========================
   ✋ 刮开 + 自动Reveal
========================= */

function scratch(canvas, ctx){
    let down=false;
    let count=0;

    function draw(e){
        if(!down) return;

        const rect = canvas.getBoundingClientRect();
        const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
        const y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;

        ctx.globalCompositeOperation='destination-out';
        ctx.beginPath();
        ctx.arc(x,y,20,0,Math.PI*2);
        ctx.fill();

        count++;

        if(count>600){
            ctx.clearRect(0,0,canvas.width,canvas.height);
            triggerWin();
        }
    }

    canvas.onmousedown=()=>down=true;
    canvas.onmouseup=()=>down=false;
    canvas.onmousemove=draw;

    canvas.ontouchstart=e=>{down=true;draw(e)};
    canvas.ontouchend=()=>down=false;
    canvas.ontouchmove=e=>{e.preventDefault();draw(e)};
}

scratch(topCanvas,ctx1);
scratch(bottomCanvas,ctx2);

/* =========================
   🎉 中奖效果
========================= */

function triggerWin(){
    if(totalWin>0){
        document.getElementById('winSound').play();
        dropCoins();
    }
}

/* =========================
   💰 金币动画
========================= */

function dropCoins(){
    for(let i=0;i<25;i++){
        let c=document.createElement('div');
        c.className='coin';
        document.body.appendChild(c);

        c.style.left=Math.random()*300+50+'px';
        c.style.top='0px';

        let speed = Math.random()*5+3;

        let fall = setInterval(()=>{
            let t=c.offsetTop;
            c.style.top = t + speed + 'px';

            if(t>700){
                clearInterval(fall);
                c.remove();
            }
        },16);
    }
}
</script>

</body>
</html>
