<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=360, user-scalable=no, viewport-fit=cover">
    <title>GOLDEN LUCK - SUPREME FIX</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Dancing+Script:wght@700&family=Space+Mono:wght@700&display=swap');

        :root { 
            --accent: #6366f1;
            --glass-bg: rgba(255, 255, 255, 0.92);
        }

        body { margin: 0; background: #fff; color: #1e293b; font-family: 'Outfit', sans-serif; overflow: hidden; touch-action: none; }

        /* --- 倒计时 --- */
        #loader {
            position: fixed; inset: 0; z-index: 100000;
            display: flex; justify-content: center; align-items: center;
            background: #fff; transition: opacity 0.6s ease;
        }
        .cd-container { position: relative; width: 150px; height: 150px; display: flex; justify-content: center; align-items: center; }
        .cd-ring { position: absolute; width: 100%; height: 100%; transform: rotate(-90deg); }
        .cd-ring circle {
            fill: none; stroke-width: 6; stroke-linecap: round;
            stroke: url(#ringGradient);
            stroke-dasharray: 440; stroke-dashoffset: 0;
        }
        .ring-active { animation: ringTick 1s linear infinite; }
        @keyframes ringTick { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 440; } }
        .cd-num { font-size: 70px; font-weight: 900; color: #1e293b; }

        /* --- 悬浮对话框 --- */
        #top-dialog {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-20px);
            width: 320px; padding: 25px 0;
            background: var(--glass-bg); backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(0, 0, 0, 0.08); border-radius: 35px; z-index: 100001;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.2);
            opacity: 0; filter: blur(10px);
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
            pointer-events: none; 
        }
        #top-dialog.active { opacity: 1; filter: blur(0px); transform: translateX(-50%) translateY(0); pointer-events: auto; }
        .d-title { font-size: 26px; font-weight: 900; color: #000; margin: 0; }
        .d-msg { font-family: 'Dancing Script'; font-size: 18px; color: #475569; margin: 8px 0; text-align: center; padding: 0 20px; }
        .d-bal-box { margin-top: 12px; padding: 8px 35px; border-radius: 50px; background: #000; color: #fff; font-family: 'Space Mono', monospace; font-size: 15px; }

        /* --- 游戏区域 --- */
        #stage { position: relative; width: 360px; height: 720px; margin: 0 auto; background: #fff url('64005.jpg') center/100% 100% no-repeat; opacity: 0; transition: opacity 1s; }
        #win-area { position: absolute; left: 151px; top: 263px; width: 72px; height: 66px; display: flex; align-items: center; justify-content: center; color: #000; font-size: 26px; font-weight: 900; }
        #grid-area { position: absolute; left: 27px; top: 335px; width: 310px; height: 284px; display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(5, 1fr); gap: 10px; padding: 5px; box-sizing: border-box; }
        .cell b { font-size: 19px; display: block; font-weight: 900; color: #000; text-align: center; }
        .cell i { font-family: 'Space Mono'; font-size: 9px; color: #000; font-weight: 700; display: block; text-align: center; margin-top: -2px; }

        canvas { position: absolute; z-index: 500; touch-action: none; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="cd-container">
            <svg class="cd-ring">
                <defs><linearGradient id="ringGradient"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#a855f7"/></linearGradient></defs>
                <circle id="rc" cx="75" cy="75" r="70" class="ring-active"></circle>
            </svg>
            <div id="cd" class="cd-num">3</div>
        </div>
    </div>

    <div id="top-dialog">
        <div class="d-title" id="dt">LUCKY REVEAL</div>
        <div class="d-msg" id="dm">Every scratch brings fortune...</div>
        <div class="d-bal-box">BALANCE: <span id="db">$100.00</span></div>
        <button onclick="location.reload()" style="margin-top:15px; border:none; background:none; color:#6366f1; font-weight:900; cursor:pointer;">TRY AGAIN</button>
    </div>

    <div id="stage">
        <div id="win-area">88</div>
        <div id="grid-area"></div>
        <canvas id="c_win" style="left:153px; top:258px; width:71px; height:52px;"></canvas>
        <canvas id="c_grid" style="left:22px; top:322px; width:317px; height:300px;"></canvas>
    </div>

    <script>
        // 1. 初始化 Telegram 对象 (放在最前面)
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#ffffff');

        let balance = 100.00, winTriggered = false, winTotal = 0;
        let sensorPoints = [];
        let hitCount = 0;
        let mainScratched = false;

        // 2. 倒计时流程
        async function runCD() {
            const el = document.getElementById('cd');
            const seq = ['2', '1', 'GO'];
            for(let s of seq) {
                await new Promise(r => setTimeout(r, 1000));
                el.innerText = s;
            }
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('stage').style.opacity = '1';
                initGame();
            }, 600);
        }

        // 3. 初始化游戏数据
        function initGame() {
            const g = document.getElementById('grid-area');
            let h = "";
            winTotal = 0; // 重置
            for(let i=0; i<30; i++) {
                const isWin = Math.random() > 0.85;
                const n = isWin ? "88" : Math.floor(Math.random()*89+10);
                const p = (Math.random()*50+10).toFixed(2);
                if(isWin) winTotal += parseFloat(p);
                h += `<div class="cell"><b>${n}</b><i>$${p}€</i></div>`;
            }
            g.innerHTML = h;

            // 传感器坐标
            sensorPoints = [];
            for(let i=0; i<5; i++) 
                for(let j=0; j<6; j++) sensorPoints.push({ x: 25 + j * 50, y: 30 + i * 55, hit: false });

            setupCanvas("c_win");
            setupCanvas("c_grid");
        }

        // 4. 画布逻辑
        function setupCanvas(id) {
            const cvs = document.getElementById(id);
            const ctx = cvs.getContext('2d');
            cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight;

            ctx.fillStyle = '#cbd5e1'; // 经典的刮刮乐灰色
            ctx.fillRect(0,0,cvs.width, cvs.height);
            
            // 装饰底纹
            ctx.fillStyle = "rgba(0,0,0,0.05)";
            ctx.font = "bold 14px Arial";
            for(let x=5; x<cvs.width; x+=30) 
                for(let y=15; y<cvs.height; y+=30) ctx.fillText("$", x, y);

            const scratch = (e) => {
                const r = cvs.getBoundingClientRect();
                const x = (e.clientX || (e.touches && e.touches[0].clientX)) - r.left;
                const y = (e.clientY || (e.touches && e.touches[0].clientY)) - r.top;

                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x, y, 25, 0, Math.PI*2); ctx.fill();

                if(id === "c_win") {
                    // 如果刮开了顶部中间区域，激活主开关
                    if(Math.abs(x - cvs.width/2) < 25) mainScratched = true;
                }

                if(id === "c_grid" && !winTriggered && mainScratched) {
                    sensorPoints.forEach(p => {
                        if(!p.hit) {
                            const d = Math.sqrt((x - p.x)**2 + (y - p.y)**2);
                            if(d < 25) { 
                                p.hit = true; hitCount++; 
                                if(hitCount >= 12) showPopup(); // 刮开约 40% 触发
                            }
                        }
                    });
                }
            };

            cvs.addEventListener('mousemove', (e) => { if(e.buttons === 1) scratch(e); });
            cvs.addEventListener('touchstart', (e) => { scratch(e); e.preventDefault(); }, {passive: false});
            cvs.addEventListener('touchmove', (e) => { scratch(e); e.preventDefault(); }, {passive: false});
        }

        // 5. 核心弹窗逻辑 (已修复冲突)
        function showPopup() {
            if(winTriggered) return;
            winTriggered = true;

            setTimeout(() => {
                const dialog = document.getElementById('top-dialog');
                const balanceEl = document.getElementById('db');
                
                // 更新余额显示
                balanceEl.innerText = `$${(balance + winTotal).toFixed(2)}`;
                
                if(winTotal > 0) {
                    document.getElementById('dt').innerText = "CONGRATS!";
                    document.getElementById('dm').innerText = `You've discovered $${winTotal.toFixed(2)}€ in prizes!`;
                    // Telegram 成功震动
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                } else {
                    document.getElementById('dt').innerText = "KEEP GOING";
                    document.getElementById('dm').innerText = "Better luck next time!";
                    // Telegram 警告震动
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
                }

                dialog.classList.add('active');
            }, 1000); // 缩短等待时间，反馈更快
        }

        // 启动
        window.onload = runCD;
    </script>
</body>
</html>
