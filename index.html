<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拾光·中国龙</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        body { background: #000; margin: 0; padding: 0; font-family: "Microsoft YaHei", 'Montserrat', sans-serif; overflow: hidden; -webkit-user-select: none; user-select: none; }
        
        /* --- 加载层 --- */
        #loader { position: fixed; inset: 0; background: #1a1a1a; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #d4af37; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(212,175,55,0.2); border-top: 3px solid #d4af37; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- 游戏主容器 --- */
        .card-container { position: relative; width: 360px; height: 720px; background: url('64005.jpg') no-repeat; background-size: 100% 100%; margin: 0 auto; visibility: hidden; }

        /* 中奖号码 (精准对齐) */
        #win-box { position: absolute; top: 266px; left: 169px; width: 40px; height: 35px; z-index: 1; display: flex; justify-content: center; align-items: center; font-size: 22px; color: #000; font-weight: 900; }

        /* 玩法网格 (5行6列) */
        #my-grid { position: absolute; top: 326px; left: 25px; width: 310px; z-index: 1; display: grid; grid-template-columns: repeat(6, 1fr); row-gap: 2px; column-gap: 9px; }
        .num-item { display: flex; flex-direction: column; justify-content: center; align-items: center; color: #000; font-weight: 900; height: 55px; line-height: 1.0; }
        .num-val { font-size: 16px; margin-bottom: 2px; }
        .prize-item { font-size: 8px; color: #8B0000; font-weight: 900; white-space: nowrap; }

        /* 刮奖涂层 */
        .scratch-layer { position: absolute; z-index: 10; touch-action: none; cursor: crosshair; }
        #canv-win { top: 260px; left: 160px; width: 55px; height: 45px; }
        #canv-mine { top: 322px; left: 21px; width: 318px; height: 299px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">正在开启拾光之旅... 3s</div>
    </div>

    <div class="card-container" id="main-card">
        <div id="win-box"></div>
        <div id="my-grid"></div>
        <canvas id="canv-win" class="scratch-layer"></canvas>
        <canvas id="canv-mine" class="scratch-layer"></canvas>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // --- 核心逻辑 ---
    function generateGameData() {
        const luckyNum = Math.floor(Math.random() * 89) + 10;
        const spots = [];
        const isOverallWin = Math.random() > 0.7; // 30% 中奖率
        
        for (let i = 0; i < 30; i++) {
            let isWin = isOverallWin && Math.random() < 0.15;
            let num = isWin ? luckyNum : Math.floor(Math.random() * 89) + 10;
            if (!isWin && num === luckyNum) num += 1;
            
            // 奖金池
            let prize = isWin ? [100, 500, 1000][Math.floor(Math.random()*3)] : [2, 5, 10, 20][Math.floor(Math.random()*4)];
            spots.push({ num, prize });
        }
        return { luckyNum, spots };
    }

    window.onload = function() {
        const data = generateGameData();
        document.getElementById('win-box').innerText = data.luckyNum;
        const grid = document.getElementById('my-grid');
        
        data.spots.forEach(s => {
            // 这里修改为 $ 符号包裹金额
            grid.innerHTML += `
                <div class="num-item">
                    <span class="num-val">${s.num}</span>
                    <div class="prize-item">$ ${s.prize} $</div>
                </div>`;
        });

        initScratch('canv-win', 55, 45);
        initScratch('canv-mine', 318, 299);

        // 倒计时
        let count = 3;
        const timer = setInterval(() => {
            count--;
            document.getElementById('loader-text').innerText = `正在开启拾光之旅... ${count}s`;
            if (count <= 0) {
                clearInterval(timer);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-card').style.visibility = 'visible';
            }
        }, 800);
    };

    // --- 物理铲刀引擎 ---
    function initScratch(id, w, h) {
        const c = document.getElementById(id);
        const ctx = c.getContext('2d');
        c.width = w; c.height = h;

        // 1. 绘制深灰色高质感涂层
        ctx.fillStyle = '#7a7a7a';
        ctx.fillRect(0, 0, w, h);
        
        // 2. 绘制暗花 (漂亮的星星和美金符)
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.font = 'bold 14px Montserrat';
        const icons = ['★', '$', '★', '$'];
        for(let x=5; x<w; x+=30) {
            for(let y=20; y<h; y+=30) {
                ctx.fillText(icons[Math.floor(Math.random()*4)], x, y);
            }
        }

        let active = false;

        const scratch = (e) => {
            if (!active) return;
            const r = c.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;

            // 硬铲刀效果：destination-out 瞬间擦除像素，边缘锐利
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 20, 0, Math.PI * 2); // 20半径铲刀
            ctx.fill();
        };

        c.addEventListener('mousedown', () => active = true);
        c.addEventListener('touchstart', (e) => { active = true; scratch(e); }, {passive: false});
        window.addEventListener('mouseup', () => active = false);
        window.addEventListener('touchend', () => active = false);
        c.addEventListener('mousemove', scratch);
        c.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, {passive: false});
    }
</script>
</body>
</html>
