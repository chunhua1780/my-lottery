<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCRATCH PRO - SHARP EDGE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        :root { --gold: #FFD700; --pure-black: #000000; --win-red: #d00000; }
        body { background: #000; margin: 0; font-family: 'Montserrat', sans-serif; overflow: hidden; color: white; user-select: none; }

        /* --- 核心游戏容器 --- */
        #app { opacity: 0; transition: opacity 0.8s; }
        .card { position: relative; width: 360px; height: 720px; background-size: 100% 100%; margin: 0 auto; }

        /* 中奖号码锚定: wt:273, wl:175, ws:22 */
        #win-num { 
            position: absolute; z-index: 1; top: 273px; left: 175px; width: 30px; height: 30px;
            display: flex; justify-content: center; align-items: center;
            font-size: 22px; color: var(--pure-black); font-weight: 900;
        }

        /* 玩法网格锚定: gt:343, gl:33, gw:295, gr:34, gc:23 */
        /* 确保 5 行 6 列完美压在圆圈中心 */
        #grid-box { 
            position: absolute; z-index: 1; top: 343px; left: 33px; width: 295px;
            display: grid; grid-template-columns: repeat(6, 1fr);
            row-gap: 34px; column-gap: 23px;
        }
        .cell { 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            width: 30px; height: 42px; /* 增加微小高度补偿，对齐视觉圆心 */
        }
        .n { font-size: 16px; color: var(--pure-black); font-weight: 900; line-height: 0.9; }
        .v { font-size: 8px; color: var(--win-red); font-weight: 800; margin-top: 2px; line-height: 1; }

        /* 涂层层级 */
        .sc-layer { position: absolute; z-index: 10; touch-action: none; cursor: crosshair; }
        #sc-win { top: 260px; left: 157px; width: 61px; height: 49px; }
        #sc-main { top: 322px; left: 21px; width: 318px; height: 299px; }

        /* 弹窗: bt:120 */
        #reward-pop {
            position: absolute; top: 120px; left: 50%; transform: translateX(-50%);
            width: 310px; height: 130px; background: rgba(0,0,0,0.98);
            border: 2px solid var(--gold); border-radius: 25px; z-index: 100;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }
        #reward-pop.show { display: flex; animation: pop-in 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.28); }
        @keyframes pop-in { from { transform: translateX(-50%) scale(0.8); opacity: 0; } to { transform: translateX(-50%) scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="app">
    <div class="card" id="main-bg">
        <div id="reward-pop">
            <div style="color:var(--gold); font-size:12px; font-weight:900;">YOU WON</div>
            <div id="total-val" style="font-size:42px; font-weight:900; margin:5px 0;">$ 500 $</div>
            <button onclick="location.reload()" style="background:var(--gold); border:none; padding:6px 18px; border-radius:20px; font-weight:900; font-size:11px;">PLAY AGAIN</button>
        </div>

        <div id="win-num">88</div>
        <div id="grid-box"></div>

        <canvas id="sc-win" class="sc-layer"></canvas>
        <canvas id="sc-main" class="sc-layer"></canvas>
    </div>
</div>

<script>
    let wClear = false, mClear = false;

    // 初始化网格数字
    function buildGrid() {
        const box = document.getElementById('grid-box');
        for(let i=0; i<30; i++) {
            box.innerHTML += `<div class="cell"><span class="n">88</span><span class="v">$ 500 $</span></div>`;
        }
        document.getElementById('app').style.opacity = '1';
    }

    window.onload = () => {
        const bg = new Image(); bg.src = '64005.jpg';
        bg.onload = () => {
            document.getElementById('main-bg').style.backgroundImage = `url(64005.jpg)`;
            buildGrid();
            initScraper('sc-win');
            initScraper('sc-main');
        };
    };

    // --- 核心：硬核铲除引擎 ---
    function initScraper(id) {
        const c = document.getElementById(id);
        const ctx = c.getContext('2d', { alpha: true });
        const w = c.width, h = c.height;

        // 1. 绘制高密度深色涂层
        ctx.fillStyle = '#666666'; // 颜色更深，更具质感
        ctx.fillRect(0, 0, w, h);
        
        // 2. 注入精细暗花 (不使用拉丝，使用点阵和符号)
        ctx.fillStyle = 'rgba(0,0,0,0.12)';
        ctx.font = 'bold 13px Arial';
        const icons = ['$', '★', '♣', '♦'];
        for(let x=8; x<w; x+=28) {
            for(let y=18; y<h; y+=28) {
                ctx.fillText(icons[Math.floor(Math.random()*4)], x, y);
            }
        }

        let active = false;

        const handleScrape = (e) => {
            if(!active) return;
            const r = c.getBoundingClientRect();
            const currX = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
            const currY = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;

            // --- 锐利边缘逻辑 ---
            // 使用 destination-out 实现百分之百完全擦除，不留任何半透明阴影
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            
            // 模拟铲刀宽度：使用较大的固定圆心或矩形，确保铲过的地方完全干净
            ctx.arc(currX, currY, 18, 0, Math.PI * 2);
            ctx.fill();

            checkStatus(c, id);
        };

        c.onmousedown = () => { active = true; };
        window.onmouseup = () => { active = false; };
        c.onmousemove = handleScrape;
        c.ontouchstart = (e) => { e.preventDefault(); active = true; };
        c.ontouchmove = (e) => { e.preventDefault(); handleScrape(e); };
    }

    function checkStatus(c, id) {
        const d = c.getContext('2d').getImageData(0,0,c.width,c.height).data;
        let emptyCount = 0;
        for(let i=3; i<d.length; i+=4) if(d[i] === 0) emptyCount++;
        
        const ratio = emptyCount / (d.length / 4);
        if(ratio > 0.92) {
            if(id === 'sc-win') wClear = true;
            else mClear = true;
            
            if(wClear && mClear) {
                setTimeout(() => {
                    document.getElementById('reward-pop').classList.add('show');
                }, 400);
            }
        }
    }
</script>
</body>
</html>
