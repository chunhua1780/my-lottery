<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刮刮乐Pro</title>

<style>
body{
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

/* 卡片 */
.card{
    position:relative;
    width:360px;
    height:720px;
    background:url('64005.jpg') no-repeat;
    background-size:cover;
}

/* 数据层 */
.layer{
    position:absolute;
    left:20px;
    top:120px;
    width:320px;
}

/* 中奖号 */
#win{
    position:absolute;
    top:150px;
    left:155px;
    font-size:22px;
    font-weight:900;
}

/* 网格 */
.grid{
    position:absolute;
    top:230px;
    left:15px;
    width:310px;
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:6px;
}
.cell{
    height:48px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}
.num{font-size:15px;font-weight:900;}
.money{font-size:11px;color:#700000;}

/* canvas */
canvas{
    position:absolute;
    z-index:10;
}
#c1{ top:140px; left:150px; width:70px; height:50px;} /* 玩法区 */
#c2{ top:220px; left:15px; width:310px; height:310px;} /* 刮奖区 */

/* 余额 */
#balance{
    position:absolute;
    top:20px;
    left:20px;
    color:#fff;
    font-size:16px;
}

/* 结果弹窗 */
#popup{
    position:fixed;
    top:0;left:0;width:100%;height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.6);
}
.box{
    background:linear-gradient(45deg,#ff9a9e,#fad0c4);
    padding:30px;
    border-radius:20px;
    text-align:center;
    animation:pop 0.5s;
}
@keyframes pop{
    from{transform:scale(0.5);opacity:0;}
    to{transform:scale(1);opacity:1;}
}
button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#fff;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<div id="balance">余额：¥100</div>

<div class="layer">
    <div id="win"></div>
    <div class="grid" id="grid"></div>
</div>

<canvas id="c1"></canvas>
<canvas id="c2"></canvas>

</div>

<!-- 结果 -->
<div id="popup">
    <div class="box">
        <h2 id="resultText"></h2>
        <button onclick="location.reload()">再来一张</button>
    </div>
</div>

<!-- 声音 -->
<audio id="scratchSound" src="https://actions.google.com/sounds/v1/scrapes/scratch.ogg"></audio>

<script>

/* ===== 数据模型（真实一点） ===== */
function getData(){
    let lucky = Math.floor(Math.random()*90)+10;

    let total=0;
    let r=Math.random();

    if(r<0.5) total=0;
    else if(r<0.8) total=5;
    else if(r<0.95) total=20;
    else total=100;

    let spots=[];
    let hits=0;

    for(let i=0;i<30;i++){
        let num=Math.floor(Math.random()*90)+10;
        let prize=0;

        if(Math.random()<0.15 && hits<2 && total>0){
            num=lucky;
            prize=Math.floor(total/2);
            hits++;
        }

        spots.push({num,prize});
    }

    return {lucky,spots,total};
}

let balance=100;

/* ===== 初始化 ===== */
const data=getData();
document.getElementById('win').innerText=data.lucky;

const grid=document.getElementById('grid');
data.spots.forEach(s=>{
    grid.innerHTML+=`
    <div class="cell">
        <div class="num">${s.num}</div>
        <div class="money">${s.prize?('¥'+s.prize):''}</div>
    </div>`;
});

/* ===== 刮层 ===== */
function setup(id){
    const c=document.getElementById(id);
    const ctx=c.getContext('2d');

    c.width=c.offsetWidth;
    c.height=c.offsetHeight;

    ctx.fillStyle='#bbb';
    ctx.fillRect(0,0,c.width,c.height);

    for(let i=0;i<800;i++){
        ctx.fillStyle=Math.random()>0.5?'#eee':'#888';
        ctx.fillRect(Math.random()*c.width,Math.random()*c.height,1,1);
    }

    let down=false;
    let done=false;
    const sound=document.getElementById('scratchSound');

    function draw(e){
        if(!down)return;

        sound.currentTime=0;
        sound.play();

        const r=c.getBoundingClientRect();
        const x=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
        const y=(e.touches?e.touches[0].clientY:e.clientY)-r.top;

        ctx.globalCompositeOperation='destination-out';
        ctx.beginPath();
        ctx.arc(x,y,18,0,Math.PI*2);
        ctx.fill();

        if(!done){
            let img=ctx.getImageData(0,0,c.width,c.height);
            let clear=0;
            for(let i=3;i<img.data.length;i+=4){
                if(img.data[i]==0) clear++;
            }
            if(clear>img.data.length/8){
                done=true;
                showResult();
            }
        }
    }

    c.onmousedown=()=>down=true;
    window.onmouseup=()=>down=false;
    c.onmousemove=draw;

    c.ontouchstart=e=>{down=true;draw(e);}
    c.ontouchmove=e=>{e.preventDefault();draw(e);}
    c.ontouchend=()=>down=false;
}

setup('c1');
setup('c2');

/* ===== 结果 ===== */
function showResult(){
    let r=data.total;

    let text='';
    if(r===0){
        text='差一点点，再来一张 🍀';
    }else if(r<=5){
        text=`不错！赢 ¥${r}`;
    }else if(r<=20){
        text=`手气不错！¥${r}`;
    }else{
        text=`🎉 大奖 ¥${r}`;
    }

    balance+=r;
    document.getElementById('balance').innerText='余额：¥'+balance;

    document.getElementById('resultText').innerText=text;
    document.getElementById('popup').style.display='flex';
}

</script>

</body>
</html>
