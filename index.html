<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=360, user-scalable=no">
    <title>SCRATCH GOLD - V4.0 FINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;900&family=Oswald:wght@700&family=Dancing+Script:wght@700&display=swap');

        :root { 
            --gold: #fcc201; 
            --glass: rgba(15, 15, 20, 0.9);
            --border: rgba(252, 194, 1, 0.4);
        }

        body { margin: 0; background: #000; color: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; touch-action: none; }

        /* --- 1. 流行风倒计时 (Modern Minimalist) --- */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 99999;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cd-circle {
            position: relative; width: 160px; height: 160px;
            display: flex; justify-content: center; align-items: center;
            border: 2px solid rgba(255,255,255,0.1); border-radius: 50%;
        }
        .cd-num {
            font-size: 80px; font-weight: 900; color: var(--gold);
            text-shadow: 0 0 30px rgba(252, 194, 1, 0.5);
            animation: pulse 0.8s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.5; }
        }

        /* --- 2. 流行风悬浮对话框 (iOS Dynamic Style) --- */
        #top-dialog {
            position: fixed; top: -150px; left: 50%; transform: translateX(-50%);
            width: 310px; height: 100px;
            background: var(--glass); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-radius: 24px;
            z-index: 10000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            transition: top 0.8s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            pointer-events: none;
        }
        #top-dialog.show { top: 25px; pointer-events: auto; }
        
        .dialog-title { font-size: 18px; font-weight: 900; letter-spacing: 2px; color: var(--gold); margin: 0; }
        .dialog-msg { font-family: 'Dancing Script'; font-size: 15px; color: #eee; margin: 4px 0; }
        .balance-pill { 
            background: rgba(0, 255, 135, 0.1); padding: 3px 12px; border-radius: 12px;
            border: 1px solid rgba(0, 255, 135, 0.3); font-family: 'Oswald';
            color: #00ff87; font-size: 13px; margin-top: 5px;
        }

        /* --- 3. 游戏舞台 --- */
        #game-stage {
            position: relative; width: 360px; height: 720px; margin: 0 auto;
            background: #111 url('64005.jpg') center/100% 100% no-repeat;
            opacity: 0; transition: opacity 1.2s;
        }

        #win-val { position: absolute; left: 151px; top: 263px; width: 72px; height: 66px; display: flex; align-items: center; justify-content: center; color: #09140d; font-size: 26px; font-weight: 900; }
        #grid-area { position: absolute; left: 27px; top: 335px; width: 310px; height: 284px; display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(5, 1fr); gap: 10px; padding: 5px; box-sizing: border-box; }
        .cell-v { font-size: 18px; font-weight: 900; color: #09140d; text-align: center; }
        .cell-p { font-family: 'Oswald'; font-size: 10px; color: #d00; text-align: center; }

        canvas { position: absolute; z-index: 100; touch-action: none; cursor: crosshair; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="cd-circle">
            <div id="num" class="cd-num">3</div>
        </div>
    </div>

    <div id="top-dialog">
        <div class="dialog-title" id="d-title">LUCKY REVEAL</div>
        <div class="dialog-msg" id="d-msg">Fortune is in your hands...</div>
        <div class="balance-pill">WALLET: <span id="d-bal">$100.00</span></div>
    </div>

    <div id="game-stage">
        <div id="win-val">88</div>
        <div id="grid-area"></div>

        <canvas id="c_win" style="left:153px; top:258px; width:71px; height:52px;"></canvas>
        <canvas id="c_grid" style="left:22px; top:322px; width:317px; height:300px;"></canvas>
    </div>

    <script>
        let balance = 100.00;
        let isActive = false;
        let isEnded = false;
        let jackpot = 0;
        let scratchPath = 0; // 划动位移追踪

        // 1. 倒计时迭代
        async function runCountdown() {
            const num = document.getElementById('num');
            const seq = ['2', '1', 'GO'];
            for (let s of seq) {
                await new Promise(r => setTimeout(r, 900));
                num.innerText = s;
            }
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('game-stage').style.opacity = '1';
                initGame();
            }, 600);
        }

        // 2. 初始化
        function initGame() {
            const grid = document.getElementById('grid-area');
            let content = "";
            for(let i=0; i<30; i++) {
                const n = Math.random() > 0.88 ? "88" : Math.floor(Math.random()*89+10);
                const p = (Math.random()*40 + 10).toFixed(2);
                if(n === "88") jackpot += parseFloat(p);
                content += `<div><div class="cell-v">${n}</div><div class="cell-p">$${p}</div></div>`;
            }
            grid.innerHTML = content;

            createCanvas("c_win");
            createCanvas("c_grid");
            
            // 关键修复：开启后台定时检查循环
            isActive = true;
            setInterval(autoCheck, 1000); 
        }

        function createCanvas(id) {
            const cvs = document.getElementById(id);
            const ctx = cvs.getContext('2d', { willReadFrequently: true });
            cvs.width = cvs.offsetWidth;
            cvs.height = cvs.offsetHeight;

            // 涂层美化
            ctx.fillStyle = '#b0b0b0';
            ctx.fillRect(0,0,cvs.width, cvs.height);
            ctx.fillStyle = "rgba(0,0,0,0.15)";
            ctx.font = "bold 15px Arial";
            for(let x=5; x<cvs.width; x+=25) 
                for(let y=18; y<cvs.height; y+=25) ctx.fillText((x+y)%2===0 ? "$":"€", x, y);

            let painting = false;

            const doScratch = (e) => {
                if(!isActive || isEnded) return;
                const rect = cvs.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;

                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, 35, 0, Math.PI*2);
                ctx.fill();
                
                // 增加位移计数（第二判定轨迹）
                if(id === "c_grid") scratchPath++; 
                if(scratchPath > 250) autoCheck(); // 位移足够多时强制检查
            };

            cvs.addEventListener('mousedown', () => painting = true);
            window.addEventListener('mouseup', () => { painting = false; autoCheck(); });
            cvs.addEventListener('mousemove', (e) => { if(painting) doScratch(e); });
            cvs.addEventListener('touchstart', (e) => { painting = true; doScratch(e); e.preventDefault(); });
            cvs.addEventListener('touchmove', (e) => { doScratch(e); e.preventDefault(); });
            cvs.addEventListener('touchend', () => { painting = false; autoCheck(); });
        }

        // 3. 核心修复：多维判定引擎
        function autoCheck() {
            if(!isActive || isEnded) return;

            const cvs = document.getElementById('c_grid');
            const ctx = cvs.getContext('2d', { willReadFrequently: true });
            const pix = ctx.getImageData(0, 0, cvs.width, cvs.height).data;
            
            let transparent = 0;
            for (let i = 3; i < pix.length; i += 64) {
                if (pix[i] === 0) transparent++;
            }
            
            const ratio = transparent / (pix.length / 64);
            
            // 只要达到 70% 或者是划动次数极多（兜底逻辑）
            if (ratio > 0.70 || scratchPath > 600) {
                triggerPopup();
            }
        }

        function triggerPopup() {
            if(isEnded) return;
            isEnded = true;

            // 渐隐所有涂层
            document.querySelectorAll('canvas').forEach(c => {
                c.style.transition = 'opacity 1s';
                c.style.opacity = '0';
                setTimeout(() => c.style.display = 'none', 1000);
            });

            const dialog = document.getElementById('top-dialog');
            const title = document.getElementById('d-title');
            const msg = document.getElementById('d-msg');
            const bal = document.getElementById('d-bal');

            if(jackpot > 0) {
                title.innerText = "BIG WINNER!";
                title.style.color = "var(--gold)";
                msg.innerText = `You have discovered $${jackpot.toFixed(2)}`;
                balance += jackpot;
            } else {
                title.innerText = "ALMOST THERE";
                title.style.color = "#aaa";
                msg.innerText = "The next one is your lucky star!";
            }

            bal.innerText = `$${balance.toFixed(2)}`;
            
            // 强制渲染弹窗
            requestAnimationFrame(() => {
                dialog.classList.add('show');
            });

            // 震动
            if(navigator.vibrate) navigator.vibrate(150);
        }

        window.onload = runCountdown;
    </script>
</body>
</html>
