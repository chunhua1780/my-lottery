<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=360, user-scalable=no, viewport-fit=cover">
    <title>拾光 - 时尚刮刮乐</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Space+Mono:wght@700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            margin: 0; 
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 100%);
            font-family: 'Outfit', sans-serif; 
            overflow: hidden; 
            touch-action: none;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 主游戏容器 - 精致边框 */
        #game-wrapper {
            width: 360px;
            max-width: 100vw;
            background: transparent;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 0 2px #ffd700, 0 0 20px rgba(255,215,0,0.3);
            overflow: hidden;
            position: relative;
        }
        
        /* 顶部金色装饰条 */
        #game-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ffd700, #ffed4e, #ffd700);
            z-index: 10;
        }
        
        #loader { 
            position: fixed; 
            inset: 0; 
            z-index: 1000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #0a0a1a; 
        }
        
        .cd-ring { 
            position: absolute; 
            width: 150px; 
            height: 150px; 
            transform: rotate(-90deg); 
        }
        
        .cd-ring circle { 
            fill: none; 
            stroke-width: 6; 
            stroke: #ffd700; 
            stroke-dasharray: 440; 
            animation: ringTick 1s linear infinite; 
        }
        
        @keyframes ringTick { 
            from { stroke-dashoffset: 0; } 
            to { stroke-dashoffset: 440; } 
        }
        
        .cd-num { 
            font-size: 70px; 
            font-weight: 900; 
            color: #ffd700;
            text-shadow: 0 0 20px #ffd700;
        }
        
        #top-dialog {
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%) scale(0.9);
            width: 300px; 
            padding: 30px 20px; 
            background: linear-gradient(135deg, #0a0a1a, #1a1a3e);
            border-radius: 30px; 
            z-index: 2000;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7), 0 0 0 3px #ffd700;
            opacity: 0; 
            visibility: hidden;
            transition: all 0.3s ease;
            border: 2px solid #ffd700;
        }
        
        #top-dialog.active { 
            opacity: 1; 
            visibility: visible; 
            transform: translate(-50%, -50%) scale(1); 
        }
        
        #top-dialog button {
            margin-top: 12px;
            padding: 12px 30px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #ffd700, #ffb300);
            color: #0a0a1a;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(255,215,0,0.3);
            width: 200px;
        }
        
        #top-dialog button:hover {
            transform: scale(1.02);
        }
        
        #top-dialog button:last-child {
            background: transparent;
            border: 2px solid #ffd700;
            color: #ffd700;
            box-shadow: none;
            margin-top: 8px;
        }
        
        #stage { 
            position: relative; 
            width: 360px; 
            height: 720px; 
            margin: 0 auto; 
            background: #fff url('64005.png') center/100% 100% no-repeat; 
            opacity: 0; 
            transition: opacity 1s; 
        }
        
        #win-area { 
            position: absolute; 
            left: 151px; 
            top: 263px; 
            width: 72px; 
            height: 66px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 28px; 
            font-weight: 900; 
        }
        
        #grid-area { 
            position: absolute; 
            left: 27px; 
            top: 335px; 
            width: 310px; 
            height: 284px; 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 10px; 
            padding: 5px; 
            box-sizing: border-box; 
        }
        
        .cell b { 
            font-size: 20px; 
            display: block; 
            font-weight: 900; 
            text-align: center; 
        }
        
        .cell i { 
            font-family: 'Space Mono'; 
            font-size: 10px; 
            font-weight: 700; 
            display: block; 
            text-align: center; 
        }
        
        canvas { 
            position: absolute; 
            z-index: 500; 
            cursor: crosshair; 
        }
        
        /* 关闭按钮 - 精致设计 */
        .close-btn {
            position: fixed;
            top: 12px;
            right: 12px;
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffd700;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            z-index: 3000;
            backdrop-filter: blur(10px);
            border: 1.5px solid #ffd700;
            transition: all 0.2s;
        }
        
        .close-btn:hover { 
            background: rgba(255,215,0,0.3);
            color: white;
            transform: scale(1.05);
        }
        
        /* 提示消息 - 精致 */
        #toast-message {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ffd700, #ffb300);
            color: #0a0a1a;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            z-index: 4000;
            opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid #ffed4e;
        }
        
        #toast-message.show { 
            opacity: 1; 
        }
        
        /* 适配移动端 */
        @media (max-width: 400px) {
            #game-wrapper {
                width: 100%;
                border-radius: 0;
            }
            body {
                background: #0a0a1a;
            }
        }
        
        /* 适配电脑端 */
        @media (min-width: 800px) {
            #game-wrapper {
                box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 0 3px #ffd700, 0 0 30px rgba(255,215,0,0.5);
            }
        }
    </style>
</head>

<body>

<div id="loader">
    <svg class="cd-ring"><circle cx="75" cy="75" r="70"></circle></svg>
    <div id="cd" class="cd-num">3</div>
</div>

<div id="game-wrapper">
    <div id="stage">
        <div id="win-area">88</div>
        <div id="grid-area"></div>
        <canvas id="c_win" style="left:153px; top:258px; width:71px; height:52px;"></canvas>
        <canvas id="c_grid" style="left:22px; top:322px; width:317px; height:300px;"></canvas>
    </div>
</div>

<div class="close-btn" onclick="closeWebApp()">✕</div>
<div id="toast-message">✅ 数据已保存</div>

<div id="top-dialog">
    <div style="font-size: 28px; font-weight: 900; color: #ffd700; text-shadow: 0 0 15px #ffd700;">🎊 CONGRATS</div>
    <div id="dm" style="margin: 10px 0; color: #ffffff;">Finding Magic...</div>
    <div style="padding: 10px 40px; background: #ffd700; color: #0a0a1a; border-radius: 50px; font-family: 'Space Mono'; font-size: 24px; font-weight: 900;" id="db">$0.00</div>
    <button onclick="location.reload()">🔄 再玩一次</button>
    <button onclick="closeWebApp()">🏠 返回机器人</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
// 移除 enableClosingConfirmation 避免干扰按钮

let winTriggered = false, winTotal = 0, mainScratched = false;
let gameDataSent = false;
let ticketNumbers = [];
let ticketPrices = [];
let mainNumber = '88';
let backgroundImage = '64005.png';

function showToast(text, duration = 2000) {
    const toast = document.getElementById('toast-message');
    toast.textContent = text;
    toast.classList.add('show');
    setTimeout(() => {
        toast.classList.remove('show');
    }, duration);
}

function closeWebApp() {
    if (tg && tg.close) {
        tg.close();
    }
}

function reportGame(data) {
    console.log("📊 Game Event:", data.type, data);
    
    if (window.Telegram && window.Telegram.WebApp) {
        try {
            window.Telegram.WebApp.sendData(JSON.stringify(data));
            console.log("✅ 数据已发送到 Bot");
            showToast('✅ 数据已保存到后台');
            return true;
        } catch (error) {
            console.error("❌ 发送数据失败:", error);
            showToast('❌ 数据发送失败', 3000);
            return false;
        }
    }
    return false;
}

async function start() {
    reportGame({ type: "game_start" });

    const el = document.getElementById('cd');
    for(let s of ['2', '1', 'GO']) {
        await new Promise(r => setTimeout(r, 1000));
        el.innerText = s;
    }

    document.getElementById('loader').style.display = 'none';
    document.getElementById('stage').style.opacity = '1';
    init();
}

function init() {
    const g = document.getElementById('grid-area');
    let h = "";
    ticketNumbers = [];
    ticketPrices = [];
    winTotal = 0;
    winTriggered = false;
    gameDataSent = false;
    mainScratched = false;
    
    mainNumber = Math.floor(Math.random() * 90 + 10).toString();
    document.getElementById('win-area').innerText = mainNumber;
    
    for(let i = 0; i < 30; i++) {
        const isWin = Math.random() > 0.85;
        const num = isWin ? mainNumber : Math.floor(Math.random() * 89 + 10).toString();
        const price = (Math.random() * 50 + 10).toFixed(2);
        
        ticketNumbers.push(num);
        ticketPrices.push(price);
        
        if(isWin) winTotal += parseFloat(price);
        h += `<div class="cell"><b>${num}</b><i>$${price}</i></div>`;
    }
    g.innerHTML = h;
    renderCanvas("c_win");
    renderCanvas("c_grid");
}

function renderCanvas(id) {
    const cvs = document.getElementById(id);
    const ctx = cvs.getContext('2d');
    cvs.width = cvs.offsetWidth;
    cvs.height = cvs.offsetHeight;
    ctx.fillStyle = '#cfd8dc';
    ctx.fillRect(0, 0, cvs.width, cvs.height);

    const stepX = 42; const stepY = 38;
    ctx.font = `bold 14px Arial`;
    ctx.fillStyle = "rgba(0,0,0,0.12)";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";

    for (let y = 0; y < cvs.height + stepY; y += stepY) {
        for (let x = 0; x < cvs.width + stepX; x += stepX) {
            ctx.save();
            let offsetX = (Math.floor(y / stepY) % 2 === 0) ? 0 : stepX / 2;
            ctx.translate(x + offsetX, y);
            const symbol = ((Math.floor(y / stepY)) % 2 === 0) ? '$' : '€';
            ctx.rotate(-0.25);
            ctx.fillText(symbol, 0, 0);
            ctx.restore();
        }
    }

    const scratch = (x, y) => {
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, 22, 0, Math.PI * 2);
        ctx.fill();
        if(id === "c_win") mainScratched = true;
        if(id === "c_grid" && mainScratched && !winTriggered) {
            triggerWin();
        }
    };

    const getPos = (e) => {
        const r = cvs.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        return { x: clientX - r.left, y: clientY - r.top };
    };

    cvs.addEventListener('touchstart', e => { e.preventDefault(); const p = getPos(e); scratch(p.x,p.y); });
    cvs.addEventListener('touchmove', e => { e.preventDefault(); const p = getPos(e); scratch(p.x,p.y); });
    cvs.addEventListener('mousemove', e => { if(e.buttons===1){ const p = getPos(e); scratch(p.x,p.y);} });
}

function triggerWin() {
    if(winTriggered) return;
    winTriggered = true;
    
    setTimeout(() => {
        const dialog = document.getElementById('top-dialog');
        const totalPrize = 100 + winTotal;
        document.getElementById('db').innerText = `$${totalPrize.toFixed(2)}`;
        document.getElementById('dm').innerText = winTotal > 0 ? `Amazing! You won $${winTotal.toFixed(2)}` : "Better luck next time!";
        dialog.classList.add('active');
        
        if (!gameDataSent) {
            gameDataSent = true;
            
            const ticketNumber = `${mainNumber}-${ticketNumbers.join('')}`;
            const winCount = ticketNumbers.filter(n => n === mainNumber).length;
            
            reportGame({ 
                type: "game_end", 
                win_total: winTotal,
                prize_amount: totalPrize,
                result: winTotal > 0 ? "win" : "lose",
                ticket_number: ticketNumber,
                main_number: mainNumber,
                numbers: ticketNumbers,
                prices: ticketPrices,
                win_count: winCount,
                background: backgroundImage
            });
        }
        
        if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    }, 2500);
}

window.addEventListener('load', () => {
    tg.ready();
    start();
});
</script>
</body>
</html>
