<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=360, user-scalable=no, viewport-fit=cover">
    <title>拾光 - 时尚刮刮乐</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Space+Mono:wght@700&display=swap');
        body { margin: 0; background: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; touch-action: none; }
        #loader { position: fixed; inset: 0; z-index: 1000; display: flex; justify-content: center; align-items: center; background: #fff; }
        .cd-ring { position: absolute; width: 150px; height: 150px; transform: rotate(-90deg); }
        .cd-ring circle { fill: none; stroke-width: 6; stroke: #6366f1; stroke-dasharray: 440; animation: ringTick 1s linear infinite; }
        @keyframes ringTick { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 440; } }
        .cd-num { font-size: 70px; font-weight: 900; }
        
        /* 弹窗样式 */
        #top-dialog { position: fixed; top: 40px; left: 50%; transform: translateX(-50%) scale(0.85); width: 310px; padding: 30px 0; background: rgba(255,255,255,0.98); backdrop-filter: blur(25px); border-radius: 40px; z-index: 2000; display: flex; flex-direction: column; align-items: center; box-shadow: 0 40px 100px rgba(0,0,0,0.25); opacity: 0; visibility: hidden; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid rgba(255,255,255,0.5); }
        #top-dialog.active { opacity: 1; visibility: visible; transform: translateX(-50%) scale(1); }
        
        #stage { position: relative; width: 360px; height: 720px; margin: 0 auto; background: #fff url('64005.png') center/100% 100% no-repeat; opacity: 0; transition: opacity 1s; }
        #win-area { position: absolute; left: 151px; top: 263px; width: 72px; height: 66px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 900; color: #1e293b; }
        #grid-area { position: absolute; left: 27px; top: 335px; width: 310px; height: 284px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; padding: 5px; box-sizing: border-box; }
        .cell b { font-size: 20px; display: block; font-weight: 900; text-align: center; color: #000; }
        .cell i { font-family: 'Space Mono'; font-size: 10px; font-weight: 700; display: block; text-align: center; color: #000; }
        
        /* 坐标已按要求微调：上提2px，左移1px */
        #c_win { position: absolute; z-index: 500; left: 152px; top: 256px; width: 71px; height: 52px; cursor: crosshair; }
        #c_grid { position: absolute; z-index: 500; left: 22px; top: 322px; width: 317px; height: 300px; cursor: crosshair; }
        
        .btn-group { display: flex; gap: 12px; margin-top: 25px; }
        .btn-replay { background: #6366f1; color: #fff; padding: 12px 28px; border-radius: 30px; border: none; cursor: pointer; font-family: 'Outfit'; font-weight: 600; font-size: 14px; }
        .btn-exit { background: #f1f5f9; color: #64748b; padding: 12px 28px; border-radius: 30px; border: none; cursor: pointer; font-family: 'Outfit'; font-size: 14px; }
    </style>
</head>
<body>
    <div id="loader">
        <svg class="cd-ring"><circle cx="75" cy="75" r="70"></circle></svg>
        <div id="cd" class="cd-num">3</div>
    </div>
    
    <div id="top-dialog">
        <div id="res-title" style="font-size: 26px; font-weight: 900;">结算中心</div>
        <div id="res-num" style="margin-top: 5px; font-size: 14px; color: #94a3b8; font-family: 'Space Mono';">开奖号码: --</div>
        <div id="res-msg" style="margin: 15px 0; color: #475569; text-align: center; padding: 0 25px; font-size: 14px; line-height: 1.4;"></div>
        <div id="res-amt" style="padding: 12px 45px; background: #000; color: #fff; border-radius: 50px; font-family: 'Space Mono'; font-size: 26px; font-weight: 900;">$0.00</div>
        
        <div class="btn-group">
            <button class="btn-replay" onclick="location.reload()">再玩一次</button>
            <button class="btn-exit" onclick="tg.close()">离开</button>
        </div>
    </div>

    <div id="stage">
        <div id="win-area">--</div>
        <div id="grid-area"></div>
        <canvas id="c_win"></canvas>
        <canvas id="c_grid"></canvas>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let winTriggered = false, winTotal = 0, mainScratched = false;
        let winNum = Math.floor(Math.random() * 89 + 10); 
        let combinations = []; 

        // 点位碰撞检测变量
        let checkPoints = [];
        let hitCount = 0;

        async function start() {
            const el = document.getElementById('cd');
            for(let s of ['2', '1', 'GO']) {
                await new Promise(r => setTimeout(r, 1000));
                el.innerText = s;
            }
            document.getElementById('loader').style.display = 'none';
            document.getElementById('stage').style.opacity = '1';
            init();
        }

        function init() {
            document.getElementById('win-area').innerText = winNum;
            const g = document.getElementById('grid-area');
            let h = "";
            combinations = []; 
            winTotal = 0;
            for(let i=0; i<30; i++) {
                const isWin = Math.random() < 0.20; 
                const n = isWin ? winNum : generateLosingNum();
                const p = (Math.random() * 80 + 20).toFixed(2);
                if(isWin) winTotal += parseFloat(p);
                combinations.push(n); 
                h += `<div class="cell"><b>${n}</b><i>$${p}</i></div>`;
            }
            g.innerHTML = h;
            renderCanvas("c_win");
            renderCanvas("c_grid");
        }

        function generateLosingNum() {
            let n;
            do { n = Math.floor(Math.random() * 89 + 10); } while (n === winNum);
            return n;
        }

        function renderCanvas(id) {
            const cvs = document.getElementById(id);
            const ctx = cvs.getContext('2d');
            cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight;
            ctx.fillStyle = '#cfd8dc';
            ctx.fillRect(0, 0, cvs.width, cvs.height);
            
            // 如果是主网格，预设 9 个探测点
            if(id === "c_grid") {
                checkPoints = [
                    {x: cvs.width*0.2, y: cvs.height*0.2, hit: false},
                    {x: cvs.width*0.5, y: cvs.height*0.2, hit: false},
                    {x: cvs.width*0.8, y: cvs.height*0.2, hit: false},
                    {x: cvs.width*0.2, y: cvs.height*0.5, hit: false},
                    {x: cvs.width*0.5, y: cvs.height*0.5, hit: false},
                    {x: cvs.width*0.8, y: cvs.height*0.5, hit: false},
                    {x: cvs.width*0.2, y: cvs.height*0.8, hit: false},
                    {x: cvs.width*0.5, y: cvs.height*0.8, hit: false},
                    {x: cvs.width*0.8, y: cvs.height*0.8, hit: false}
                ];
            }

            const scratch = (x, y) => {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x, y, 25, 0, Math.PI * 2, false); ctx.fill();

                if(id === "c_win") mainScratched = true;

                if(id === "c_grid") {
                    // 检测是否划过了探测点
                    checkPoints.forEach(p => {
                        if(!p.hit) {
                            const dist = Math.sqrt((x - p.x)**2 + (y - p.y)**2);
                            if(dist < 25) { p.hit = true; hitCount++; }
                        }
                    });

                    // 核心逻辑：触碰了 7 个点（约75%面积）且 刮了上方号码
                    if(hitCount >= 7 && mainScratched && !winTriggered) {
                        doSilentAuditAndShowResult();
                    }
                }
            };

            const getPos = (e) => {
                const r = cvs.getBoundingClientRect();
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                return { x: clientX - r.left, y: clientY - r.top };
            };

            cvs.addEventListener('touchstart', (e) => { e.preventDefault(); const p = getPos(e); scratch(p.x, p.y); });
            cvs.addEventListener('touchmove', (e) => { e.preventDefault(); const p = getPos(e); scratch(p.x, p.y); });
            cvs.addEventListener('mousemove', (e) => { if(e.buttons===1){ const p = getPos(e); scratch(p.x, p.y); } });
        }

        function doSilentAuditAndShowResult() {
            if(winTriggered) return;
            winTriggered = true;

            const auditData = {
                uid: tg.initDataUnsafe?.user?.id || "Admin",
                win: parseFloat(winTotal.toFixed(2)),
                combination: combinations.join('-'),
                win_number: winNum
            };

            // 静默发送数据
            fetch('http://127.0.0.1:5000/audit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(auditData)
            }).catch(e => console.log('Audit Stored Locally'));

            // 弹出窗口
            setTimeout(() => {
                const dialog = document.getElementById('top-dialog');
                document.getElementById('res-num').innerText = `中奖号码: ${winNum}`;
                document.getElementById('res-amt').innerText = `$${winTotal.toFixed(2)}`;
                
                const title = document.getElementById('res-title');
                const msg = document.getElementById('res-msg');

                if(winTotal > 0) {
                    title.innerText = "🎊 恭喜中奖";
                    title.style.color = "#4f46e5";
                    msg.innerText = "手气非常不错！每一格都是惊喜，快分享这份好运吧。";
                } else {
                    title.innerText = "✨ 差一点点";
                    title.style.color = "#475569";
                    msg.innerText = "好运正在充能中，下一张大奖可能就在不远处，再来一张？";
                }

                dialog.classList.add('active');
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            }, 800); 
        }
        window.onload = start;
    </script>
</body>
</html>
