<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国龙-至尊兑奖版</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; margin: 0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; overflow: hidden; font-family: "Arial Rounded MT Bold", "Helvetica", sans-serif; }
        .card-container { position: relative; width: 360px; height: 720px; background: url('64005.jpg') no-repeat; background-size: cover; border-radius: 10px; flex-shrink: 0; }
        
        /* 玩法区 - 使用你提供的参数 Top: 242, Left: 126 */
        .win-box { position: absolute; top: 242px; left: 126px; width: 100px; height: 60px; display: flex; justify-content: center; align-items: center; z-index: 1; }
        
        /* 数字区 - 使用你提供的参数 Top: 328, Left: 21, Gap: 5 */
        .my-grid { position: absolute; top: 328px; left: 21px; width: 312px; height: 280px; display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(5, 1fr); row-gap: 5px; z-index: 1; }

        /* 字体大小使用你提供的 Size: 14 */
        .num-item { display: flex; flex-direction: column; justify-content: center; align-items: center; color: #000; font-weight: 900; font-size: 14px; text-shadow: 1px 1px 0 #fff; line-height: 1.1; }
        .prize-item { font-size: 10px; color: #8B0000; font-weight: 900; }

        /* 刮奖图层 - 自动适配高度 */
        #scratch-canvas { position: absolute; top: 235px; left: 18px; width: 324px; height: 410px; z-index: 10; touch-action: none; cursor: crosshair; }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="win-box" id="win-num"></div>
        <div class="my-grid" id="my-nums"></div>
        <canvas id="scratch-canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. 生成随机中奖号码 (10-99)
        const luckyNum = Math.floor(Math.random() * 89) + 10;
        document.getElementById('win-num').innerHTML = `<div class="num-item" style="font-size:24px">${luckyNum}</div>`;

        // 2. 生成30个不重复的随机格子
        const myBox = document.getElementById('my-nums');
        const prizePool = [0, 5, 10, 20, 50, 100, 500, 1000, 5000, 10000, 1000000];
        
        // 创建一个数字池并打乱，确保不重复
        let numberPool = Array.from({length: 90}, (_, i) => i + 10);
        numberPool.sort(() => Math.random() - 0.5);

        for (let i = 0; i < 30; i++) {
            // 20% 概率中奖 (号码等于luckyNum)
            let isWinner = Math.random() > 0.8;
            let myNum;
            let prize;

            if (isWinner) {
                myNum = luckyNum;
                // 中奖则从奖金池随机取（含大奖）
                prize = prizePool[Math.floor(Math.random() * prizePool.length)];
            } else {
                // 不中奖：从池子里取一个不等于luckyNum的数字
                myNum = numberPool[i] === luckyNum ? numberPool[31] : numberPool[i];
                // 不中奖显示 0 或 5, 10 等小额
                const smallPrizes = [0, 5, 10, 20];
                prize = smallPrizes[Math.floor(Math.random() * smallPrizes.length)];
            }

            // 格式化金额显示
            let prizeStr = prize >= 10000 ? (prize/10000) + "W" : prize.toLocaleString();
            
            myBox.innerHTML += `<div class="num-item">${myNum}<div class="prize-item">¥${prizeStr}</div></div>`;
        }

        // 3. 绘制磨砂涂层
        function init() {
            canvas.width = 324;
            canvas.height = 410;
            ctx.fillStyle = '#BDBDBD'; 
            ctx.fillRect(0, 0, 324, 410);
            for(let i=0; i<1800; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#E0E0E0' : '#828282';
                ctx.fillRect(Math.random()*324, Math.random()*410, 1.2, 1.2);
            }
            ctx.fillStyle = '#444'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('玩法区', 162, 45);
            ctx.fillText('刮 开 区', 162, 210);
        }

        // 4. 刮除逻辑
        let isDrawing = false;
        function scratch(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 18, 0, Math.PI * 2);
            ctx.fill();
        }

        canvas.addEventListener('mousedown', () => isDrawing = true);
        canvas.addEventListener('touchstart', (e) => { isDrawing = true; scratch(e); });
        window.addEventListener('mouseup', () => isDrawing = false);
        window.addEventListener('touchend', () => isDrawing = false);
        canvas.addEventListener('mousemove', scratch);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, {passive: false});

        init();
    </script>
</body>
</html>
