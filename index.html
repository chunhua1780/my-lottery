<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国龙-超级配置器 V2.0</title>
    <style>
        body { background: #1a1a1a; margin: 0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; font-family: -apple-system, sans-serif; overflow: hidden; }
        
        /* 彩票容器 */
        .card-container { position: relative; width: 360px; height: 720px; background: url('64005.jpg') no-repeat; background-size: cover; margin-top: 5px; flex-shrink: 0; box-shadow: 0 0 50px #000; overflow: hidden; }

        /* 1. 玩法区 (中奖号码) - 独立控制层 */
        #win-box { position: absolute; width: 100px; height: 60px; z-index: 5; display: flex; justify-content: center; align-items: center; border: 1px dashed rgba(255,255,0,0.5); pointer-events: none; }
        
        /* 2. 我的号码区 (30个圆圈) - 独立控制层 */
        #my-grid { position: absolute; width: 312px; height: 280px; z-index: 5; display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(5, 1fr); border: 1px dashed rgba(0,255,255,0.3); pointer-events: none; }

        .num-item { display: flex; flex-direction: column; justify-content: center; align-items: center; color: #000; font-weight: 900; text-shadow: 1px 1px 0 #fff; line-height: 1.1; }
        .prize-item { color: #8B0000; font-weight: 900; }

        /* 3. 刮奖图层 (Canvas) - 可视化控制 */
        #scratch-canvas { position: absolute; z-index: 10; touch-action: none; cursor: crosshair; outline: 3px solid rgba(255,0,0,0.5); /* 调试模式红色边框 */ }

        /* --- 调试控制台 --- */
        .console { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); z-index: 1000; max-height: 60vh; overflow-y: auto; }
        .console-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; border-bottom: 1px solid #eee; background: #f8f9fa; border-radius: 20px 20px 0 0; }
        .console-header h3 { margin: 0; font-size: 16px; }
        .tab-group { display: flex; gap: 5px; }
        .tab-btn { padding: 5px 10px; background: #ddd; border: none; border-radius: 5px; font-size: 12px; cursor: pointer; }
        .tab-btn.active { background: #ff4400; color: #fff; }

        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; }

        .control-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; background: #f4f4f4; padding: 6px 10px; border-radius: 8px; }
        .label-txt { font-size: 13px; font-weight: bold; flex: 1; }
        .label-txt span { font-size: 11px; color: #666; font-weight: normal; }
        .btn-group { display: flex; align-items: center; gap: 4px; }
        .btn-group button { width: 32px; height: 32px; border: none; background: #333; color: #fff; border-radius: 4px; font-size: 18px; cursor: pointer; }
        .btn-group button:active { background: #000; }
        .btn-group input { width: 50px; text-align: center; border: 1px solid #ccc; height: 28px; font-weight: bold; font-size: 14px; }

        .final-code-btn { width: 100%; padding: 12px; background: #28a745; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .final-code-btn:active { background: #1e7e34; }
    </style>
</head>
<body>

    <div class="card-container">
        <div id="win-box"><div id="win-text" class="num-item">88</div></div>
        <div id="my-grid"></div>
        <canvas id="scratch-canvas"></canvas>
    </div>

    <div class="console">
        <div class="console-header">
            <h3>中国龙配置器</h3>
            <div class="tab-group">
                <button class="tab-btn active" onclick="showTab('tab-win')">玩法区</button>
                <button class="tab-btn" onclick="showTab('tab-my')">数字区</button>
                <button class="tab-btn" onclick="showTab('tab-canv')">刮奖区</button>
            </div>
