<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=360, user-scalable=no, viewport-fit=cover">
    <title>皇家刮刮乐</title>
    <style>
        body { margin: 0; background: #f5f5f7; font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        h1 { color: #1a1a2e; font-size: 28px; margin-top: 50px; }
        .number { font-size: 60px; font-weight: bold; color: #ff9500; margin: 30px; }
        .btn { background: #1a1a2e; color: white; border: none; padding: 15px 40px; font-size: 20px; border-radius: 50px; margin: 10px; cursor: pointer; }
        .result { font-size: 24px; margin: 20px; color: #4CAF50; }
    </style>
</head>
<body>
    <h1>🎰 皇家刮刮乐</h1>
    <div id="display" class="number">点击开始</div>
    <button class="btn" onclick="playGame()">🎮 开始刮奖 (2 USDT)</button>
    <div id="result" class="result"></div>
    
    <script>
        const SCRIPT_URL = 'https://script.googleapis.com/macros/s/AKfycbx89FuG55gTOAYQ0hb6v5unwWZF8uwJxpv1QZwEHXgusx8v_7AQheblwhvKmvy5Ur-U/exec';
        
        // 获取 Telegram 用户信息
        let userId = 'unknown';
        let username = '';
        
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.expand();
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                userId = tg.initDataUnsafe.user.id;
                username = tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name || '';
            }
        }
        
        async function playGame() {
            document.getElementById('result').innerHTML = '🎲 刮奖中...';
            
            // 生成随机结果
            const mainNumber = Math.floor(Math.random() * 90 + 10);
            const isWin = Math.random() > 0.7;
            const winAmount = isWin ? Math.floor(Math.random() * 50 + 10) : 0;
            const prizeAmount = isWin ? 100 + winAmount : 0;
            
            document.getElementById('display').innerHTML = mainNumber;
            
            // 发送数据到 Google Sheets
            const data = {
                user_id: userId,
                username: username,
                main_number: mainNumber,
                win_count: isWin ? 1 : 0,
                prize_amount: prizeAmount,
                ticket_number: mainNumber + '-' + Date.now()
            };
            
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                let msg = `号码: ${mainNumber} | `;
                if (isWin) {
                    msg += `🎉 中奖！获得 ${prizeAmount} USDT！`;
                } else {
                    msg += `😢 未中奖，再试一次！`;
                }
                msg += `\n✅ 数据已保存到后台`;
                document.getElementById('result').innerHTML = msg;
                
            } catch (error) {
                document.getElementById('result').innerHTML = '✅ 数据已保存！号码: ' + mainNumber;
            }
        }
    </script>
</body>
</html>
