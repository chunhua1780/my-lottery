<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ENGINEER STUDIO V5.0 - REAL SCRATCH</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        :root { --neon: #00f2fe; --gold: #FFD700; --panel-bg: rgba(10,10,10,0.95); }
        body { background: #1a1a1a; margin: 0; font-family: 'Arial', sans-serif; display: flex; color: #fff; height: 100vh; overflow: hidden; }

        /* --- 预览舞台 --- */
        #stage { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #222; }
        .canvas-card { position: relative; width: 360px; height: 720px; background-size: 100% 100%; box-shadow: 0 0 40px #000; scale: 0.9; }
        
        /* 锚定数字层 */
        #w-num { position: absolute; z-index: 2; display: flex; justify-content: center; align-items: center; font-family: 'Montserrat'; pointer-events: none; }
        #grid { position: absolute; z-index: 2; display: grid; grid-template-columns: repeat(6, 1fr); pointer-events: none; font-family: 'Montserrat'; }
        .item { display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: 900; }
        
        /* 涂层画布 - 保持高层级 */
        .layer { position: absolute; z-index: 10; touch-action: none; cursor: url('https://cur.cursors-4u.net/others/oth-2/oth191.cur'), auto; }
        .hide-layer { opacity: 0 !important; pointer-events: none !important; }

        /* --- 调试控制面板 --- */
        #controls { width: 380px; background: var(--panel-bg); border-left: 2px solid #333; padding: 20px; overflow-y: auto; box-sizing: border-box; }
        .group { background: #1f1f1f; padding: 12px; margin-bottom: 12px; border-radius: 8px; border-left: 4px solid var(--neon); }
        .group h3 { margin: 0 0 10px 0; font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .ctrl-row { display: flex; align-items: center; margin-bottom: 8px; }
        .ctrl-row label { width: 110px; font-size: 11px; color: #aaa; }
        .ctrl-row input[type=range] { flex: 1; accent-color: var(--neon); }
        .ctrl-row span { width: 40px; text-align: right; color: var(--neon); font-family: monospace; font-size: 12px; }
        
        .btn { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-toggle { background: #333; color: #fff; }
        .btn-toggle.active { background: #ff4757; box-shadow: 0 0 15px rgba(255,71,87,0.4); }
        .btn-export { background: var(--neon); color: #000; margin-top: 15px; }

        /* 欧美风格弹窗预览 */
        #bubble {
            position: absolute; left: 50%; transform: translateX(-50%) scale(0.5);
            width: 320px; height: 140px; background: #000; border: 3px solid var(--gold);
            border-radius: 30px; z-index: 100; display: flex; flex-direction: column;
            justify-content: center; align-items: center; opacity: 0; pointer-events: none;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #bubble.show { opacity: 1; transform: translateX(-50%) scale(1); }
    </style>
</head>
<body>

<div id="stage">
    <div class="canvas-card" id="card">
        <div id="bubble">
            <div style="color:var(--gold); font-weight:900; letter-spacing:2px;">BIG WIN</div>
            <div id="res-val" style="font-size:40px; font-weight:900; margin:5px 0;">$ 500 $</div>
            <button onclick="location.reload()" style="background:var(--gold); border:none; padding:5px 15px; border-radius:20px; font-weight:900;">AGAIN</button>
        </div>
        <div id="w-num">88</div>
        <div id="grid"></div>
        <canvas id="c-win" class="layer"></canvas>
        <canvas id="c-main" class="layer"></canvas>
    </div>
</div>

<div id="controls">
    <h2 style="margin-top:0; color:var(--neon)">STUDIO V5.0</h2>
    <button id="ghost-btn" class="btn btn-toggle" onclick="toggleGhost()">👻 屏蔽涂层 (对齐模式)</button>

    <div class="group">
        <h3>中奖号码 (WIN NUM)</h3>
        <div class="ctrl-row"><label>垂直 Y</label><input type="range" min="100" max="500" value="273" oninput="upd('wt',this.value)"> <span id="v_wt">273</span></div>
        <div class="ctrl-row"><label>水平 X</label><input type="range" min="0" max="360" value="175" oninput="upd('wl',this.value)"> <span id="v_wl">175</span></div>
        <div class="ctrl-row"><label>字号 Size</label><input type="range" min="10" max="60" value="22" oninput="upd('ws',this.value)"> <span id="v_ws">22</span></div>
    </div>

    <div class="group">
        <h3>玩法网格 (GRID)</h3>
        <div class="ctrl-row"><label>起始 Y</label><input type="range" min="200" max="600" value="343" oninput="upd('gt',this.value)"> <span id="v_gt">343</span></div>
        <div class="ctrl-row"><label>起始 X</label><input type="range" min="0" max="100" value="32" oninput="upd('gl',this.value)"> <span id="v_gl">32</span></div>
        <div class="ctrl-row"><label>行间距 Row</label><input type="range" min="10" max="60" value="29" oninput="upd('gr',this.value)"> <span id="v_gr">29</span></div>
        <div class="ctrl-row"><label>列间距 Col</label><input type="range" min="10" max="60" value="22" oninput="upd('gc',this.value)"> <span id="v_gc">22</span></div>
        <div class="ctrl-row"><label>网格总宽</label><input type="range" min="200" max="350" value="295" oninput="upd('gw',this.value)"> <span id="v_gw">295</span></div>
    </div>

    <div class="group">
        <h3>视觉样式 (STYLE)</h3>
        <div class="ctrl-row"><label>主数字大小</label><input type="range" min="8" max="30" value="16" oninput="upd('gs',this.value)"> <span id="v_gs">16</span></div>
        <div class="ctrl-row"><label>$$ 字号</label><input type="range" min="5" max="20" value="8" oninput="upd('ps',this.value)"> <span id="v_ps">8</span></div>
        <div class="ctrl-row"><label>弹窗高度 Y</label><input type="range" min="50" max="400" value="120" oninput="upd('bt',this.value)"> <span id="v_bt">120</span></div>
    </div>

    <button class="btn btn-export" onclick="exportData()">💾 导出最终 JSON 参数</button>
</div>

<script>

    let isGhost = false;

    function toggleGhost() {
        isGhost = !isGhost;
        document.getElementById('ghost-btn').classList.toggle('active', isGhost);
        document.querySelectorAll('.layer').forEach(l => l.classList.toggle('hide-layer', isGhost));
    }

    function upd(key, val) {
        p[key] = parseInt(val);
        document.getElementById('v_'+key).innerText = val;
        render();
    }
