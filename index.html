<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拾光·极客调优 V3.0</title>
    <style>
        :root { --accent: #00f2fe; --bg: #0a0a0a; }
        body { background: var(--bg); margin: 0; font-family: "Segoe UI", sans-serif; display: flex; color: #fff; height: 100vh; overflow: hidden; }

        /* --- 预览区 --- */
        #preview-area { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #151515; }
        .card-container { position: relative; width: 360px; height: 720px; background-size: 100% 100%; box-shadow: 0 0 40px #000; }
        
        #win-box { position: absolute; z-index: 2; font-weight: 900; }
        #my-grid { position: absolute; z-index: 2; display: grid; grid-template-columns: repeat(6, 1fr); }
        .num-item { display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: 900; }
        .pts-text { font-weight: bold; }
        
        .scratch-layer { position: absolute; z-index: 10; transition: opacity 0.3s; pointer-events: auto; }
        .ghost-mode { opacity: 0.05 !important; pointer-events: none !important; }

        /* --- 控制中心 --- */
        #panel { width: 400px; background: #000; border-left: 1px solid #333; padding: 20px; overflow-y: auto; box-sizing: border-box; }
        h3 { color: var(--accent); border-bottom: 1px solid #222; padding-bottom: 10px; margin: 0 0 15px 0; display: flex; justify-content: space-between; }
        
        .card { background: #111; padding: 12px; margin-bottom: 12px; border-radius: 6px; border: 1px solid #222; }
        .card h4 { margin: 0 0 10px 0; font-size: 12px; color: #666; text-transform: uppercase; }
        
        .row { display: flex; align-items: center; margin-bottom: 8px; font-size: 11px; }
        .row label { width: 90px; color: #aaa; }
        .row input[type=range] { flex: 1; margin: 0 10px; accent-color: var(--accent); }
        .row span { width: 30px; color: var(--accent); font-family: monospace; }
        .row input[type=color] { border: none; width: 30px; height: 20px; background: none; cursor: pointer; }
        
        select { background: #222; color: #fff; border: 1px solid #444; padding: 3px; font-size: 11px; flex: 1; }

        .master-btn { width: 100%; padding: 12px; margin-top: 5px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .ghost-btn { background: #333; color: #fff; margin-bottom: 15px; }
        .ghost-btn.active { background: var(--accent); color: #000; }
        .save-btn { background: var(--accent); color: #000; }
    </style>
</head>
<body>

<div id="preview-area">
    <div class="card-container" id="main-card">
        <div id="win-box">88</div>
        <div id="my-grid"></div>
        <canvas id="canv-win" class="scratch-layer"></canvas>
        <canvas id="canv-mine" class="scratch-layer"></canvas>
    </div>
</div>

<div id="panel">
    <h3>调试台 <span id="ver">V3.0</span></h3>
    
    <button id="ghost-toggle" class="master-btn ghost-btn" onclick="toggleGhost()">👻 开启幽灵透视 (隐藏涂层)</button>

    <div class="card">
        <h4>1. 中奖号码 (Win Area)</h4>
        <div class="row"><label>位置 Y/X</label>
            <input type="range" min="100" max="500" value="273" oninput="upd('wt',this.value)">
            <input type="range" min="0" max="360" value="175" oninput="upd('wl',this.value)">
        </div>
        <div class="row"><label>字号/颜色</label>
            <input type="range" min="10" max="60" value="22" oninput="upd('ws',this.value)">
            <input type="color" value="#000000" oninput="upd('wc',this.value)">
        </div>
        <div class="row"><label>涂层 Y/X</label>
            <input type="range" min="100" max="500" value="260" oninput="upd('ct',this.value)">
            <input type="range" min="0" max="360" value="157" oninput="upd('cl',this.value)">
        </div>
        <div class="row"><label>涂层 W/H</label>
            <input type="range" min="10" max="150" value="61" oninput="upd('cw',this.value)">
            <input type="range" min="10" max="100" value="49" oninput="upd('ch',this.value)">
        </div>
    </div>

    <div class="card">
        <h4>2. 玩法网格 (Grid Area)</h4>
        <div class="row"><label>区域 Y/X</label>
            <input type="range" min="200" max="600" value="343" oninput="upd('gt',this.value)">
            <input type="range" min="0" max="100" value="42" oninput="upd('gl',this.value)">
        </div>
        <div class="row"><label>行距/列距</label>
            <input type="range" min="0" max="60" value="29" oninput="upd('gr',this.value)">
            <input type="range" min="0" max="60" value="34" oninput="upd('gc',this.value)">
        </div>
        <div class="row"><label>字号/颜色</label>
            <input type="range" min="8" max="30" value="16" oninput="upd('gs',this.value)">
            <input type="color" value="#000000" oninput="upd('gnc',this.value)">
        </div>
        <div class="row"><label>PTS颜色</label>
            <input type="color" value="#d00000" oninput="upd('pc',this.value)">
            <select onchange="upd('font',this.value)">
                <option value="Arial">系统默认</option>
                <option value="'Courier New', monospace">极客等宽</option>
                <option value="Georgia">优雅衬线</option>
                <option value="'Impact'">硬核加粗</option>
            </select>
        </div>
    </div>

    <div class="card">
        <h4>3. 玩法大涂层 (Main Canvas)</h4>
        <div class="row"><label>垂直 Y/X</label>
            <input type="range" min="200" max="600" value="322" oninput="upd('mt',this.value)">
            <input type="range" min="0" max="100" value="21" oninput="upd('ml',this.value)">
        </div>
        <div class="row"><label>宽度/高度</label>
            <input type="range" min="100" max="360" value="318" oninput="upd('mw',this.value)">
            <input type="range" min="50" max="500" value="299" oninput="upd('mh',this.value)">
        </div>
    </div>

    <button class="master-btn save-btn" onclick="exportJSON()">💾 生成最终对齐参数</button>
</div>

<script>
    let p = { 
        wt:273, wl:175, ws:22, wc:'#000000', 
        ct:260, cl:157, cw:61, ch:49, 
        gt:343, gl:42, gs:16, gnc:'#000000', pc:'#d00000', gr:29, gc:34, 
        mt:322, ml:21, mw:318, mh:299, font: 'Arial'
    };

    let isGhost = false;

    function toggleGhost() {
        isGhost = !isGhost;
        const btn = document.getElementById('ghost-toggle');
        const layers = document.querySelectorAll('.scratch-layer');
        layers.forEach(l => l.classList.toggle('ghost-mode', isGhost));
        btn.classList.toggle('active', isGhost);
        btn.innerText = isGhost ? "👁️ 已进入透视模式" : "👻 开启幽灵透视 (隐藏涂层)";
    }

    function upd(key, val) {
        p[key] = isNaN(val) ? val : parseInt(val);
        apply();
    }

    function apply() {
        const wb = document.getElementById('win-box');
        wb.style.top = p.wt+'px'; wb.style.left = p.wl+'px'; 
        wb.style.fontSize = p.ws+'px'; wb.style.color = p.wc;
        wb.style.fontFamily = p.font;

        const gd = document.getElementById('my-grid');
        gd.style.top = p.gt+'px'; gd.style.left = p.gl+'px';
        gd.style.rowGap = p.gr+'px'; gd.style.columnGap = p.gc+'px';
        gd.style.fontFamily = p.font;
        
        gd.querySelectorAll('.num-item').forEach(i => {
            i.style.fontSize = p.gs+'px';
            i.style.color = p.gnc;
            i.querySelector('.pts-text').style.color = p.pc;
        });

        const cw = document.getElementById('canv-win');
        cw.style.top = p.ct+'px'; cw.style.left = p.cl+'px'; 
        cw.width = p.cw; cw.height = p.ch;
        draw(cw);

        const cm = document.getElementById('canv-mine');
        cm.style.top = p.mt+'px'; cm.style.left = p.ml+'px'; 
        cm.width = p.mw; cm.height = p.mh;
        draw(cm);
    }

    function draw(c) {
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#BBB'; ctx.fillRect(0,0,c.width,c.height);
    }

    function exportJSON() {
        console.log("ALIGN_DATA:", JSON.stringify(p));
        alert("对齐参数已记录，请复制发送给AI：\n\n" + JSON.stringify(p));
    }

    window.onload = () => {
        const img = new Image(); img.src = '64005.jpg';
        img.onload = () => {
            document.getElementById('main-card').style.backgroundImage = `url(64005.jpg)`;
            const gd = document.getElementById('my-grid');
            for(let i=0; i<30; i++) {
                gd.innerHTML += `<div class="num-item">88<div class="pts-text" style="font-size:8px">PTS 500</div></div>`;
            }
            apply();
        };
    };
</script>
</body>
</html>
