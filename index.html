<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国龙-极致对齐版</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: "Arial Rounded MT Bold", "Helvetica", sans-serif; }
        
        .card-container { position: relative; width: 360px; height: 720px; background: url('64005.jpg') no-repeat; background-size: cover; border-radius: 10px; }

        /* 1. 玩法区 (中奖号码) - 坐标根据反馈大幅上移 */
        .win-box { 
            position: absolute; 
            top: 285px;   /* 继续往上调至 285px */
            left: 130px; 
            width: 100px; 
            height: 60px; 
            z-index: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        /* 2. 我的号码区 - 坐标根据反馈大幅上移 */
        .my-grid { 
            position: absolute; 
            top: 385px;   /* 继续往上调至 385px */
            left: 21px; 
            width: 320px; 
            height: 280px; 
            z-index: 1; 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            grid-template-rows: repeat(5, 1fr);
            row-gap: 5px; /* 你测试好的 5px 行间距 */
        }

        .num-item { display: flex; flex-direction: column; justify-content: center; align-items: center; color: #000; font-weight: 900; font-size: 14px; text-shadow: 1px 1px 0 #fff; line-height: 1.1; }
        .prize-item { font-size: 10px; color: #8B0000; font-weight: 900; }

        /* 刮奖涂层：起始位置也要跟着数字一起往上跳 */
        #scratch-canvas { 
            position: absolute; 
            top: 280px;  /* 涂层起始位置与玩法区同步 */
            left: 18px; 
            width: 324px; 
            height: 420px; 
            z-index: 10; 
            touch-action: none; 
            cursor: crosshair; 
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="win-box" id="win-num"></div>
        <div class="my-grid" id="my-nums"></div>
        <canvas id="scratch-canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        const tg = window.Telegram.WebApp;
        tg.expand();

        const luckyNum = Math.floor(Math.random() * 89) + 10;
        document.getElementById('win-num').innerHTML = `<div class="num-item" style="font-size:24px">${luckyNum}</div>`;

        const myBox = document.getElementById('my-nums');
        const prizePool = ["10", "20", "50", "100", "500", "1000", "1W", "10W", "100W"];

        for (let i = 0; i < 30; i++) {
            let n = Math.floor(Math.random() * 89) + 10;
            let p = prizePool[Math.floor(Math.random() * prizePool.length)];
            myBox.innerHTML += `<div class="num-item">${n}<div class="prize-item">¥${p}</div></div>`;
        }

        function init() {
            canvas.width = 324;
            canvas.height = 420;
            ctx.fillStyle = '#BDBDBD';
            ctx.fillRect(0, 0, 324, 420);
            for(let i=0; i<2500; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#E0E0E0' : '#828282';
                ctx.fillRect(Math.random()*324, Math.random()*420, 1.2, 1.2);
            }
            ctx.fillStyle = '#444';
            ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('玩 法 区', 162, 45);
            ctx.fillText('刮 开 区', 162, 220);
        }

        let isDrawing = false;
        function scratch(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 18, 0, Math.PI * 2);
            ctx.fill();
        }

        canvas.addEventListener('mousedown', () => isDrawing = true);
        canvas.addEventListener('touchstart', (e) => { isDrawing = true; scratch(e); });
        window.addEventListener('mouseup', () => isDrawing = false);
        window.addEventListener('touchend', () => isDrawing = false);
        canvas.addEventListener('mousemove', scratch);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, {passive: false});

        init();
    </script>
</body>
</html>
