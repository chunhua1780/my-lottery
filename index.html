<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国龙-双区独立调试器</title>
    <style>
        body { background: #1a1a1a; margin: 0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; font-family: sans-serif; overflow: hidden; }
        
        /* 彩票容器 */
        .card-container { position: relative; width: 360px; height: 720px; background: url('64005.jpg') no-repeat; background-size: cover; margin-top: 5px; flex-shrink: 0; box-shadow: 0 0 50px #000; }

        /* 玩法区 - 独立控制层 */
        #win-box { position: absolute; width: 120px; height: 80px; z-index: 5; display: flex; justify-content: center; align-items: center; border: 1px dashed rgba(255,255,0,0.5); }
        
        /* 30个圆圈区 - 独立控制层 */
        #my-grid { position: absolute; width: 320px; height: 280px; z-index: 5; display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(5, 1fr); border: 1px dashed rgba(0,255,255,0.3); }

        .num-item { display: flex; flex-direction: column; justify-content: center; align-items: center; color: #000; font-weight: 900; text-shadow: 1px 1px 0 #fff; line-height: 1.1; pointer-events: none; }
        .prize-item { color: #8B0000; font-weight: 900; }

        /* --- 底部控制台 --- */
        .console { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; padding: 10px 15px; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); z-index: 100; max-height: 50vh; overflow-y: auto; }
        .section-title { font-size: 14px; font-weight: bold; color: #ff4400; border-left: 4px solid #ff4400; padding-left: 8px; margin: 10px 0; background: #fff5f0; }
        
        .control-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; background: #f4f4f4; padding: 5px 10px; border-radius: 8px; }
        .btn-group { display: flex; align-items: center; gap: 4px; }
        .btn-group button { width: 32px; height: 32px; border: none; background: #333; color: #fff; border-radius: 4px; font-size: 18px; cursor: pointer; }
        .btn-group input { width: 45px; text-align: center; border: 1px solid #ccc; height: 28px; font-weight: bold; }
        
        .code-box { background: #000; color: #0f0; padding: 10px; font-family: monospace; font-size: 11px; margin-top: 10px; border-radius: 5px; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div class="card-container">
        <div id="win-box"><div id="win-text" class="num-item">88</div></div>
        <div id="my-grid"></div>
    </div>

    <div class="console">
        <h3 style="margin:0 0 10px 0; text-align:center; font-size:16px;">🎮 独立双区位置微调器</h3>

        <div class="section-title">1. 玩法区 (中奖号) 调整</div>
        <div class="control-row">
            <span>上下位置 (Top)</span>
            <div class="btn-group">
                <button onclick="adj('wt',-1)">-</button>
                <input type="number" id="wt" value="285" onchange="update()">
                <button onclick="adj('wt',1)">+</button>
            </div>
        </div>
        <div class="control-row">
            <span>左右位置 (Left)</span>
            <div class="btn-group">
                <button onclick="adj('wl',-1)">-</button>
                <input type="number" id="wl" value="120" onchange="update()">
                <button onclick="adj('wl',1)">+</button>
            </div>
        </div>

        <div class="section-title">2. 30个圆圈区 (数字区) 调整</div>
        <div class="control-row">
            <span>整体上下 (Top)</span>
            <div class="btn-group">
                <button onclick="adj('gt',-1)">-</button>
                <input type="number" id="gt" value="385" onchange="update()">
                <button onclick="adj('gt',1)">+</button>
            </div>
        </div>
        <div class="control-row">
            <span>整体左右 (Left)</span>
            <div class="btn-group">
                <button onclick="adj('gl',-1)">-</button>
                <input type="number" id="gl" value="21" onchange="update()">
                <button onclick="adj('gl',1)">+</button>
            </div>
        </div>
        <div class="control-row">
            <span>行与行间距 (Gap)</span>
            <div class="btn-group">
                <button onclick="adj('rg',-1)">-</button>
                <input type="number" id="rg" value="5" onchange="update()">
                <button onclick="adj('rg',1)">+</button>
            </div>
        </div>
        <div class="control-row">
            <span>数字大小 (Size)</span>
            <div class="btn-group">
                <button onclick="adj('fs',-1)">-</button>
                <input type="number" id="fs" value="14" onchange="update()">
                <button onclick="adj('fs',1)">+</button>
            </div>
        </div>

        <div class="code-box" id="output">调好后，将此处参数发给我</div>
    </div>

    <script>
        const winBox = document.getElementById('win-box');
        const winText = document.getElementById('win-text');
        const myGrid = document.getElementById('my-grid');
        const output = document.getElementById('output');

        function init() {
            myGrid.innerHTML = '';
            for (let i = 0; i < 30; i++) {
                myGrid.innerHTML += `<div class="num-item" id="item-${i}">10<div class="prize-item">¥10W</div></div>`;
            }
            update();
        }

        window.adj = function(id, delta) {
            const el = document.getElementById(id);
            el.value = parseInt(el.value) + delta;
            update();
        }

        function update() {
            const wt = parseInt(document.getElementById('wt').value);
            const wl = parseInt(document.getElementById('wl').value);
            const gt = parseInt(document.getElementById('gt').value);
            const gl = parseInt(document.getElementById('gl').value);
            const rg = parseInt(document.getElementById('rg').value);
            const fs = parseInt(document.getElementById('fs').value);

            // 应用玩法区样式
            winBox.style.top = wt + 'px';
            winBox.style.left = wl + 'px';
            winText.style.fontSize = (fs + 6) + 'px';

            // 应用数字区样式
            myGrid.style.top = gt + 'px';
            myGrid.style.left = gl + 'px';
            myGrid.style.rowGap = rg + 'px';

            document.querySelectorAll('.num-item').forEach(el => {
                if(el.id !== 'win-text') el.style.fontSize = fs + 'px';
            });
            document.querySelectorAll('.prize-item').forEach(el => {
                el.style.fontSize = (fs * 0.75) + 'px';
            });

            // 生成反馈报告
            output.innerText = `【最终参数反馈】\n玩法区: Top=${wt}, Left=${wl}\n数字区: Top=${gt}, Left=${gl}, Gap=${rg}, Size=${fs}`;
        }

        init();
    </script>
</body>
</html>
