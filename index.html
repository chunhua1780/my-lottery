<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=360, user-scalable=no, viewport-fit=cover">
    <title>拾光 - 时尚刮刮乐</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Space+Mono:wght@700&display=swap');
        body { margin: 0; background: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; touch-action: none; }
        #loader { position: fixed; inset: 0; z-index: 1000; display: flex; justify-content: center; align-items: center; background: #fff; }
        .cd-ring { position: absolute; width: 150px; height: 150px; transform: rotate(-90deg); }
        .cd-ring circle { fill: none; stroke-width: 6; stroke: #6366f1; stroke-dasharray: 440; animation: ringTick 1s linear infinite; }
        @keyframes ringTick { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 440; } }
        .cd-num { font-size: 70px; font-weight: 900; }
        #top-dialog {
            position: fixed; top: 40px; left: 50%; transform: translateX(-50%) scale(0.9);
            width: 300px; padding: 30px 0; background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px); border-radius: 40px; z-index: 2000;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.15); opacity: 0; visibility: hidden;
            transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #top-dialog.active { opacity: 1; visibility: visible; transform: translateX(-50%) scale(1); }
        #stage { position: relative; width: 360px; height: 720px; margin: 0 auto; background: #fff url('64005.png') center/100% 100% no-repeat; opacity: 0; transition: opacity 1s; }
        #win-area { position: absolute; left: 151px; top: 263px; width: 72px; height: 66px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 900; }
        #grid-area { position: absolute; left: 27px; top: 335px; width: 310px; height: 284px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; padding: 5px; box-sizing: border-box; }
        .cell b { font-size: 20px; display: block; font-weight: 900; text-align: center; }
        .cell i { font-family: 'Space Mono'; font-size: 10px; font-weight: 700; display: block; text-align: center; }
        canvas { position: absolute; z-index: 500; cursor: crosshair; }
        
        .close-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            z-index: 3000;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .close-btn:hover { background: rgba(0,0,0,0.7); }
        
        /* 提示消息 */
        #toast-message {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            z-index: 4000;
            opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
        }
        #toast-message.show { opacity: 1; }
    </style>
</head>

<body>

<div id="loader">
    <svg class="cd-ring"><circle cx="75" cy="75" r="70"></circle></svg>
    <div id="cd" class="cd-num">3</div>
</div>

<div class="close-btn" onclick="closeWebApp()">✕</div>
<div id="toast-message">✅ 数据已保存</div>

<div id="top-dialog">
    <div style="font-size: 28px; font-weight: 900;">🎊 CONGRATS</div>
    <div id="dm" style="margin: 10px 0; color: #64748b;">Finding Magic...</div>
    <div style="padding: 10px 40px; background: #000; color: #fff; border-radius: 50px; font-family: 'Space Mono';" id="db">$0.00</div>
    <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; border-radius: 20px; border: 1px solid #000; background: none;">🔄 再玩一次</button>
    <button onclick="closeWebApp()" style="margin-top: 10px; padding: 10px 20px; border-radius: 20px; border: 1px solid #000; background: none;">🏠 返回机器人</button>
</div>

<div id="stage">
    <div id="win-area">88</div>
    <div id="grid-area"></div>
    <canvas id="c_win" style="left:153px; top:258px; width:71px; height:52px;"></canvas>
    <canvas id="c_grid" style="left:22px; top:322px; width:317px; height:300px;"></canvas>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.enableClosingConfirmation(); // 启用关闭确认，防止误触

let winTriggered = false, winTotal = 0, mainScratched = false;
let gameDataSent = false;
let ticketNumbers = [];
let ticketPrices = [];
let mainNumber = '88';
let backgroundImage = '64005.png';

// 显示提示消息
function showToast(text, duration = 2000) {
    const toast = document.getElementById('toast-message');
    toast.textContent = text;
    toast.classList.add('show');
    setTimeout(() => {
        toast.classList.remove('show');
    }, duration);
}

// 关闭 WebApp（不发送额外数据）
function closeWebApp() {
    if (tg && tg.close) {
        tg.close();
    }
}

// 上报数据到 Bot（不自动关闭）
function reportGame(data) {
    console.log("📊 Game Event:", data.type, data);
    
    if (window.Telegram && window.Telegram.WebApp) {
        try {
            window.Telegram.WebApp.sendData(JSON.stringify(data));
            console.log("✅ 数据已发送到 Bot");
            showToast('✅ 数据已保存到后台');
            return true;
        } catch (error) {
            console.error("❌ 发送数据失败:", error);
            showToast('❌ 数据发送失败', 3000);
            return false;
        }
    }
    return false;
}

async function start() {
    reportGame({ type: "game_start" });

    const el = document.getElementById('cd');
    for(let s of ['2', '1', 'GO']) {
        await new Promise(r => setTimeout(r, 1000));
        el.innerText = s;
    }

    document.getElementById('loader').style.display = 'none';
    document.getElementById('stage').style.opacity = '1';
    init();
}

function init() {
    const g = document.getElementById('grid-area');
    let h = "";
    ticketNumbers = [];
    ticketPrices = [];
    winTotal = 0;
    winTriggered = false;
    gameDataSent = false;
    
    mainNumber = Math.floor(Math.random() * 90 + 10).toString();
    document.getElementById('win-area').innerText = mainNumber;
    
    for(let i = 0; i < 30; i++) {
        const isWin = Math.random() > 0.85;
        const num = isWin ? mainNumber : Math.floor(Math.random() * 89 + 10).toString();
        const price = (Math.random() * 50 + 10).toFixed(2);
        
        ticketNumbers.push(num);
        ticketPrices.push(price);
        
        if(isWin) winTotal += parseFloat(price);
        h += `<div class="cell"><b>${num}</b><i>$${price}</i></div>`;
    }
    g.innerHTML = h;
    renderCanvas("c_win");
    renderCanvas("c_grid");
}

function renderCanvas(id) {
    const cvs = document.getElementById(id);
    const ctx = cvs.getContext('2d');
    cvs.width = cvs.offsetWidth;
    cvs.height = cvs.offsetHeight;
    ctx.fillStyle = '#cfd8dc';
    ctx.fillRect(0, 0, cvs.width, cvs.height);

    const stepX = 42; const stepY = 38;
    ctx.font = `bold 14px Arial`;
    ctx.fillStyle = "rgba(0,0,0,0.12)";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";

    for (let y = 0; y < cvs.height + stepY; y += stepY) {
        for (let x = 0; x < cvs.width + stepX; x += stepX) {
            ctx.save();
            let offsetX = (Math.floor(y / stepY) % 2 === 0) ? 0 : stepX / 2;
            ctx.translate(x + offsetX, y);
            const symbol = ((Math.floor(y / stepY)) % 2 === 0) ? '$' : '€';
            ctx.rotate(-0.25);
            ctx.fillText(symbol, 0, 0);
            ctx.restore();
        }
    }

    const scratch = (x, y) => {
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, 22, 0, Math.PI * 2);
        ctx.fill();
        if(id === "c_win") mainScratched = true;
        if(id === "c_grid" && mainScratched && !winTriggered) {
            triggerWin();
        }
    };

    const getPos = (e) => {
        const r = cvs.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        return { x: clientX - r.left, y: clientY - r.top };
    };

    cvs.addEventListener('touchstart', e => { e.preventDefault(); const p = getPos(e); scratch(p.x,p.y); });
    cvs.addEventListener('touchmove', e => { e.preventDefault(); const p = getPos(e); scratch(p.x,p.y); });
    cvs.addEventListener('mousemove', e => { if(e.buttons===1){ const p = getPos(e); scratch(p.x,p.y);} });
}

function triggerWin() {
    if(winTriggered) return;
    winTriggered = true;
    
    setTimeout(() => {
        const dialog = document.getElementById('top-dialog');
        const totalPrize = 100 + winTotal;
        document.getElementById('db').innerText = `$${totalPrize.toFixed(2)}`;
        document.getElementById('dm').innerText = winTotal > 0 ? `Amazing! You won $${winTotal.toFixed(2)}` : "Better luck next time!";
        dialog.classList.add('active');
        
        if (!gameDataSent) {
            gameDataSent = true;
            
            const ticketNumber = `${mainNumber}-${ticketNumbers.join('')}`;
            const winCount = ticketNumbers.filter(n => n === mainNumber).length;
            
            // 发送数据，不关闭窗口
            reportGame({ 
                type: "game_end", 
                win_total: winTotal,
                prize_amount: totalPrize,
                result: winTotal > 0 ? "win" : "lose",
                ticket_number: ticketNumber,
                main_number: mainNumber,
                numbers: ticketNumbers,
                prices: ticketPrices,
                win_count: winCount,
                background: backgroundImage
            });
        }
        
        if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    }, 2500);
}

// 初始化
window.addEventListener('load', () => {
    tg.ready();
    start();
});

// 页面关闭前确保数据已发送
window.addEventListener('beforeunload', (e) => {
    if (winTriggered && !gameDataSent) {
        gameDataSent = true;
        const totalPrize = 100 + winTotal;
        const ticketNumber = `${mainNumber}-${ticketNumbers.join('')}`;
        const winCount = ticketNumbers.filter(n => n === mainNumber).length;
        
        // 同步发送（beforeunload 中不能使用异步）
        const data = JSON.stringify({ 
            type: "game_end", 
            win_total: winTotal,
            prize_amount: totalPrize,
            result: winTotal > 0 ? "win" : "lose",
            ticket_number: ticketNumber,
            main_number: mainNumber,
            numbers: ticketNumbers,
            prices: ticketPrices,
            win_count: winCount,
            background: backgroundImage
        });
        
        if (navigator.sendBeacon) {
            // 使用 sendBeacon 确保数据发送
            const blob = new Blob([data], { type: 'application/json' });
            navigator.sendBeacon('/api/scratch', blob);
        }
    }
});
</script>
</body>
</html>
