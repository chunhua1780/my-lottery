<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国龙-至尊兑奖</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: #000; margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; overflow: hidden;
            font-family: "Arial Rounded MT Bold", "Helvetica", sans-serif;
            -webkit-user-select: none; user-select: none;
        }

        .card-container { 
            position: relative; width: 360px; height: 720px;
            background: url('64005.jpg') no-repeat; background-size: cover;
            border-radius: 10px; flex-shrink: 0;
        }

        /* 中奖号码区文字 (涂层A下方) */
        .win-box { 
            position: absolute; top: 259px; left: 152px; 
            width: 70px; height: 50px; z-index: 1;
            display: flex; justify-content: center; align-items: center; 
        }
        
        /* 我的号码区网格 (涂层B下方) */
        .my-grid { 
            position: absolute; top: 322px; left: 21px; 
            width: 318px; height: 299px; z-index: 1;
            display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(5, 1fr);
            row-gap: 5px;
        }

        .num-item { 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #000; font-weight: 900; font-size: 14px;
            text-shadow: 1px 1px 0 #fff; line-height: 1.1; 
        }
        .prize-item { font-size: 10px; color: #8B0000; font-weight: 900; }

        /* 刮奖图层 A & B */
        .scratch-canvas { position: absolute; z-index: 10; touch-action: none; cursor: crosshair; }
        
        /* 根据你的参数设置 Canvas 样式位置 */
        #canv-a { top: 259px; left: 152px; width: 70px; height: 50px; }
        #canv-b { top: 322px; left: 21px; width: 318px; height: 299px; }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="win-box" id="win-num"></div>
        <div class="my-grid" id="my-nums"></div>
        
        <canvas id="canv-a" class="scratch-canvas"></canvas>
        <canvas id="canv-b" class="scratch-canvas"></canvas>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. 游戏逻辑：生成号码和奖金
        const luckyNum = Math.floor(Math.random() * 89) + 10;
        document.getElementById('win-num').innerHTML = `<div class="num-item" style="font-size:22px">${luckyNum}</div>`;

        let numberPool = Array.from({length: 90}, (_, i) => i + 10).sort(() => Math.random() - 0.5);
        const myBox = document.getElementById('my-nums');
        const prizePool = [0, 5, 10, 20, 50, 100, 500, 1000, 5000, 10000, 1000000];

        for (let i = 0; i < 30; i++) {
            let isWinner = Math.random() > 0.85; // 15% 中奖率
            let myNum = isWinner ? luckyNum : (numberPool[i] === luckyNum ? numberPool[35] : numberPool[i]);
            let prize = isWinner ? prizePool[Math.floor(Math.random() * prizePool.length)] : [0, 5, 10, 20][Math.floor(Math.random()*4)];
            
            let prizeStr = prize >= 10000 ? (prize/10000) + "W" : prize.toLocaleString();
            myBox.innerHTML += `<div class="num-item">${myNum}<div class="prize-item">¥${prizeStr}</div></div>`;
        }

        // 2. 涂层初始化与刮除逻辑
        function initScratch(id, w, h) {
            const canvas = document.getElementById(id);
            const ctx = canvas.getContext('2d');
            canvas.width = w;
            canvas.height = h;

            // 绘制银色涂层
            ctx.fillStyle = '#C0C0C0';
            ctx.fillRect(0, 0, w, h);
            for(let i=0; i<800; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#DCDCDC' : '#999';
                ctx.fillRect(Math.random()*w, Math.random()*h, 1.2, 1.2);
            }

            // 刮除事件
            let drawing = false;
            const scratch = (e) => {
                if (!drawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, 16, 0, Math.PI * 2);
                ctx.fill();
            };

            canvas.addEventListener('mousedown', () => drawing = true);
            canvas.addEventListener('touchstart', (e) => { drawing = true; scratch(e); });
            window.addEventListener('mouseup', () => drawing = false);
            window.addEventListener('touchend', () => drawing = false);
            canvas.addEventListener('mousemove', scratch);
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, {passive: false});
        }

        // 执行初始化 (传入你调试好的 W 和 H)
        initScratch('canv-a', 70, 50);
        initScratch('canv-b', 318, 299);
    </script>
</body>
</html>
