<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拾光·PTS GLOBAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2fe; --gold: #f9d423; }
        body { background: #000; margin: 0; font-family: "Arial", sans-serif; overflow: hidden; color: white; }

        /* --- 极简加载逻辑 --- */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; justify-content: center; align-items: center; }
        #cd { font-size: 120px; font-weight: 200; opacity: 0; }
        .zoom { animation: z 1s ease-in-out forwards; }
        @keyframes z { 0% { transform: scale(0.8); opacity: 0; filter: blur(10px); } 50% { opacity: 1; filter: blur(0); } 100% { transform: scale(1.2); opacity: 0; } }

        /* --- 核心容器 (应用你的参数) --- */
        #app { display: none; opacity: 0; transition: opacity 0.8s; }
        .card { position: relative; width: 360px; height: 720px; background-size: 100% 100%; margin: 0 auto; }

        /* 中奖号码区 */
        #w-num { 
            position: absolute; z-index: 1; display: flex; justify-content: center; align-items: center; font-weight: 900;
            top: 273px; left: 175px; font-size: 22px; color: #000000;
        }
        /* 玩法网格区 */
        #grid { 
            position: absolute; z-index: 1; display: grid; grid-template-columns: repeat(6, 1fr);
            top: 343px; left: 32px; row-gap: 29px; column-gap: 22px;
        }
        .item { display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: 900; font-size: 16px; color: #000000; }
        .pts { font-size: 8px; color: #d00000; font-weight: bold; margin-top: -2px; }

        /* 涂层参数 */
        .layer { position: absolute; z-index: 10; touch-action: none; }
        #c-win { top: 260px; left: 157px; width: 61px; height: 49px; }
        #c-main { top: 322px; left: 21px; width: 318px; height: 299px; }

        /* --- 黄金比例弹窗 (0.618) --- */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        #modal { 
            width: 300px; height: 185px; background: linear-gradient(135deg, #fff 0%, #eee 100%);
            border-radius: 24px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); transform: scale(0.7); opacity: 0; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #modal.show { transform: scale(1); opacity: 1; }
        #m-title { color: #111; font-size: 18px; margin: 0; letter-spacing: 1px; }
        #m-amt { font-size: 38px; font-weight: 900; margin: 10px 0; background: linear-gradient(45deg, #ff416c, #ff4b2b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .retry { padding: 10px 30px; background: #000; color: #fff; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div id="loader"><div id="cd"></div></div>

<div id="app">
    <div class="card" id="b-card">
        <div id="w-num"></div>
        <div id="grid"></div>
        <canvas id="c-win" class="layer"></canvas>
        <canvas id="c-main" class="layer"></canvas>
    </div>
</div>

<div id="overlay">
    <div id="modal">
        <h2 id="m-title">POINTS EARNED</h2>
        <h1 id="m-amt">0 PTS</h1>
        <button class="retry" onclick="location.reload()">NEXT CHALLENGE</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    // 25% 盈利率逻辑 + 时尚文案
    function generatePoints() {
        const winNum = Math.floor(Math.random()*89)+10;
        const dice = Math.random();
        // 1000 PTS 面值，中奖分布
        let totalWin = dice < 0.5 ? 200 : (dice < 0.85 ? 500 : 2500); 
        const slots = []; let currentSum = 0;
        
        for(let i=0; i<30; i++) {
            let n = Math.floor(Math.random()*89)+10; if(n===winNum) n++;
            let p = [50, 100, 150][Math.floor(Math.random()*3)];
            if(currentSum < totalWin && Math.random() < 0.2) { n = winNum; p = Math.max(50, totalWin - currentSum); currentSum += p; }
            slots.push({n, p});
        }
        return {winNum, slots, totalWin: currentSum};
    }

    const game = generatePoints();

    window.onload = () => {
        const img = new Image(); img.src = '64005.jpg';
        img.onload = () => {
            document.getElementById('b-card').style.backgroundImage = `url(64005.jpg)`;
            document.getElementById('w-num').innerText = game.winNum;
            const grid = document.getElementById('grid');
            game.slots.forEach(s => {
                grid.innerHTML += `<div class="item">${s.n}<div class="pts">PTS ${s.p}</div></div>`;
            });
            initScratch('c-win', 61, 49);
            initScratch('c-main', 318, 299, true);
            startLoader();
        };
    };

    function startLoader() {
        const el = document.getElementById('cd');
        const steps = ['3', '2', '1']; let i = 0;
        const tick = () => {
            if(i < 3) {
                el.innerText = steps[i]; el.className = 'zoom';
                setTimeout(()=>el.className='', 950);
                i++; setTimeout(tick, 1000);
            } else {
                document.getElementById('loader').style.display='none';
                const a = document.getElementById('app');
                a.style.display='block'; setTimeout(()=>a.style.opacity='1', 50);
            }
        };
        tick();
    }

    function initScratch(id, w, h, isCheck = false) {
        const c = document.getElementById(id);
        const ctx = c.getContext('2d');
        c.width = w; c.height = h;
        
        // 涂层填充
        ctx.fillStyle = '#BBB'; ctx.fillRect(0,0,w,h);
        ctx.globalAlpha = 0.6;
        for(let i=0; i<300; i++) {
            ctx.fillStyle = Math.random()>0.5?'#EEE':'#888';
            ctx.fillRect(Math.random()*w, Math.random()*h, 1, 1);
        }
        ctx.globalAlpha = 1.0;

        let active = false;
        const scratch = (e) => {
            if(!active) return;
            const r = c.getBoundingClientRect();
            const x = (e.touches?e.touches[0].clientX:e.clientX) - r.left;
            const y = (e.touches?e.touches[0].clientY:e.clientY) - r.top;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(x, y, 24, 0, Math.PI*2); ctx.fill();
            if(isCheck) check(c);
        };

        c.onmousedown = () => active = true;
        window.onmouseup = () => active = false;
        c.onmousemove = scratch;
        c.ontouchstart = (e) => { e.preventDefault(); active = true; scratch(e); };
        c.ontouchmove = (e) => { e.preventDefault(); scratch(e); };
    }

    let done = false;
    function check(c) {
        if(done) return;
        const data = c.getContext('2d').getImageData(0,0,c.width,c.height).data;
        let hits = 0;
        for(let i=3; i<data.length; i+=4) if(data[i] === 0) hits++;
        if(hits / (data.length/4) > 0.95) {
            done = true;
            setTimeout(reveal, 800); // 彻底看清后再弹窗
        }
    }

    function reveal() {
        document.getElementById('m-amt').innerText = game.totalWin + " PTS";
        document.getElementById('overlay').style.display = 'flex';
        setTimeout(()=>document.getElementById('modal').classList.add('show'), 100);
    }
</script>
</body>
</html>
